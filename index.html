<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JOAQUIM ELITE 2026 - PMDF MASTER</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --bg-paper: #cbd5e1; --sidebar-w: 70px;
            --pauta: 35px;
        }

        body.dark-mode { --bg-paper: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--primary); height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            background: var(--primary); height: 60px; padding: 0 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--gold); z-index: 5000;
        }

        .logo { font-size: 1.2rem; font-weight: 900; color: white; }
        .logo span { color: var(--gold); }

        main { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar { 
            width: var(--sidebar-w); background: #1e293b; 
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; padding: 15px 0; border-right: 1px solid rgba(255,255,255,0.1); 
        }

        .btn-side { 
            width: 50px; height: 50px; border: none; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; color: white; 
            cursor: pointer; background: rgba(255,255,255,0.05);
        }
        .btn-side i { font-size: 1.2rem; color: var(--gold); }

        .editor-container { 
            flex: 1; display: flex; flex-direction: column; 
            background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px;
        }

        /* BLINDAGEM DO EDITOR */
        #folha-render-container {
            width: 100%; max-width: 850px; margin-top: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); line-height: 0; 
        }

        .area-editor * {
            margin: 0 !important; padding: 0 !important;
            line-height: var(--pauta) !important; display: inline; 
        }

        .area-editor br { display: block !important; content: ""; }

        #identificador-missao {
            width: 100%; max-width: 850px; background: white; padding: 12px;
            text-align: center; font-weight: 900; border-bottom: 2px solid var(--gold);
            text-transform: uppercase; color: #000; cursor: pointer;
        }

        .sticky-tools { 
            position: sticky; top: -20px; z-index: 1000; background: white; 
            width: 100%; max-width: 850px; border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .toolbar-marcador { display: flex; background: #fff; align-items: center; height: 45px; border-radius: 0 0 12px 12px;}
        .colors { display: flex; gap: 8px; padding: 0 15px; border-right: 1px solid #eee; }
        .dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid #ddd; }
        .dot.active { border: 2px solid #000; transform: scale(1.1); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; }
        .modal-body { background: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 15px; color: #000; }
        
        #pdf-side { width: 0; background: #1e293b; transition: 0.3s; display: flex; flex-direction: column; overflow: hidden; }
        #pdf-side.active { width: 45%; border-left: 4px solid var(--gold); }
    </style>
</head>
<body class="dark-mode">

<header>
    <div class="logo">JOAQUIM <span>ELITE 2026</span></div>
    <div style="color:var(--gold); font-size:12px; font-weight:bold;">SISTEMA: <span id="modo-display">FOLHA MASTER</span></div>
</header>

<main>
    <aside class="sidebar">
        <button class="btn-side" onclick="window.novaMissao()"><i class="fas fa-plus-circle"></i></button>
        <button class="btn-side" onclick="window.gerenciadorPasta()"><i class="fas fa-archive"></i></button>
        <button class="btn-side" onclick="window.abrirVade()"><i class="fas fa-gavel"></i></button>
        <hr style="width:40%; opacity:0.1; margin:10px 0">
        <button class="btn-side" onclick="window.salvarFluxo()"><i class="fas fa-save" style="color:#10b981"></i></button>
        <button class="btn-side" onclick="window.print()"><i class="fas fa-file-pdf" style="color:#ef4444"></i></button>
    </aside>

    <section class="editor-container">
        <div class="sticky-tools">
            <div id="identificador-missao" onclick="window.renomear()">NOVA MISSÃO PMDF</div>
            <div class="toolbar-marcador">
                <div class="colors">
                    <div class="dot active" id="d1" style="background:#fef08a;" onclick="window.setM('#fef08a','d1')"></div>
                    <div class="dot" id="d2" style="background:#bbf7d0;" onclick="window.setM('#bbf7d0','d2')"></div>
                    <div class="dot" id="d3" style="background:#bfdbfe;" onclick="window.setM('#bfdbfe','d3')"></div>
                    <button onclick="window.limparM()" style="border:none; background:none; cursor:pointer; margin-left:10px;"><i class="fas fa-eraser"></i></button>
                </div>
                <button onclick="document.execCommand('undo')" style="flex:1; border:none; background:none; font-weight:bold; font-size:10px; cursor:pointer">DESFAZER</button>
            </div>
        </div>
        
        <div id="folha-render-container"></div>
    </section>

    <section id="pdf-side">
        <div style="padding:10px; background:#0f172a; color:white; display:flex; justify-content:space-between">
            <span id="pdf-label">VADE MECUM</span>
            <button onclick="window.fecharVade()" style="color:white; background:none; border:none; cursor:pointer">X</button>
        </div>
        <iframe id="pdf-frame" style="width:100%; flex:1; border:none; background:white;"></iframe>
    </section>
</main>

<div class="modal" id="modal-elite">
    <div class="modal-body">
        <h3 id="m-title" style="margin-bottom:15px; border-bottom:2px solid var(--gold)"></h3>
        <div id="m-content"></div>
        <button onclick="document.getElementById('modal-elite').style.display='none'" style="width:100%; margin-top:15px; padding:10px; background:#000; color:#fff; border:none; border-radius:8px; cursor:pointer">FECHAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://masteroab-db5e1-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ENGINE SAGRADO - AGORA COM 300 LINHAS
    export const FolhaEngine = {
        montar: (containerId) => {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = "";
            const styleId = 'style-folha-elite-master';
            if (!document.getElementById(styleId)) {
                const style = document.createElement('style');
                style.id = styleId;
                style.innerHTML = `
                    .folha-container { display: grid; grid-template-columns: 50px 1fr; background: #fff; font-family: 'Courier New', Courier, monospace; border: 2px solid #000; position: relative; }
                    .numeracao { background: #f1f5f9; border-right: 2px solid #000; user-select: none; }
                    .num-mecanico { height: 35px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; border-bottom: 1px solid #cbd5e1; color: #1e293b; box-sizing: border-box; }
                    .area-editor { outline: none; font-size: 19px !important; font-weight: 700 !important; color: #000 !important; line-height: 35px !important; padding: 0 20px !important; white-space: pre-wrap; word-wrap: break-word; min-height: 10500px; background-image: linear-gradient(to bottom, transparent 34px, #e2e8f0 34px); background-size: 100% 35px; background-repeat: repeat-y; background-position: 0 -1px; text-align: justify; }
                `;
                document.head.appendChild(style);
            }
            const folha = document.createElement('div');
            folha.className = 'folha-container';
            const numCol = document.createElement('div');
            numCol.className = 'numeracao';
            for(let i=1; i<=300; i++) {
                const n = document.createElement('div'); n.className = 'num-mecanico'; n.innerText = i; numCol.appendChild(n);
            }
            const editor = document.createElement('div');
            editor.className = 'area-editor'; editor.id = 'editor-principal'; editor.contentEditable = "true"; editor.spellcheck = false;
            folha.appendChild(numCol); folha.appendChild(editor); container.appendChild(folha);
            
            editor.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { document.execCommand('insertLineBreak'); e.preventDefault(); }
            });
        }
    };

    window.idAtivo = null; window.gavetaAtiva = null; window.corM = '#fef08a';

    // FUNÇÃO DE SANEAMENTO (ANTI-PESO)
    window.sanitizarHTML = (htmlBruto) => {
        const temp = document.createElement('div');
        temp.innerHTML = htmlBruto;
        const walker = document.createTreeWalker(temp, NodeFilter.SHOW_ELEMENT);
        let n;
        while (n = walker.nextNode()) {
            n.removeAttribute('class'); n.removeAttribute('contenteditable');
            if (n.style.length > 0) {
                const bg = n.style.backgroundColor; n.removeAttribute('style');
                if (bg) n.style.backgroundColor = bg;
            }
        }
        temp.normalize();
        return temp.innerHTML;
    };

    window.onload = () => {
        FolhaEngine.montar('folha-render-container');
        document.execCommand('defaultParagraphSeparator', false, 'br');
        document.getElementById('editor-principal').addEventListener('mouseup', () => {
            if(window.getSelection().toString().length > 0) document.execCommand('backColor', false, window.corM);
        });
    };

    window.setM = (c, id) => {
        window.corM = c;
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.limparM = () => { document.execCommand('backColor', false, 'transparent'); };

    window.novaMissao = () => {
        const n = prompt("NOME DO EXERCÍCIO/COMENTÁRIO:");
        if(n){
            window.idAtivo = "PMDF_" + Date.now();
            window.gavetaAtiva = null;
            document.getElementById('identificador-missao').innerText = n.toUpperCase();
            document.getElementById('editor-principal').innerHTML = "";
        }
    };

    window.salvarFluxo = () => {
        if(!window.idAtivo) return alert("Inicie no +");
        if(window.gavetaAtiva) return window.dbSave(window.gavetaAtiva);
        const c = document.getElementById('m-content');
        document.getElementById('m-title').innerText = "GAVETA";
        c.innerHTML = `
            <button onclick="window.dbSave('REDAÇÃO')" style="width:100%; padding:15px; margin-bottom:10px;">GAVETA: REDAÇÃO</button>
            <button onclick="window.dbSave('QUESTÕES')" style="width:100%; padding:15px;">GAVETA: QUESTÕES</button>
        `;
        document.getElementById('modal-elite').style.display = 'flex';
    };

    window.dbSave = async (gaveta) => {
        window.gavetaAtiva = gaveta;
        const editor = document.getElementById('editor-principal');
        const htmlOtimizado = window.sanitizarHTML(editor.innerHTML);
        
        await set(ref(db, `pmdf_v1/GAVETAS/${window.idAtivo}`), {
            id: window.idAtivo, gaveta: gaveta,
            nome: document.getElementById('identificador-missao').innerText,
            html: htmlOtimizado,
            data: new Date().toLocaleString('pt-BR')
        });
        
        document.getElementById('modo-display').innerText = gaveta;
        document.getElementById('modal-elite').style.display = 'none';
        alert("Salvo e Otimizado!");
    };

    window.gerenciadorPasta = () => {
        const c = document.getElementById('m-content');
        document.getElementById('m-title').innerText = "📂 GAVETAS";
        c.innerHTML = `
            <button onclick="window.listarGaveta('REDAÇÃO')" style="width:100%; padding:15px; margin-bottom:10px;">REDAÇÕES</button>
            <button onclick="window.listarGaveta('QUESTÕES')" style="width:100%; padding:15px;">QUESTÕES</button>
        `;
        document.getElementById('modal-elite').style.display = 'flex';
    };

    window.listarGaveta = async (tipo) => {
        const c = document.getElementById('m-content');
        c.innerHTML = "Buscando...";
        const snap = await get(ref(db, `pmdf_v1/GAVETAS`));
        c.innerHTML = "";
        if(snap.exists()){
            const itens = Object.values(snap.val()).filter(i => i.gaveta === tipo);
            itens.reverse().forEach(it => {
                const d = document.createElement('div');
                d.style = "padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between";
                d.innerHTML = `<span onclick="window.loadIt('${it.id}')" style="cursor:pointer"><b>${it.nome}</b></span>
                               <i class="fas fa-trash" onclick="window.delIt('${it.id}','${tipo}')" style="color:red; cursor:pointer"></i>`;
                c.appendChild(d);
            });
        }
    };

    window.loadIt = async (id) => {
        const snap = await get(ref(db, `pmdf_v1/GAVETAS/${id}`));
        const d = snap.val();
        window.idAtivo = id; window.gavetaAtiva = d.gaveta;
        document.getElementById('identificador-missao').innerText = d.nome;
        document.getElementById('editor-principal').innerHTML = d.html;
        document.getElementById('modo-display').innerText = d.gaveta;
        document.getElementById('modal-elite').style.display = 'none';
    };

    window.delIt = async (id, tipo) => { if(confirm("Apagar?")) { await remove(ref(db, `pmdf_v1/GAVETAS/${id}`)); window.listarGaveta(tipo); } };

    window.abrirVade = () => {
        const c = document.getElementById('m-content');
        document.getElementById('m-title').innerText = "⚖️ VADE MECUM";
        const leis = [['https://www.planalto.gov.br/ccivil_03/leis/l7289.htm', 'ESTATUTO PMDF'], ['https://www.planalto.gov.br/ccivil_03/decreto-lei/del1001.htm', 'CPM']];
        c.innerHTML = leis.map(l => `<div onclick="window.showPdf('${l[0]}','${l[1]}')" style="padding:10px; border:1px solid #ddd; margin-bottom:5px; cursor:pointer">${l[1]}</div>`).join('');
        document.getElementById('modal-elite').style.display = 'flex';
    };

    window.showPdf = (url, title) => {
        document.getElementById('pdf-frame').src = url;
        document.getElementById('pdf-side').classList.add('active');
        document.getElementById('modal-elite').style.display = 'none';
    };

    window.fecharVade = () => document.getElementById('pdf-side').classList.remove('active');
    window.renomear = () => { const n = prompt("Novo Nome:"); if(n) document.getElementById('identificador-missao').innerText = n.toUpperCase(); };
</script>
</body>
</html>
