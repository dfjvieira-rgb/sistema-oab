<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JOAQUIM ELITE 2026 - PMDF MASTER</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --gold-dark: #d97706;
            --bg-paper: #cbd5e1; --paper-color: #ffffff; 
            --mentoria: #a855f7; --sidebar-w: 70px; --perigo: #ef4444;
            --glass: rgba(30, 41, 59, 0.7);
            --questoes: #3b82f6; --teses: #f97316; --biblioteca: #475569;
        }

        body.dark-mode { --bg-paper: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--primary); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            color: white;
        }

        header { 
            background: var(--primary); 
            height: 60px; 
            padding: 0 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--gold); 
            z-index: 5000;
        }

        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--gold); }

        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .sidebar { 
            width: var(--sidebar-w); 
            background: #1e293b; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            gap: 10px; 
            padding: 15px 0; 
            border-right: 1px solid rgba(255,255,255,0.1); 
            overflow-y: auto; 
        }

        .btn-side { 
            width: 50px; min-height: 50px; border: none; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; color: white; 
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05);
            position: relative;
        }
        .btn-side:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
        .btn-side i { font-size: 1.1rem; color: var(--gold); }

        .editor-container { 
            flex: 1; display: flex; flex-direction: column; 
            background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px;
        }

        .sticky-tools { 
            position: sticky; top: -20px; z-index: 1000; background: white; 
            width: 100%; max-width: 850px; border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 10px;
        }

        #identificador-peca { 
            padding: 12px; background: #f8fafc; text-align: center; 
            font-weight: 900; color: #0f172a; border-bottom: 3px solid var(--gold);
            cursor: pointer;
        }
        
        .toolbar-liberdade { display: flex; background: #fff; flex-wrap: wrap; }
        .btn-lib { 
            flex: 1; padding: 12px; border: none; background: transparent; 
            cursor: pointer; font-weight: 800; font-size: 0.7rem; 
            text-transform: uppercase; color: #64748b; border-right: 1px solid #f1f5f9;
        }

        .highlight-box { display: flex; align-items: center; background: #f1f5f9; padding: 0 10px; gap: 8px; }
        .color-dot { width: 20px; height: 20px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: #000; }

        .paper { width: 100%; max-width: 850px; background: white; min-height: 2000px; position: relative; }

        #pdf-viewer { width: 0; background: #334155; transition: 0.4s; display: flex; flex-direction: column; overflow: hidden; }
        #pdf-viewer.active { width: 50%; border-left: 4px solid var(--gold); }
        #pdf-viewer.full-view { width: 100% !important; }

        .pdf-controls { background: #1e293b; padding: 12px; display: flex; justify-content: space-between; color: white; font-weight: bold;}

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 110000; align-items: center; justify-content: center; }
        .modal-body { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 20px; color: #0f172a; }
        .opt-btn { width: 100%; padding: 18px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #eee; background: #f8fafc; font-weight: 800; display: flex; justify-content: space-between; cursor: pointer; align-items: center; }

        #mobile-hub { display: none; position: fixed; bottom: 30px; right: 25px; z-index: 99999; flex-direction: column-reverse; gap: 12px; }
        .fab-main { width: 65px; height: 65px; border-radius: 50%; background: var(--gold); border: none; font-size: 1.8rem; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .fab-sub { width: 50px; height: 50px; border-radius: 50%; border: none; color: white; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #mobile-hub.active .fab-sub { display: flex; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            #mobile-hub { display: flex; }
            #pdf-viewer.active { width: 100%; position: absolute; z-index: 9000; }
        }
    </style>
</head>
<body class="dark-mode">

<header>
    <div class="logo">JOAQUIM <span>ELITE - PMDF</span></div>
    <div style="color:var(--gold); font-size:10px; font-weight:bold;">SISTEMA: <span id="ex-display">PMDF</span></div>
</header>

<main>
    <aside class="sidebar">
        <button class="btn-side" style="background:#000; border:1px solid var(--gold)" title="Vade Mecum PMDF" onclick="window.abrirVade()"><i class="fas fa-balance-scale"></i></button>
        <button class="btn-side" style="background:var(--questoes)" title="Questões" onclick="window.ativarModoQuestoes()"><i class="fas fa-question-circle"></i></button>
        <button class="btn-side" style="background:var(--teses)" title="Dissertativas" onclick="window.ativarModoTeses()"><i class="fas fa-edit"></i></button>
        <button class="btn-side" style="background:#10b981;" title="Salvar Treino" onclick="window.finalizarPeca()"><i class="fas fa-save"></i></button>
        <button class="btn-side" style="background:var(--mentoria);" title="Mentoria IA" onclick="window.abrirMentoria()"><i class="fas fa-robot"></i></button>
    </aside>

    <section class="editor-container" id="editor-container">
        <div class="sticky-tools">
            <div id="identificador-peca" onclick="window.renomearTreino()">NOVO TREINO PMDF...</div>
            <div class="toolbar-liberdade">
                <button class="btn-lib" onclick="window.desfazer()"><i class="fas fa-undo"></i></button>
                <div class="highlight-box">
                    <div class="color-dot active" id="dot-yellow" style="background:#fef08a;" onclick="window.setHighlightColor('#fef08a', 'dot-yellow')"></div>
                    <div class="color-dot" id="dot-green" style="background:#bbf7d0;" onclick="window.setHighlightColor('#bbf7d0', 'dot-green')"></div>
                    <button class="btn-lib" id="btn-highlight" onclick="window.toggleMarcaTexto()"><i class="fas fa-highlighter"></i></button>
                </div>
                <button class="btn-lib" onclick="window.limparFolha()"><i class="fas fa-trash"></i></button>
                <button class="btn-lib" style="background:#22c55e; color:white" onclick="window.print()"><i class="fas fa-print"></i> PDF</button>
            </div>
        </div>
        <div class="paper">
            <div id="folha-total"></div> 
        </div>
    </section>

    <section id="pdf-viewer">
        <div class="pdf-controls">
            <span id="pdf-title">EDITAL PMDF</span>
            <button onclick="window.fecharPDF()" style="background:var(--gold); border:none; padding:5px 10px; border-radius:4px; font-weight:bold; cursor:pointer;">X</button>
        </div>
        <iframe id="pdf-frame"></iframe>
    </section>

    <div id="mobile-hub">
        <button class="fab-main" onclick="window.toggleFoguete()"><i class="fas fa-rocket"></i></button>
        <button class="fab-sub" style="background:#000; color:var(--gold)" onclick="window.abrirVade()"><i class="fas fa-balance-scale"></i></button>
        <button class="fab-sub" style="background:var(--mentoria);" onclick="window.abrirMentoria()"><i class="fas fa-robot"></i></button>
    </div>
</main>

<div class="modal" id="universal-modal">
    <div class="modal-body">
        <h2 id="modal-title" style="margin-bottom:20px; border-bottom:2px solid var(--gold)">⚖️ NÚCLEO DURO PMDF</h2>
        <div id="modal-content"></div>
        <button onclick="document.getElementById('universal-modal').style.display='none'" style="width:100%; padding:15px; background:#000; color:#fff; border-radius:10px; margin-top:15px; font-weight:bold; cursor:pointer;">VOLTAR</button>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config1.js'; 
    import { ref, get, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { FolhaEngine } from './folha-engine.js';

    window.db = db;
    window.pecaAtualNome = localStorage.getItem('pecaAtualNome') || "NOVO TREINO PMDF";
    window.marcaTextoAtivo = false;
    window.currentColor = '#fef08a';
    window.historicoUndo = [];

    // --- LOGICA NÚCLEO DURO PMDF ---
    window.abrirVade = () => {
        const modal = document.getElementById('universal-modal');
        const c = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "⚖️ NÚCLEO DURO PMDF";
        
        const leis = [
            ['edital-abertura-04-2023.pdf', '📄 EDITAL PMDF 2023'],
            ['https://www.planalto.gov.br/ccivil_03/leis/l7289.htm', '🛡️ ESTATUTO PMDF (L. 7289)'],
            ['https://www.planalto.gov.br/ccivil_03/decreto-lei/del1001.htm', '⚔️ CÓD. PENAL MILITAR'],
            ['https://www.planalto.gov.br/ccivil_03/decreto-lei/del1002.htm', '⚖️ PROC. PENAL MILITAR'],
            ['https://www.planalto.gov.br/ccivil_03/leis/l6450.htm', '🏛️ LOB PMDF (L. 6450)'],
            ['https://www.planalto.gov.br/ccivil_03/_ato2019-2022/2019/lei/l13869.htm', '🚫 ABUSO AUTORIDADE'],
            ['https://www.planalto.gov.br/ccivil_03/leis/l9455.htm', '⚠️ LEI DE TORTURA']
        ];
        
        c.innerHTML = leis.map(l => `
            <div class="opt-btn" onclick="window.showPdf('${l[0]}','${l[1]}')">
                <span>${l[1]}</span> <i class="fas fa-external-link-alt" style="color:var(--gold)"></i>
            </div>
        `).join('');
        modal.style.display = 'flex';
    };

    window.showPdf = (url, title) => {
        document.getElementById('pdf-frame').src = url;
        document.getElementById('pdf-title').innerText = title;
        document.getElementById('pdf-viewer').classList.add('active');
        document.getElementById('universal-modal').style.display = 'none';
    };

    window.fecharPDF = () => document.getElementById('pdf-viewer').classList.remove('active');

    window.finalizarPeca = async () => {
        const ed = document.getElementById('editor-principal');
        if(!ed) return;
        try {
            await push(ref(db, `producao_v13/HISTORICO_PMDF`), {
                peca: window.pecaAtualNome,
                conteudo: ed.innerHTML,
                data: new Date().toLocaleString()
            });
            alert("✅ Treino salvo no Histórico PMDF!");
        } catch(e) { alert("❌ Erro no Firebase (config1.js)"); }
    };

    window.onload = async () => {
        FolhaEngine.montar('folha-total');
        const snap = await get(ref(db, `producao_v13/RASCUNHO_PMDF`));
        if(snap.exists()) {
            setTimeout(() => {
                const ed = document.getElementById('editor-principal');
                if(ed) ed.innerHTML = snap.val().conteudo;
            }, 1000);
        }
        setInterval(async () => {
            const ed = document.getElementById('editor-principal');
            if(ed) await set(ref(db, `producao_v13/RASCUNHO_PMDF`), { conteudo: ed.innerHTML });
        }, 30000);
    };

    window.toggleMarcaTexto = () => {
        window.marcaTextoAtivo = !window.marcaTextoAtivo;
        document.getElementById('btn-highlight').style.background = window.marcaTextoAtivo ? window.currentColor : 'transparent';
    };

    window.setHighlightColor = (color, id) => {
        window.currentColor = color;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.desfazer = () => { 
        const ed = document.getElementById('editor-principal'); 
        if(window.historicoUndo.length > 0) ed.innerHTML = window.historicoUndo.pop(); 
    };

    window.limparFolha = () => { if(confirm("Limpar Folha?")) document.getElementById('editor-principal').innerHTML = ""; };
    window.renomearTreino = () => { 
        const n = prompt("Nome do Treino:", window.pecaAtualNome); 
        if(n) { window.pecaAtualNome = n; document.getElementById('identificador-peca').innerText = n; } 
    };
    window.toggleFoguete = () => document.getElementById('mobile-hub').classList.toggle('active');
    window.abrirMentoria = () => window.open('mentoria.html', '_blank');
    window.ativarModoQuestoes = () => { window.pecaAtualNome = "QUESTÕES PMDF"; window.renomearTreino(); };
    window.ativarModoTeses = () => { window.pecaAtualNome = "DISSERTATIVO PMDF"; window.renomearTreino(); };

</script>
</body>
</html>
