<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JOAQUIM ELITE 2026 - PMDF MASTER</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --bg-paper: #cbd5e1; --sidebar-w: 70px;
        }

        body.dark-mode { --bg-paper: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--primary); height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            background: var(--primary); height: 60px; padding: 0 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--gold); z-index: 5000;
        }

        .logo { font-size: 1.2rem; font-weight: 900; color: white; }
        .logo span { color: var(--gold); }

        main { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar { 
            width: var(--sidebar-w); background: #1e293b; 
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; padding: 15px 0; border-right: 1px solid rgba(255,255,255,0.1); 
        }

        .btn-side { 
            width: 50px; height: 50px; border: none; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; color: white; 
            cursor: pointer; background: rgba(255,255,255,0.05);
        }
        .btn-side i { font-size: 1.2rem; color: var(--gold); }

        .editor-container { 
            flex: 1; display: flex; flex-direction: column; 
            background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px;
        }

        /* --- BLINDAGEM DO INDEX PARA CONVERSAR COM O ENGINE --- */
        #folha-render-container {
            width: 100%;
            max-width: 850px;
            margin-top: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            line-height: 0; /* Mata espaços fantasmas */
        }

        /* Força a área do editor a respeitar a linha única */
        .area-editor * {
            margin: 0 !important;
            padding: 0 !important;
            line-height: 35px !important;
            display: inline; /* Impede criação de blocos/divs internas */
        }

        .area-editor br {
            display: block !important;
            content: "";
        }

        #identificador-missao {
            width: 100%; max-width: 850px; background: white; padding: 12px;
            text-align: center; font-weight: 900; border-bottom: 2px solid var(--gold);
            text-transform: uppercase; color: #000;
        }
    </style>
</head>
<body class="dark-mode">

<header>
    <div class="logo">JOAQUIM <span>ELITE 2026</span></div>
    <div style="color:var(--gold); font-size:12px; font-weight:bold;">SISTEMA: <span id="modo-display">FOLHA MASTER</span></div>
</header>

<main>
    <aside class="sidebar">
        <button class="btn-side" onclick="window.novaMissao()"><i class="fas fa-plus-circle"></i></button>
        <button class="btn-side" onclick="window.salvarPeca()"><i class="fas fa-save" style="color:#10b981"></i></button>
        <button class="btn-side" onclick="window.print()"><i class="fas fa-file-pdf" style="color:#ef4444"></i></button>
    </aside>

    <section class="editor-container">
        <div id="identificador-missao">NOVA MISSÃO PMDF</div>
        
        <div id="folha-render-container"></div>
    </section>
</main>

<script type="module">
    export const FolhaEngine = {
        montar: (containerId) => {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = "";
            
            const styleId = 'style-folha-elite-master';
            if (!document.getElementById(styleId)) {
                const style = document.createElement('style');
                style.id = styleId;
                style.innerHTML = `
                    .folha-container {
                        display: grid;
                        grid-template-columns: 50px 1fr;
                        background: #fff;
                        font-family: 'Courier New', Courier, monospace;
                        border: 2px solid #000;
                        position: relative;
                    }
                    .numeracao {
                        background: #f1f5f9;
                        border-right: 2px solid #000;
                        user-select: none;
                    }
                    .num-mecanico {
                        height: 35px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 11px;
                        font-weight: 900;
                        border-bottom: 1px solid #cbd5e1;
                        color: #1e293b;
                        box-sizing: border-box;
                    }
                    .area-editor {
                        outline: none;
                        font-size: 19px !important;
                        font-weight: 700 !important;
                        color: #000 !important;
                        line-height: 35px !important;
                        padding: 0 20px !important;
                        white-space: pre-wrap;
                        word-wrap: break-word;
                        min-height: 5250px;
                        background-image: linear-gradient(to bottom, transparent 34px, #e2e8f0 34px);
                        background-size: 100% 35px;
                        background-repeat: repeat-y;
                        background-position: 0 -1px;
                        text-align: justify;
                        text-justify: inter-word;
                    }
                    .area-editor div, .area-editor p { margin: 0; padding: 0; line-height: 35px; }

                    @media (max-width: 768px) {
                        .folha-container { grid-template-columns: 40px 1fr; }
                        .area-editor { font-size: 17px !important; padding: 0 10px !important; }
                    }
                `;
                document.head.appendChild(style);
            }

            const folha = document.createElement('div');
            folha.className = 'folha-container';

            const numCol = document.createElement('div');
            numCol.className = 'numeracao';
            for(let i=1; i<=150; i++) {
                const n = document.createElement('div');
                n.className = 'num-mecanico';
                n.innerText = i;
                numCol.appendChild(n);
            }

            const editor = document.createElement('div');
            editor.className = 'area-editor';
            editor.id = 'editor-principal';
            editor.contentEditable = "true";
            editor.spellcheck = false;

            folha.appendChild(numCol);
            folha.appendChild(editor);
            container.appendChild(folha);

            // TAB e ENTER Inteligente
            editor.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const sel = window.getSelection();
                    const range = sel.getRangeAt(0);
                    const tabNode = document.createTextNode("    ");
                    range.insertNode(tabNode);
                    range.setStartAfter(tabNode);
                    sel.removeAllRanges(); sel.addRange(range);
                }
                if (e.key === 'Enter') {
                    // Blindagem: força BR para não quebrar a pauta de 35px
                    document.execCommand('insertLineBreak');
                    e.preventDefault();
                }
            });

            editor.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = e.clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });
        }
    };

    // Inicialização Blindada
    window.onload = () => {
        FolhaEngine.montar('folha-render-container');
        // Comando mestre para impedir DIVS no Enter
        document.execCommand('defaultParagraphSeparator', false, 'br');
    };

    window.novaMissao = () => {
        const n = prompt("NOME DO TREINO:");
        if(n) {
            document.getElementById('identificador-missao').innerText = n.toUpperCase();
            document.getElementById('editor-principal').innerHTML = "";
        }
    };
</script>

</body>
</html>
