<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JOAQUIM ELITE 2026 - PMDF MASTER</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --gold-dark: #d97706;
            --bg-paper: #cbd5e1; --paper-color: #ffffff; 
            --mentoria: #a855f7; --sidebar-w: 70px; --perigo: #ef4444;
            --questoes: #3b82f6; --teses: #f97316;
        }

        body.dark-mode { --bg-paper: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--primary); height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; color: white;
        }

        header { 
            background: var(--primary); height: 60px; padding: 0 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--gold); z-index: 5000;
        }

        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--gold); }

        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .sidebar { 
            width: var(--sidebar-w); background: #1e293b; 
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; padding: 15px 0; border-right: 1px solid rgba(255,255,255,0.1); 
            overflow-y: auto; 
        }

        .btn-side { 
            width: 50px; min-height: 50px; border: none; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; color: white; 
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05);
            position: relative;
        }
        .btn-side i { font-size: 1.2rem; color: var(--gold); }

        /* TOOLTIP */
        .btn-side::after {
            content: attr(data-label); position: absolute; left: 60px; background: #000; 
            color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 10px;
            white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.2s;
            z-index: 6000; border: 1px solid var(--gold);
        }
        .btn-side:hover::after { opacity: 1; left: 70px; }

        .editor-container { 
            flex: 1; display: flex; flex-direction: column; 
            background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px;
        }

        .sticky-tools { 
            position: sticky; top: -20px; z-index: 1000; background: white; 
            width: 100%; max-width: 850px; border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 10px;
        }

        #identificador-peca { 
            padding: 12px; background: #f8fafc; text-align: center; 
            font-weight: 900; color: #0f172a; border-bottom: 3px solid var(--gold);
            cursor: pointer;
        }
        
        .toolbar-liberdade { display: flex; background: #fff; align-items: center; border-radius: 0 0 12px 12px; }
        .btn-lib { flex: 1; padding: 12px; border: none; background: transparent; cursor: pointer; font-weight: 800; color: #64748b; font-size: 11px; }

        .highlight-box { display: flex; align-items: center; background: #f1f5f9; padding: 0 15px; gap: 10px; height: 45px; border-right: 1px solid #eee;}
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: #000; transform: scale(1.2); }

        /* A FOLHA MESTRA - INTELIGÊNCIA EXATA */
        .paper { width: 100%; max-width: 850px; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.4); min-height: 5250px; }
        .folha-grid { display: grid; grid-template-columns: 45px 1fr; }
        .num-lateral { background: #f8fafc; border-right: 2px solid #cbd5e1; }
        .linha-num { height: 35px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border-bottom: 1px solid #f1f5f9; color: #94a3b8; }
        
        .area-escrita { 
            outline: none; padding: 0 20px; 
            font-family: 'Courier New', Courier, monospace !important; 
            font-size: 19px !important; font-weight: 700 !important; 
            line-height: 35px !important; 
            background-image: linear-gradient(to bottom, transparent 34px, #e2e8f0 34px);
            background-size: 100% 35px; color: #000 !important;
            min-height: 5250px; text-align: justify; white-space: pre-wrap;
        }

        #pdf-viewer { width: 0; background: #334155; transition: 0.4s; display: flex; flex-direction: column; overflow: hidden; }
        #pdf-viewer.active { width: 50%; border-left: 4px solid var(--gold); }
        .pdf-controls { background: #1e293b; padding: 12px; display: flex; justify-content: space-between; color: white; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 110000; align-items: center; justify-content: center; }
        .modal-body { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 20px; color: #0f172a; max-height: 85vh; overflow-y: auto; }
        .opt-btn { width: 100%; padding: 18px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #eee; background: #f8fafc; font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body class="dark-mode">

<header>
    <div class="logo">JOAQUIM <span>ELITE 2026</span></div>
    <div style="color:var(--gold); font-size:11px; font-weight:bold;">MODO: <span id="ex-display">INICIALIZANDO...</span></div>
</header>

<main>
    <aside class="sidebar">
        <button class="btn-side" data-label="NOVO TREINO" onclick="window.ativarTreinoLivre()"><i class="fas fa-edit"></i></button>
        <button class="btn-side" data-label="QUESTÕES" onclick="window.ativarModoQuestoes()"><i class="fas fa-question-circle"></i></button>
        <button class="btn-side" data-label="GAVETAS" onclick="window.gerenciadorPasta()"><i class="fas fa-archive"></i></button>
        <hr style="width:60%; opacity:0.1">
        <button class="btn-side" data-label="SALVAR NA GAVETA" onclick="window.finalizarPeca()"><i class="fas fa-save" style="color:#10b981"></i></button>
        <button class="btn-side" data-label="GERAR PDF" onclick="window.print()"><i class="fas fa-file-pdf" style="color:var(--perigo)"></i></button>
        <button class="btn-side" data-label="VADE MECUM" onclick="window.abrirVade()"><i class="fas fa-gavel"></i></button>
    </aside>

    <section class="editor-container">
        <div class="sticky-tools">
            <div id="identificador-peca" onclick="window.renomearTreino()">CLIQUE EM NOVO TREINO...</div>
            <div class="toolbar-liberdade">
                <div class="highlight-box">
                    <div class="color-dot active" id="dot-yellow" style="background:#fef08a;" onclick="window.setHighlightColor('#fef08a', 'dot-yellow')"></div>
                    <div class="color-dot" id="dot-green" style="background:#bbf7d0;" onclick="window.setHighlightColor('#bbf7d0', 'dot-green')"></div>
                    <div class="color-dot" id="dot-orange" style="background:#fed7aa;" onclick="window.setHighlightColor('#fed7aa', 'dot-orange')"></div>
                    <div class="color-dot" id="dot-blue" style="background:#bfdbfe;" onclick="window.setHighlightColor('#bfdbfe', 'dot-blue')"></div>
                    <div class="color-dot" id="dot-pink" style="background:#fbcfe8;" onclick="window.setHighlightColor('#fbcfe8', 'dot-pink')"></div>
                    <button onclick="window.limparFormatacao()" style="background:none; border:none; cursor:pointer; color:#64748b; margin-left:5px;"><i class="fas fa-eraser"></i></button>
                </div>
                <button class="btn-lib" onclick="document.execCommand('undo')">Desfazer</button>
                <button class="btn-lib" style="color:red" onclick="window.limparFolha()">Limpar Tudo</button>
            </div>
        </div>
        <div class="paper">
            <div class="folha-grid" id="folha-total"></div>
        </div>
    </section>

    <section id="pdf-viewer">
        <div class="pdf-controls">
            <span id="pdf-title">VADE MECUM PMDF</span>
            <button onclick="window.fecharPDF()" style="background:var(--perigo); border:none; padding:5px 12px; color:white; border-radius:5px; cursor:pointer">FECHAR</button>
        </div>
        <iframe id="pdf-frame" style="width:100%; flex:1; border:none; background:white;"></iframe>
    </section>
</main>

<div class="modal" id="universal-modal">
    <div class="modal-body">
        <h2 id="modal-title" style="margin-bottom:20px; border-bottom:2px solid var(--gold)"></h2>
        <div id="modal-content"></div>
        <button onclick="document.getElementById('universal-modal').style.display='none'" style="width:100%; padding:15px; background:#000; color:#fff; border-radius:10px; margin-top:15px; cursor:pointer;">FECHAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://masteroab-db5e1-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ESTADOS
    window.modoQuestoes = localStorage.getItem('modoQuestoes') === "true";
    window.pecaAtualNome = localStorage.getItem('pecaAtualNome') || "TREINO INICIAL";
    window.currentColor = '#fef08a';

    window.onload = () => {
        const f = document.getElementById('folha-total');
        let nums = '<div class="num-lateral">';
        for(let i=1; i<=150; i++) nums += `<div class="linha-num">${i}</div>`;
        nums += '</div><div class="area-escrita" id="editor-principal" contenteditable="true" spellcheck="false"></div>';
        f.innerHTML = nums;

        const ed = document.getElementById('editor-principal');
        ed.addEventListener('mouseup', () => { 
            if (window.getSelection().toString().length > 0) document.execCommand('backColor', false, window.currentColor); 
        });

        atualizarDisplay();
        carregarRascunho();
        setInterval(salvarAutomatico, 20000);
    };

    // --- GAVETAS E SALVAMENTO ---
    window.finalizarPeca = async () => {
        const ed = document.getElementById('editor-principal');
        if(!ed.innerText.trim()) return alert("Folha vazia!");
        
        let gaveta = window.modoQuestoes ? "QUESTÕES" : "TREINO_PECAS";
        let idFinal = Date.now().toString();
        
        if(confirm(`Salvar "${window.pecaAtualNome}" na gaveta ${gaveta}?`)) {
            await set(ref(db, `pmdf_v1/GAVETAS/${idFinal}`), {
                peca: window.pecaAtualNome,
                gaveta: gaveta,
                conteudo: ed.innerHTML,
                data: new Date().toLocaleString('pt-BR')
            });
            alert("Arquivado com sucesso!");
        }
    };

    window.gerenciadorPasta = async () => {
        const c = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "📂 MINHAS GAVETAS";
        c.innerHTML = "Carregando...";
        document.getElementById('universal-modal').style.display = 'flex';
        
        const snap = await get(ref(db, `pmdf_v1/GAVETAS`));
        if(snap.exists()) {
            c.innerHTML = "";
            const dados = snap.val();
            Object.keys(dados).reverse().forEach(key => {
                const item = dados[key];
                const div = document.createElement('div');
                div.className = "opt-btn";
                div.innerHTML = `<div><small>${item.gaveta}</small><br>${item.peca}</div><i class="fas fa-trash" style="color:red" onclick="event.stopPropagation(); window.excluirArquivo('${key}')"></i>`;
                div.onclick = () => window.carregarArquivo(key);
                c.appendChild(div);
            });
        } else { c.innerHTML = "Gavetas vazias."; }
    };

    window.carregarArquivo = async (chave) => {
        const snap = await get(ref(db, `pmdf_v1/GAVETAS/${chave}`));
        if(snap.exists()) {
            const data = snap.val();
            document.getElementById('editor-principal').innerHTML = data.conteudo;
            window.pecaAtualNome = data.peca;
            window.modoQuestoes = (data.gaveta === "QUESTÕES");
            atualizarDisplay();
            document.getElementById('universal-modal').style.display = 'none';
        }
    };

    window.excluirArquivo = async (chave) => {
        if(confirm("Excluir para sempre?")) {
            await remove(ref(db, `pmdf_v1/GAVETAS/${chave}`));
            window.gerenciadorPasta();
        }
    };

    // --- UTILITÁRIOS ---
    window.ativarTreinoLivre = () => {
        const n = prompt("Nome do Treino:");
        if(n) {
            window.modoQuestoes = false;
            window.pecaAtualNome = n.toUpperCase();
            localStorage.setItem('modoQuestoes', "false");
            localStorage.setItem('pecaAtualNome', n.toUpperCase());
            document.getElementById('editor-principal').innerHTML = "";
            atualizarDisplay();
        }
    };

    window.ativarModoQuestoes = () => {
        const n = prompt("Número da Questão:");
        if(n) {
            window.modoQuestoes = true;
            window.pecaAtualNome = "QUESTÃO " + n;
            localStorage.setItem('modoQuestoes', "true");
            localStorage.setItem('pecaAtualNome', window.pecaAtualNome);
            document.getElementById('editor-principal').innerHTML = "";
            atualizarDisplay();
        }
    };

    window.setHighlightColor = (color, id) => {
        window.currentColor = color;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.limparFormatacao = () => { document.execCommand('removeFormat'); document.execCommand('backColor', false, 'transparent'); };
    window.limparFolha = () => { if(confirm("Apagar tudo?")) document.getElementById('editor-principal').innerHTML = ""; };
    
    function atualizarDisplay() {
        document.getElementById('ex-display').innerText = window.modoQuestoes ? "QUESTÕES" : "PEÇAS";
        document.getElementById('identificador-peca').innerText = window.pecaAtualNome;
    }

    async function salvarAutomatico() {
        const ed = document.getElementById('editor-principal');
        if(ed) await set(ref(db, `pmdf_v1/RASCUNHO_ATUAL`), { conteudo: ed.innerHTML });
    }

    async function carregarRascunho() {
        const snap = await get(ref(db, `pmdf_v1/RASCUNHO_ATUAL`));
        if(snap.exists()) document.getElementById('editor-principal').innerHTML = snap.val().conteudo;
    }

    window.abrirVade = () => {
        document.getElementById('pdf-frame').src = "https://www.planalto.gov.br/ccivil_03/leis/l7289.htm"; // Exemplo Estatuto PMDF
        document.getElementById('pdf-viewer').classList.add('active');
    };
    window.fecharPDF = () => document.getElementById('pdf-viewer').classList.remove('active');
</script>
</body>
</html>
