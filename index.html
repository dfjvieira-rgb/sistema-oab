<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARSENAL PMDF | FOLHA ENGINE DEFINITIVA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --mpu-green: #064e3b; --mpu-blue: #020617; --mpu-gold: #b45309;
            --bg-paper: #cbd5e1; --sidebar-w: 260px; --sucesso: #166534; --perigo: #991b1b;
            --questoes: #4338ca; --teses: #c2410c; --mentoria: #0369a1; --gold: #b45309;
            color-scheme: light !important;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { font-family: 'Inter', sans-serif; background: #020617; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: white; }
        
        header { 
            background: linear-gradient(90deg, #001a33 0%, var(--mpu-green) 100%); 
            height: 60px; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid var(--mpu-gold); z-index: 5000; 
        }

        /* --- ESTRUTURA FOLHA ENGINE (CSS DO SEU JS) --- */
        .folha-container {
            display: grid;
            grid-template-columns: 50px 1fr;
            background: #fff;
            font-family: 'Courier New', Courier, monospace;
            border: 2px solid #000;
            position: relative;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .numeracao {
            background: #f1f5f9;
            border-right: 2px solid #000;
            user-select: none;
        }
        .num-mecanico {
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            border-bottom: 1px solid #cbd5e1;
            color: #1e293b;
            box-sizing: border-box;
        }
        .area-editor {
            outline: none;
            font-size: 19px !important;
            font-weight: 700 !important;
            color: #000 !important;
            line-height: 35px !important;
            padding: 0 20px !important;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 5250px;
            background-image: linear-gradient(to bottom, transparent 34px, #e2e8f0 34px);
            background-size: 100% 35px;
            background-repeat: repeat-y;
            background-position: 0 -1px;
            text-align: justify;
        }

        /* --- INTERFACE --- */
        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        .sidebar { width: var(--sidebar-w); background: #020617; display: flex; flex-direction: column; gap: 8px; padding: 15px; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; transition: margin-left 0.4s ease; }
        .sidebar.collapsed { margin-left: calc(var(--sidebar-w) * -1); }
        .btn-side { width: 100%; min-height: 42px; border: none; border-radius: 6px; display: flex; align-items: center; padding: 0 15px; color: white; font-weight: 600; cursor: pointer; gap: 10px; font-size: 0.7rem; text-transform: uppercase; background: rgba(255,255,255,0.05); }

        .editor-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px; }
        
        .sticky-tools { position: sticky; top: -20px; z-index: 1000; background: #fff; width: 100%; max-width: 850px; border-radius: 8px 8px 0 0; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 2px solid #000; border-bottom: none; }
        
        #identificador-peca { padding: 12px; background: #f8fafc; font-weight: 800; color: #020617; border-bottom: 2px solid var(--mpu-gold); display: flex; justify-content: space-between; cursor: pointer; }

        .highlighter-bar { display: flex; justify-content: center; gap: 15px; padding: 8px; background: #eee; border-bottom: 1px solid #ddd; }
        .hl-btn { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .hl-yellow { background: #ffff00; } .hl-green { background: #00ff00; } .hl-pink { background: #ff00ff; }
        .hl-clear { background: #fff; border-color: #ccc; display: flex; align-items: center; justify-content: center; color: #333; font-size: 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 12px; color: #0f172a; }
        .opt-btn { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; font-weight: 700; display: flex; justify-content: space-between; cursor: pointer; color: #1e293b; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <button id="toggle-menu" onclick="document.getElementById('sidebar-menu').classList.toggle('collapsed')"><i class="fas fa-bars"></i></button>
        <div class="logo"><b>PMDF ELITE</b> | <span id="ex-display">ENGINE V13</span></div>
    </div>
    <div id="relogio" style="font-family: monospace; font-weight: bold; color: var(--mpu-gold);"></div>
</header>

<main>
    <aside class="sidebar" id="sidebar-menu">
        <button class="btn-side" style="background:var(--sucesso);" onclick="window.finalizarPeca()"><i class="fas fa-save"></i> SALVAR NA GAVETA</button>
        <button class="btn-side" onclick="window.gerenciadorPasta()"><i class="fas fa-folder-open"></i> MEUS ARQUIVOS</button>
        <hr style="opacity:0.1">
        <button class="btn-side" onclick="window.ativarModo('QUESTÕES')"><i class="fas fa-question-circle"></i> QUESTÕES</button>
        <button class="btn-side" onclick="window.ativarModo('TESES')"><i class="fas fa-gavel"></i> TESES</button>
        <button class="btn-side" onclick="window.ativarModo('TREINO')"><i class="fas fa-pen"></i> TREINO LIVRE</button>
    </aside>

    <div class="editor-container">
        <div class="sticky-tools">
            <div id="identificador-peca" onclick="window.renomear()">
                <span id="nome-peca-display"><i class="fas fa-file-alt"></i> NOVO DOCUMENTO</span>
                <span style="font-size: 10px; opacity: 0.6;">EDITAR TÍTULO</span>
            </div>
            <div class="highlighter-bar">
                <div class="hl-btn hl-yellow" onclick="window.marcar('#ffff00')"></div>
                <div class="hl-btn hl-green" onclick="window.marcar('#00ff00')"></div>
                <div class="hl-btn hl-pink" onclick="window.marcar('#ff00ff')"></div>
                <div class="hl-btn hl-clear" onclick="window.marcar('transparent')"><i class="fas fa-eraser"></i></div>
            </div>
        </div>

        <div id="folha-engine-target"></div>
    </div>
</main>

<div class="modal" id="universal-modal">
    <div class="modal-body">
        <h3 id="modal-title" style="margin-bottom:15px"></h3>
        <div id="modal-content"></div>
        <button onclick="document.getElementById('universal-modal').style.display='none'" style="width:100%; margin-top:15px; padding:10px; background:#000; color:#fff; border:none; border-radius:5px; cursor:pointer;">FECHAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmigODFK8R9c0-fWtagdxLWu9xkODfKYQ",
        authDomain: "masteroab-db5e1.firebaseapp.com",
        databaseURL: "https://masteroab-db5e1-default-rtdb.firebaseio.com",
        projectId: "masteroab-db5e1",
        storageBucket: "masteroab-db5e1.appspot.com",
        messagingSenderId: "620234160245",
        appId: "1:620234160245:web:8651817c66144e59f42668"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- FOLHA ENGINE (SEU CÓDIGO INJETADO) ---
    const FolhaEngine = {
        montar: (containerId) => {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const folha = document.createElement('div');
            folha.className = 'folha-container';

            const numCol = document.createElement('div');
            numCol.className = 'numeracao';
            for(let i=1; i<=150; i++) {
                const n = document.createElement('div');
                n.className = 'num-mecanico';
                n.innerText = i;
                numCol.appendChild(n);
            }

            const editor = document.createElement('div');
            editor.className = 'area-editor';
            editor.id = 'editor-principal';
            editor.contentEditable = "true";
            editor.spellcheck = false;

            folha.appendChild(numCol);
            folha.appendChild(editor);
            container.appendChild(folha);

            // Tab logic
            editor.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const sel = window.getSelection();
                    const range = sel.getRangeAt(0);
                    const tabNode = document.createTextNode("    ");
                    range.insertNode(tabNode);
                    range.setStartAfter(tabNode);
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            });
        }
    };

    // --- LÓGICA DE INTERAÇÃO ---
    window.pecaAtual = localStorage.getItem('pecaAtual') || "TREINO_PMDF";
    window.modoAtivo = localStorage.getItem('modoAtivo') || "GERAL";

    window.onload = async () => {
        FolhaEngine.montar('folha-engine-target');
        window.atualizarUI();
        await window.carregarRascunho();
        setInterval(window.salvarAuto, 10000);
    };

    window.marcar = (cor) => {
        if (cor === 'transparent') document.execCommand('removeFormat', false, null);
        else document.execCommand('hiliteColor', false, cor);
    };

    window.atualizarUI = () => {
        document.getElementById('ex-display').innerText = window.modoAtivo;
        document.getElementById('nome-peca-display').innerText = window.pecaAtual;
    };

    window.renomear = () => {
        const n = prompt("Nome do arquivo:", window.pecaAtual);
        if(n) { window.pecaAtual = n.toUpperCase(); window.atualizarUI(); }
    };

    window.ativarModo = (modo) => {
        window.modoAtivo = modo;
        localStorage.setItem('modoAtivo', modo);
        window.renomear();
    };

    window.salvarAuto = async () => {
        const html = document.getElementById('editor-principal').innerHTML;
        await set(ref(db, `producao_pmdf/RASCUNHO`), { conteudo: html, nome: window.pecaAtual });
    };

    window.carregarRascunho = async () => {
        const snap = await get(ref(db, `producao_pmdf/RASCUNHO`));
        if(snap.exists()) document.getElementById('editor-principal').innerHTML = snap.val().conteudo;
    };

    window.finalizarPeca = async () => {
        const ed = document.getElementById('editor-principal');
        const id = Date.now();
        await set(ref(db, `producao_pmdf/HISTORICO/${id}`), {
            exame: window.modoAtivo,
            peca: window.pecaAtual,
            conteudo: ed.innerHTML,
            data: new Date().toLocaleString()
        });
        alert("Salvo com sucesso na nuvem!");
    };

    window.gerenciadorPasta = async () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "📂 MEUS ARQUIVOS";
        content.innerHTML = "Carregando...";
        modal.style.display = 'flex';

        const snap = await get(ref(db, `producao_pmdf/HISTORICO`));
        content.innerHTML = "";
        if(snap.exists()){
            Object.keys(snap.val()).forEach(k => {
                const item = snap.val()[k];
                const btn = document.createElement('div');
                btn.className = "opt-btn";
                btn.innerHTML = `<span>${item.peca} <small>(${item.exame})</small></span> <i class="fas fa-external-link-alt"></i>`;
                btn.onclick = () => {
                    document.getElementById('editor-principal').innerHTML = item.conteudo;
                    window.pecaAtual = item.peca;
                    window.modoAtivo = item.exame;
                    window.atualizarUI();
                    modal.style.display = 'none';
                };
                content.appendChild(btn);
            });
        } else { content.innerHTML = "Nenhum arquivo encontrado."; }
    };

</script>
</body>
</html>
