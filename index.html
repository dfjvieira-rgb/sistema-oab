<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALISSON PMDF ELITE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --gold-dark: #d97706;
            --bg-paper: #cbd5e1; --paper-color: #ffffff; 
            --mentoria: #a855f7; --sidebar-w: 70px; --perigo: #ef4444;
            --glass: rgba(30, 41, 59, 0.7);
            --questoes: #3b82f6; --teses: #f97316; --biblioteca: #475569;
        }

        body.dark-mode { --bg-paper: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--primary); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            color: white;
        }

        header { 
            background: var(--primary); 
            height: 60px; 
            padding: 0 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--gold); 
            z-index: 5000;
        }

        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--gold); }

        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .sidebar { 
            width: var(--sidebar-w); 
            background: #1e293b; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            gap: 10px; 
            padding: 15px 0; 
            border-right: 1px solid rgba(255,255,255,0.1); 
            overflow-y: auto; 
        }

        .btn-side { 
            width: 50px; min-height: 50px; border: none; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; color: white; 
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05);
            position: relative;
        }
        .btn-side:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
        .btn-side i { font-size: 1.1rem; color: var(--gold); }

        .editor-container { 
            flex: 1; display: flex; flex-direction: column; 
            background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px;
        }

        .sticky-tools { 
            position: sticky; top: -20px; z-index: 1000; background: white; 
            width: 100%; max-width: 850px; border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 10px;
        }

        #identificador-peca { 
            padding: 12px; background: #f8fafc; text-align: center; 
            font-weight: 900; color: #0f172a; border-bottom: 3px solid var(--gold);
        }
        
        .toolbar-liberdade { display: flex; background: #fff; flex-wrap: wrap; align-items: center; }
        .btn-lib { 
            flex: 1; padding: 12px; border: none; background: transparent; 
            cursor: pointer; font-weight: 800; font-size: 0.7rem; 
            text-transform: uppercase; color: #64748b; border-right: 1px solid #f1f5f9;
        }

        .highlight-box { display: flex; align-items: center; background: #f1f5f9; padding: 0 10px; gap: 8px; border-right: 1px solid #f1f5f9; height: 45px; }
        .color-dot { width: 20px; height: 20px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: #000; transform: scale(1.1); }

        .paper { width: 100%; max-width: 850px; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.4); min-height: 1500px; position: relative; }

        #pdf-viewer { width: 0; background: #334155; transition: 0.4s; display: flex; flex-direction: column; overflow: hidden; }
        #pdf-viewer.active { width: 50%; border-left: 4px solid var(--gold); }

        .pdf-controls { background: #1e293b; padding: 12px; display: flex; justify-content: space-between; color: white; font-weight: 900; font-size: 12px; }
        iframe { width: 100%; flex: 1; border: none; background: white; }

        /* MOBILE OPTIMIZATION */
        #mobile-hub { display: none; position: fixed; bottom: 30px; right: 25px; z-index: 99999; flex-direction: column-reverse; gap: 15px; }
        .fab-main { width: 65px; height: 65px; border-radius: 50%; background: var(--gold); border: none; font-size: 1.8rem; box-shadow: 0 8px 25px rgba(0,0,0,0.4); color: black; z-index: 2; }
        .fab-sub { width: 55px; height: 55px; border-radius: 50%; border: none; color: white; display: none; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #mobile-hub.active .fab-sub { display: flex; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 110000; align-items: center; justify-content: center; padding: 10px; }
        .modal-body { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; color: #0f172a; max-height: 90vh; overflow-y: auto; }
        .opt-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #eee; background: #f8fafc; font-weight: 800; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            #mobile-hub { display: flex; }
            #pdf-viewer.active { width: 100%; position: absolute; inset: 0; z-index: 8000; }
        }
    </style>
</head>
<body class="dark-mode">

<header>
    <div class="logo">JOAQUIM <span>ELITE</span></div>
    <div id="ex-display" style="color:var(--gold); font-size:10px; font-weight:bold;">PMDF MODE</div>
</header>

<main>
    <aside class="sidebar">
        <button class="btn-side" style="background:#facc15; color:#000" data-label="NOVO TREINO" onclick="window.limparFolha()"><i class="fas fa-edit"></i></button>
        <button class="btn-side" style="background:var(--questoes);" data-label="QUESTÕES" onclick="window.modoQuestoes=true; alert('Modo Questões Ativo')"><i class="fas fa-question-circle"></i></button>
        <button class="btn-side" style="background:var(--biblioteca);" data-label="BIBLIOTECA" onclick="window.abrirBibliotecaPDF()"><i class="fas fa-folder"></i></button>
        <button class="btn-side" style="background:#000; border:1px solid var(--gold); color:var(--gold)" data-label="NÚCLEO DURO" onclick="window.abrirNucleoDuroPMDF()"><i class="fas fa-shield-alt"></i></button>
        <button class="btn-side" style="background:#475569;" data-label="PERGAMINHO" onclick="window.abrirPergaminho()"><i class="fas fa-scroll"></i></button>
        <button class="btn-side" style="background:#10b981;" data-label="SALVAR" onclick="window.finalizarPeca()"><i class="fas fa-save"></i></button>
        <hr style="width:70%; opacity:0.1; margin:5px 0">
        <button class="btn-side" style="background:var(--mentoria);" onclick="window.open('mentoria.html', '_blank')"><i class="fas fa-robot"></i></button>
    </aside>

    <section class="editor-container">
        <div class="sticky-tools">
            <div id="identificador-peca" onclick="window.renomearTreino()">SCANNER ELITE... <i class="fas fa-pen" style="font-size:10px; opacity:0.5"></i></div>
            <div class="toolbar-liberdade">
                <button class="btn-lib" onclick="window.desfazer()"><i class="fas fa-undo"></i></button>
                <div class="highlight-box">
                    <button class="btn-lib" id="btn-highlight" onclick="window.toggleMarcaTexto()" style="border:none; flex:none;"><i class="fas fa-highlighter"></i></button>
                    <div class="color-dot active" style="background:#fef08a;" onclick="window.setHighlightColor('#fef08a', this)"></div>
                    <div class="color-dot" style="background:#bbf7d0;" onclick="window.setHighlightColor('#bbf7d0', this)"></div>
                </div>
                <button class="btn-lib" onclick="window.limparFolha()"><i class="fas fa-trash"></i></button>
                <button class="btn-lib" style="background:#22c55e; color:white" onclick="window.print()"><i class="fas fa-print"></i></button>
            </div>
        </div>
        <div class="paper">
            <div id="folha-total"></div>
        </div>
    </section>

    <section id="pdf-viewer">
        <div class="pdf-controls">
            <span id="pdf-title">DOCUMENTO</span>
            <button onclick="window.fecharPDF()" style="background:var(--gold); border:none; padding:4px 10px; border-radius:4px; cursor:pointer">X</button>
        </div>
        <iframe id="pdf-frame"></iframe>
    </section>

    <div id="mobile-hub">
        <button class="fab-main" onclick="window.toggleFoguete()"><i class="fas fa-rocket"></i></button>
        <button class="fab-sub" style="background:#000; border:1px solid var(--gold); color:var(--gold)" onclick="window.abrirNucleoDuroPMDF()"><i class="fas fa-shield-alt"></i></button>
        <button class="fab-sub" style="background:var(--biblioteca);" onclick="window.abrirBibliotecaPDF()"><i class="fas fa-folder"></i></button>
        <button class="fab-sub" style="background:#10b981;" onclick="window.finalizarPeca()"><i class="fas fa-save"></i></button>
        <button class="fab-sub" style="background:#475569;" onclick="window.abrirPergaminho()"><i class="fas fa-scroll"></i></button>
    </div>
</main>

<div class="modal" id="universal-modal">
    <div class="modal-body">
        <h2 id="modal-title" style="margin-bottom:20px; border-bottom:2px solid var(--gold)"></h2>
        <div id="modal-content"></div>
        <button onclick="document.getElementById('universal-modal').style.display='none'" style="width:100%; padding:15px; background:#000; color:#fff; border-radius:10px; margin-top:15px; cursor:pointer;">FECHAR</button>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js'; 
    import { ref, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { FolhaEngine } from './folha-engine.js';

    const RAIZ_PMDF = "producao_pmdf"; 
    window.db = db;
    window.historicoUndo = [];
    window.marcaTextoAtivo = false;
    window.currentColor = '#fef08a';
    window.pecaAtualNome = "NOVO TREINO PMDF";

    window.onload = async () => {
        FolhaEngine.montar('folha-total');
        await carregarRascunho();
        
        // Listener para o Editor
        setTimeout(() => {
            const ed = document.getElementById('editor-principal');
            if(ed) {
                ed.addEventListener('input', () => {
                    window.historicoUndo.push(ed.innerHTML);
                    if(window.historicoUndo.length > 20) window.historicoUndo.shift();
                });
                ed.addEventListener('mouseup', () => {
                    if(window.marcaTextoAtivo) {
                        const sel = window.getSelection();
                        if (sel.toString().length > 0) document.execCommand('backColor', false, window.currentColor);
                    }
                });
            }
        }, 1000);

        setInterval(salvarAutomatico, 30000);
    };

    window.abrirPDFDireto = (url, nome) => {
        // CORREÇÃO TELA ESCURA: Se for link externo do Planalto, abre em nova aba
        if (url.includes('planalto.gov.br')) {
            window.open(url, '_blank');
            return;
        }

        const v = document.getElementById('pdf-viewer');
        const f = document.getElementById('pdf-frame');
        document.getElementById('pdf-title').innerText = nome;
        f.src = url;
        v.classList.add('active');
    };

    window.abrirNucleoDuroPMDF = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "⚖️ NÚCLEO DURO PMDF";
        
        const leis = [
            { n: '📄 EDITAL PMDF 2023', u: 'edital-abertura-04-2023.pdf' },
            { n: '🛡️ ESTATUTO PMDF (L. 7289)', u: 'https://www.planalto.gov.br/ccivil_03/leis/l7289.htm' },
            { n: '⚔️ CÓD. PENAL MILITAR', u: 'https://www.planalto.gov.br/ccivil_03/decreto-lei/del1001.htm' },
            { n: '⚖️ PROC. PENAL MILITAR', u: 'https://www.planalto.gov.br/ccivil_03/decreto-lei/del1002.htm' },
            { n: '🏛️ LOB PMDF (L. 6450)', u: 'https://www.planalto.gov.br/ccivil_03/leis/l6450.htm' },
            { n: '🚫 ABUSO AUTORIDADE', u: 'https://www.planalto.gov.br/ccivil_03/_ato2019-2022/2019/lei/l13869.htm' }
        ];

        content.innerHTML = leis.map(l => `
            <div class="opt-btn" onclick="window.abrirPDFDireto('${l.u}','${l.n}')">
                <span>${l.n}</span> <i class="fas fa-external-link-alt"></i>
            </div>
        `).join('');
        modal.style.display = 'flex';
    };

    window.abrirBibliotecaPDF = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "📂 BIBLIOTECA PDF";
        const pdfs = [
            { n: "LINHA DO TEMPO", u: "LINHA DO TEMPO - Identificação de Peças_231123_182636.pdf" },
            { n: "REVISÃO RAULIN", u: "raulin.pdf" }
        ];
        content.innerHTML = pdfs.map(p => `<div class="opt-btn" onclick="window.abrirPDFDireto('${p.u}', '${p.n}')"><span>${p.n}</span></div>`).join('');
        modal.style.display = 'flex';
    };

    window.finalizarPeca = async () => {
        const ed = document.getElementById('editor-principal');
        if(!ed) return;
        if(!confirm("Salvar rascunho oficial PMDF?")) return;
        const id = Date.now();
        await set(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL/${id}`), {
            peca: window.pecaAtualNome,
            conteudo: ed.innerHTML,
            data: new Date().toLocaleString()
        });
        alert("Salvo com sucesso!");
    };

    async function salvarAutomatico() {
        const ed = document.getElementById('editor-principal');
        if(ed) await set(ref(db, `${RAIZ_PMDF}/RASCUNHO`), { conteudo: ed.innerHTML });
    }

    async function carregarRascunho() {
        const snap = await get(ref(db, `${RAIZ_PMDF}/RASCUNHO`));
        const ed = document.getElementById('editor-principal');
        if(snap.exists() && ed) ed.innerHTML = snap.val().conteudo;
    }

    window.setHighlightColor = (color, el) => {
        window.currentColor = color;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        window.marcaTextoAtivo = true;
    };

    window.toggleMarcaTexto = () => {
        window.marcaTextoAtivo = !window.marcaTextoAtivo;
        document.getElementById('btn-highlight').style.color = window.marcaTextoAtivo ? 'var(--gold)' : '#64748b';
    };

    window.desfazer = () => {
        const ed = document.getElementById('editor-principal');
        if(window.historicoUndo.length > 0) ed.innerHTML = window.historicoUndo.pop();
    };

    window.toggleFoguete = () => document.getElementById('mobile-hub').classList.toggle('active');
    window.fecharPDF = () => document.getElementById('pdf-viewer').classList.remove('active');
    window.limparFolha = () => { if(confirm("Limpar?")) document.getElementById('editor-principal').innerHTML = ""; };
</script>
</body>
</html>
