<script type="module">
    import { db } from './firebase-config.js'; 
    import { ref, get, set, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { FolhaEngine } from './folha-engine.js';
    
    import { renderizarVadeHTML } from './vade.js';

    window.db = db;
    const RAIZ_PMDF = "producao_pmdf"; 

    window.LISTA_PDF_BIBLIOTECA = [
        { nome: "📄 EDITAL PMDF 2023", url: "edital-abertura-04-2023.pdf" },
        { nome: "TABELA IDENTIFICAÇÃO DE PEÇAS", url: "identificacaopecas.pdf" },
        { nome: "RESUMINHO APOSTAS!", url: "RESUMINHO APOSTAS!.pdf" },
        { nome: "LINHA DO TEMPO - PEÇAS", url: "LINHA DO TEMPO - Identificação de Peças_231123_182636.pdf" },
        { nome: "TESES OAB 2ª FASE", url: "TESES-----OAB--SEGUNDA--FASE--TRABALHO.pdf" },
        { nome: "REVISÃO DE PEÇAS - RALIN", url: "raulin.pdf" },
        { nome: "100 ARTIGOS PARA GRIFAR", url: "100 ARTIGOS.PDF" }
    ];

    window.pecaAtualNome = localStorage.getItem('pecaAtualNome') || "NOVO TREINO PMDF";
    window.historicoUndo = [];
    window.currentColor = '#fef08a';

    window.onload = async () => {
        FolhaEngine.montar('folha-total');
        atualizarLabelPeca();
        await carregarRascunho();
        setInterval(salvarAutomatico, 30000);
    };

    window.abrirVadeMecum = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "⚖️ VADE MECUM ELITE";
        content.innerHTML = renderizarVadeHTML();
        modal.style.display = 'flex';
    };

    function atualizarLabelPeca() {
        const label = document.getElementById('nome-exibicao-peca');
        if(label) label.innerText = window.pecaAtualNome;
        localStorage.setItem('pecaAtualNome', window.pecaAtualNome);
    }

    window.renomearTrabalhoAtivo = () => {
        const novo = prompt("Novo nome para este trabalho:", window.pecaAtualNome);
        if(novo && novo.trim() !== "") { window.pecaAtualNome = novo.trim(); atualizarLabelPeca(); }
    };

    window.abrirBibliotecaPDF = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "📚 BIBLIOTECA ELITE";
        content.innerHTML = window.LISTA_PDF_BIBLIOTECA.map(pdf => `
            <div class="opt-btn" onclick="window.abrirPDFDireto('${pdf.url}','${pdf.nome}')">
                <span><i class="fas fa-file-pdf"></i> ${pdf.nome}</span>
            </div>
        `).join('');
        modal.style.display = 'flex';
    };

    window.gerenciadorPasta = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "📂 MINHA PASTA";
        content.innerHTML = `
            <div class="opt-btn" onclick="window.abrirGavetaEspecifica('QUESTÕES')"><span>PASTA: QUESTÕES</span></div>
            <div class="opt-btn" onclick="window.abrirGavetaEspecifica('REDAÇÃO')"><span>PASTA: REDAÇÃO</span></div>
            <div class="opt-btn" onclick="window.abrirSubPastasCaderno()" style="border-left: 5px solid var(--mentoria)"><span>📓 CADERDE MATÉRIAS</span></div>
        `;
        modal.style.display = 'flex';
    };

    window.abrirSubPastasCaderno = () => {
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "📓 MEU CADERNO";
        const materias = [
            "DIREITO PENAL", "DIREITO PROC. PENAL", "DIREITO CONSTITUCIONAL", 
            "DIREITO ADMINISTRATIVO", "DIREITO PENAL MILITAR", "DIREITO PROC. PENAL MILITAR",
            "LEGISLAÇÃO PMDF", "CRIMINOLOGIA", "DIREITOS HUMANOS"
        ];
        
        content.innerHTML = `<div onclick="window.gerenciadorPasta()" style="cursor:pointer; color:var(--gold); font-weight:bold; margin-bottom:15px;"><i class="fas fa-arrow-left"></i> VOLTAR ÀS PASTAS</div>`;
        
        materias.forEach(mat => {
            const div = document.createElement('div');
            div.className = "opt-btn";
            div.onclick = () => window.abrirGavetaEspecifica(mat);
            div.innerHTML = `<span><i class="fas fa-book"></i> ${mat}</span> <i class="fas fa-chevron-right" style="opacity:0.3"></i>`;
            content.appendChild(div);
        });
    };

    window.finalizarPeca = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "💾 SALVAR EM...";
        
        const pastasDestino = [
            "QUESTÕES", "REDAÇÃO", "DIREITO PENAL", "DIREITO PROC. PENAL", 
            "DIREITO CONSTITUCIONAL", "DIREITO ADMINISTRATIVO", "DIREITO PENAL MILITAR", 
            "DIREITO PROC. PENAL MILITAR", "LEGISLAÇÃO PMDF", "CRIMINOLOGIA", "DIREITOS HUMANOS"
        ];
        
        content.innerHTML = `
            <div style="background:#fff3cd; color:#856404; padding:10px; border-radius:8px; font-size:11px; margin-bottom:15px; font-weight:bold; text-align:center;">
                ARQUIVO: ${window.pecaAtualNome}
            </div>
            <div style="max-height: 350px; overflow-y: auto; padding-right: 5px;">
                ${pastasDestino.map(pasta => `
                    <div class="opt-btn" onclick="window.executarSalvamentoInteligente('${pasta}')"><span>${pasta}</span></div>
                `).join('')}
            </div>
        `;
        modal.style.display = 'flex';
    };

    window.executarSalvamentoInteligente = async (pasta) => {
        const ed = document.getElementById('editor-principal');
        if(!ed || !ed.innerText.trim()) return alert("Folha vazia!");
        
        const snap = await get(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL`));
        let idParaUsar = null;

        if (snap.exists()) {
            const dados = snap.val();
            for (let id in dados) {
                if (dados[id].peca === window.pecaAtualNome && dados[id].exame === pasta) {
                    idParaUsar = id;
                    break;
                }
            }
        }

        if (!idParaUsar) {
            idParaUsar = Date.now();
        }
        
        await set(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL/${idParaUsar}`), {
            exame: pasta, 
            peca: window.pecaAtualNome, 
            conteudo: ed.innerHTML,
            data: new Date().toLocaleString()
        });

        alert(idParaUsar.toString().length > 13 ? "Arquivo atualizado com sucesso!" : "Novo arquivo salvo com sucesso!");
        document.getElementById('universal-modal').style.display = 'none';
    };

    window.abrirGavetaEspecifica = async (tipo) => {
        const content = document.getElementById('modal-content');
        const snap = await get(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL`));
        const eMateria = !["QUESTÕES", "REDAÇÃO"].includes(tipo);
        
        content.innerHTML = `<div onclick="${eMateria ? 'window.abrirSubPastasCaderno()' : 'window.gerenciadorPasta()'}" style="cursor:pointer; color:var(--gold); font-weight:bold; margin-bottom:15px;"><i class="fas fa-arrow-left"></i> VOLTAR</div>`;
        
        if (snap.exists()) {
            let temArquivo = false;
            Object.keys(snap.val()).forEach(k => {
                const item = snap.val()[k];
                if(item.exame === tipo) {
                    temArquivo = true;
                    const div = document.createElement('div');
                    div.style.cssText = "display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #eee; background:#f8fafc; border-radius:8px; margin-bottom:5px; align-items:center;";
                    div.innerHTML = `<span onclick="window.carregarTrabalho('${k}')" style="cursor:pointer; font-weight:bold; font-size:12px;">📄 ${item.peca}</span>
                        <i class="fas fa-trash" onclick="window.excluirTrabalho('${k}', '${tipo}')" style="color:red; cursor:pointer; padding:10px;"></i>`;
                    content.appendChild(div);
                }
            });
            if(!temArquivo) content.innerHTML += `<p style="text-align:center; opacity:0.5; margin-top:20px;">Nenhum arquivo em ${tipo}.</p>`;
        } else {
            content.innerHTML += `<p style="text-align:center; opacity:0.5; margin-top:20px;">Nenhum arquivo nesta pasta.</p>`;
        }
    };

    window.carregarTrabalho = async (id) => {
        const snap = await get(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL/${id}`));
        if(snap.exists()){
            document.getElementById('editor-principal').innerHTML = snap.val().conteudo;
            window.pecaAtualNome = snap.val().peca;
            atualizarLabelPeca();
            document.getElementById('universal-modal').style.display = 'none';
        }
    };

    window.excluirTrabalho = async (id, tipo) => {
        if(confirm("Excluir este arquivo?")) { 
            await remove(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL/${id}`)); 
            window.abrirGavetaEspecifica(tipo); 
        }
    };

    async function salvarAutomatico() { const ed = document.getElementById('editor-principal'); if(ed) await set(ref(db, `${RAIZ_PMDF}/RASCUNHO`), { conteudo: ed.innerHTML }); }
    async function carregarRascunho() { const snap = await get(ref(db, `${RAIZ_PMDF}/RASCUNHO`)); if(snap.exists()) document.getElementById('editor-principal').innerHTML = snap.val().conteudo; }
    
    window.abrirPDFDireto = (u, n) => { 
        document.getElementById('pdf-title').innerText = n; 
        document.getElementById('pdf-frame').src = u; 
        document.getElementById('pdf-viewer').classList.add('active'); 
        document.getElementById('universal-modal').style.display = 'none'; 
    };
    
    window.fecharPDF = () => document.getElementById('pdf-viewer').classList.remove('active');
    window.limparFolha = () => { if(confirm("Limpar papel?")) document.getElementById('editor-principal').innerHTML = ""; };
    window.toggleRecolherEditor = () => { document.getElementById('pdf-viewer').classList.toggle('full-view'); };
    window.ativarTreinoLivre = () => { if(confirm("Novo treino em branco?")) { window.limparFolha(); window.pecaAtualNome = "NOVO TREINO PMDF"; atualizarLabelPeca(); } };
    window.abrirMentoria = () => window.location.href = 'mentoria.html';
    window.toggleFoguete = () => document.getElementById('mobile-hub').classList.toggle('active');

    window.abrirExames = () => alert("Módulo de Exames OAB.");
    window.ativarModoQuestoes = () => alert("Modo Questões Ativo.");
    window.ativarModoTeses = () => alert("Modo Treino Teses Ativo.");
    
    // --- CIRURGIA: INTELIGÊNCIA DE MARCA-TEXTO ATIVADA ---
    window.setHighlightColor = (color, id) => {
        window.currentColor = color;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        // CORREÇÃO: Aplicação imediata se houver seleção ao clicar na bolinha de cor
        const sel = window.getSelection();
        if (sel.rangeCount > 0 && !sel.isCollapsed) {
            window.toggleMarcaTexto();
        }
    };

    window.toggleMarcaTexto = () => {
        const ed = document.getElementById('editor-principal');
        const sel = window.getSelection();
        
        if (sel.rangeCount > 0 && !sel.isCollapsed) {
            // Salva estado para o Desfazer
            if(ed) {
                window.historicoUndo.push(ed.innerHTML);
                if(window.historicoUndo.length > 30) window.historicoUndo.shift();
            }

            // Garante que o comando seja executado na área correta
            ed.focus();
            
            // EXECUÇÃO DO PINCEL
            if (window.currentColor === 'transparent') {
                document.execCommand('removeFormat', false, null);
            } else {
                document.execCommand('hiliteColor', false, window.currentColor);
            }
        } else {
            // Só exibe o alerta se o usuário clicar no ícone do pincel sem ter selecionado nada
            alert("Selecione um texto na folha para marcar.");
        }
    };

    window.desfazer = () => { 
        const ed = document.getElementById('editor-principal'); 
        if(window.historicoUndo.length > 0) {
            ed.innerHTML = window.historicoUndo.pop(); 
        } else {
            alert("Nada para desfazer.");
        }
    };

    window.abrirPergaminho = () => {
        const modal = document.getElementById('universal-modal');
        document.getElementById('modal-title').innerText = "📜 PERGAMINHO";
        const content = document.getElementById('modal-content');
        content.innerHTML = "";
        if(typeof pecas !== 'undefined') {
            Object.keys(pecas).forEach(k => {
                const b = document.createElement('div'); b.className = 'opt-btn';
                b.innerHTML = `<span>${k}</span> <i class="fas fa-plus"></i>`;
                b.onclick = () => { 
                    FolhaEngine.injetarTextoMultilinhas(pecas[k]); 
                    modal.style.display='none';
                    if(window.innerWidth < 768) window.toggleFoguete();
                };
                content.appendChild(b);
            });
            modal.style.display = 'flex';
        } else {
            alert("Estruturas de peças não carregadas.");
        }
    };

    window.injetarTeses = () => {
        if(typeof BANCO_ESPELHOS !== 'undefined' && window.activeEx && BANCO_ESPELHOS[window.activeEx]) {
            const dna = BANCO_ESPELHOS[window.activeEx];
            FolhaEngine.injetarTextoMultilinhas(dna);
            if(window.innerWidth < 768) window.toggleFoguete();
        } else { alert("Sem espelho ou dados para injetar."); }
    };
</script>
