<!DOCTYPE html>
<html lang="pt-BR">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALISSON ELITE 2026 - MASTER ICON</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --gold-dark: #d97706;
            --bg-paper: #cbd5e1; --paper-color: #ffffff;
            --mentoria: #a855f7; --sidebar-w: 200px; --perigo: #ef4444;
            --glass: rgba(30, 41, 59, 0.7);
            --questoes: #3b82f6; --teses: #f97316; --biblioteca: #475569;
            --vade: #16a34a; 
        }

        body.dark-mode { --bg-paper: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: white;
        }

        header {
            background: var(--primary);
            height: 60px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            z-index: 5000;
        }

        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--gold); }

        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .sidebar {
            width: var(--sidebar-w);
            background: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            padding: 15px 10px;
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .btn-side {
            width: 100%; min-height: 45px; border: none; border-radius: 8px;
            display: flex; align-items: center; justify-content: flex-start; color: white;
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05);
            padding: 0 12px; gap: 12px;
            position: relative;
        }
        .btn-side:hover { background: rgba(255,255,255,0.15); transform: translateX(5px); }
        .btn-side i { font-size: 1rem; color: var(--gold); width: 20px; text-align: center; }
        .btn-side span { font-size: 10px; font-weight: 800; text-transform: uppercase; white-space: nowrap; }

        .editor-container {
            flex: 1; display: flex; flex-direction: column;
            background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px;
            transition: all 0.4s ease;
        }

        .sticky-tools {
            position: sticky; top: -20px; z-index: 1000; background: white;
            width: 100%; max-width: 850px; border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 10px;
        }

        #identificador-peca {
            padding: 15px; background: #f8fafc; text-align: center;
            font-weight: 900; color: #020617; border-bottom: 3px solid var(--gold);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            gap: 10px; font-size: 14px; text-transform: uppercase;
        }
        
        .toolbar-liberdade { display: flex; background: #fff; flex-wrap: wrap; align-items: center; }
        .btn-lib {
            flex: 1; padding: 12px; border: none; background: transparent;
            cursor: pointer; font-weight: 800; font-size: 0.7rem;
            text-transform: uppercase; color: #64748b; border-right: 1px solid #f1f5f9;
        }

        .paper { width: 100%; max-width: 850px; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.4); min-height: 5250px; position: relative; }

        #pdf-viewer { width: 0; background: #334155; transition: 0.4s; display: flex; flex-direction: column; border-left: 0 solid var(--gold); overflow: hidden; }
        #pdf-viewer.active { width: 50%; border-left: 4px solid var(--gold); }
        #pdf-viewer.full-view { width: 100% !important; flex: 1; }

        #mobile-hub { display: none; position: fixed; bottom: 30px; right: 25px; z-index: 99999; flex-direction: column-reverse; gap: 12px; }
        .fab-main { width: 65px; height: 65px; border-radius: 50%; background: var(--gold); border: none; font-size: 1.8rem; box-shadow: 0 8px 25px rgba(0,0,0,0.4); cursor: pointer; color: black; }
        .fab-sub { width: 50px; height: 50px; border-radius: 50%; border: none; color: white; display: none; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; }
        #mobile-hub.active .fab-sub { display: flex; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 110000; align-items: center; justify-content: center; }
        .modal-body { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 20px; color: #0f172a; max-height: 85vh; overflow-y: auto; }
        .opt-btn { width: 100%; padding: 18px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #eee; background: #f8fafc; font-weight: 800; display: flex; justify-content: space-between; cursor: pointer; align-items: center; }

        .file-actions { display: flex; gap: 5px; align-items: center; }
        .btn-action-small { padding: 8px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-rename { background: #e2e8f0; color: #475569; }
        .btn-move { background: #fef9c3; color: #854d0e; }
        .btn-delete { background: #fee2e2; color: #b91c1c; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            #mobile-hub { display: flex; }
            #pdf-viewer.active { width: 100%; position: absolute; right: 0; top: 0; height: 100%; z-index: 8000; }
        }
    </style>
</head>
<body class="dark-mode">

<header>
    <div class="logo">ALISSON <span>PMDF</span></div>
    <div style="color:var(--gold); font-size:10px; font-weight:bold;">MODO: <span id="ex-display">--</span></div>
</header>

<main>
    <aside class="sidebar" id="sidebar-main">
        <button class="btn-side" style="background:var(--gold); color:#000" onclick="window.abrirExames()"><i class="fas fa-list"></i> <span>EXAMES OAB</span></button>
        <button class="btn-side" style="background:#facc15; color:#000" onclick="window.ativarTreinoLivre()"><i class="fas fa-edit"></i> <span>NOVO TREINO</span></button>
        <button class="btn-side" style="background:var(--vade); color:#fff" onclick="window.abrirVadeMecum()"><i class="fas fa-book-open"></i> <span>VADE MECUM</span></button>
        <button class="btn-side" style="background:var(--questoes); color:#fff" onclick="window.ativarModoQuestoes()"><i class="fas fa-question-circle"></i> <span>QUESTÕES</span></button>
        <button class="btn-side" style="background:var(--teses); color:#fff" onclick="window.ativarModoTeses()"><i class="fas fa-gavel"></i> <span>TREINO TESES</span></button>
        <button class="btn-side" style="background:var(--biblioteca); color:#fff" onclick="window.abrirBibliotecaPDF()"><i class="fas fa-folder"></i> <span>BIBLIOTECA</span></button>
        <button class="btn-side" style="background:#334155;" onclick="window.gerenciadorPasta()"><i class="fas fa-folder-open"></i> <span>MINHA PASTA</span></button>
        <button class="btn-side" style="background:#10b981;" onclick="window.finalizarPeca()"><i class="fas fa-save"></i> <span>SALVAR</span></button>
        <hr style="width:100%; opacity:0.1; margin:5px 0">
        <button class="btn-side" style="background:var(--mentoria);" onclick="window.abrirMentoria()"><i class="fas fa-robot"></i> <span>MENTORIA IA</span></button>
        <button class="btn-side" style="background:#3b82f6;" onclick="window.injetarTeses()"><i class="fas fa-hammer"></i> <span>MARTELO</span></button>
    </aside>

    <section class="editor-container" id="editor-container">
        <div class="sticky-tools">
            <div id="identificador-peca" onclick="window.renomearTrabalhoAtivo()">
                <i class="fas fa-file-signature" style="color:var(--gold)"></i>
                <span id="nome-exibicao-peca">NOVO TREINO PMDF</span>
                <i class="fas fa-pen" style="font-size:10px; opacity:0.3; margin-left:10px"></i>
            </div>
            
            <div class="toolbar-liberdade">
                <button class="btn-lib" style="background:#64748b; color:white" onclick="window.desfazer()"><i class="fas fa-undo"></i> Desfazer</button>
                <button class="btn-lib" onclick="window.limparFolha()"><i class="fas fa-trash"></i> Limpar</button>
                <button class="btn-lib" id="btn-foco" onclick="window.toggleRecolherEditor()"><i class="fas fa-expand"></i> Foco PDF</button>
                <button class="btn-lib" style="background:#22c55e; color:white" onclick="window.print()"><i class="fas fa-print"></i> PDF</button>
            </div>
        </div>
        <div class="paper">
            <div id="folha-total"></div>
        </div>
    </section>

    <section id="pdf-viewer">
        <div class="pdf-controls" style="background: #1e293b; padding: 12px; display: flex; justify-content: space-between; color: white; font-weight: 900; font-size: 12px; align-items: center;">
            <div>
                <button onclick="window.toggleRecolherEditor()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:4px 8px; border-radius:4px; font-size:10px; cursor:pointer; margin-right:10px;">
                    <i class="fas fa-arrows-alt-h"></i> VOLTAR EDITOR
                </button>
                <span id="pdf-title">DOCUMENTO</span>
            </div>
            <button onclick="window.fecharPDF()" style="background:var(--gold); border:none; padding:4px 10px; border-radius:4px; font-weight:bold; cursor:pointer">X</button>
        </div>
        <iframe id="pdf-frame" style="width:100%; flex:1; border:none;"></iframe>
    </section>

    <div id="mobile-hub">
        <button class="fab-main" onclick="window.toggleFoguete()"><i class="fas fa-rocket" id="rocket-icon"></i></button>
        <button class="fab-sub" style="background:var(--vade);" onclick="window.abrirVadeMecum()"><i class="fas fa-book-open"></i></button>
        <button class="fab-sub" style="background:var(--biblioteca);" onclick="window.abrirBibliotecaPDF()"><i class="fas fa-folder"></i></button>
        <button class="fab-sub" style="background:var(--gold);" onclick="window.abrirExames()"><i class="fas fa-list"></i></button>
    </div>
</main>

<div class="modal" id="universal-modal">
    <div class="modal-body">
        <h2 id="modal-title" style="margin-bottom:20px; border-bottom:2px solid var(--gold)"></h2>
        <div id="modal-content"></div>
        <button onclick="document.getElementById('universal-modal').style.display='none'" style="width:100%; padding:15px; background:#000; color:#fff; border-radius:10px; margin-top:15px; font-weight:bold; cursor:pointer;">FECHAR</button>
    </div>
</div>

    import { FolhaEngine } from './folha-engine.js';
    import { renderizarVadeHTML } from './vade.js';

    window.db = db;
    const RAIZ_PMDF = "producao_pmdf";
    const ID_EDITOR = "editor-principal-pmdf"; // Constante para blindagem

    window.pecaAtualNome = localStorage.getItem('pecaAtualNome_pmdf') || "NOVO TREINO PMDF";
    
    window.onload = async () => {
        FolhaEngine.montar('folha-total');
        atualizarLabelPeca();
        await carregarRascunho();
        setInterval(salvarAutomatico, 30000);
    };

    function atualizarLabelPeca() {
        const label = document.getElementById('nome-exibicao-peca');
        if(label) label.innerText = window.pecaAtualNome;
        localStorage.setItem('pecaAtualNome_pmdf', window.pecaAtualNome);
    }

    window.renomearTrabalhoAtivo = () => {
        const novo = prompt("Novo nome para este trabalho:", window.pecaAtualNome);
        if(novo && novo.trim() !== "") { window.pecaAtualNome = novo.trim(); atualizarLabelPeca(); }
    };

    window.gerenciadorPasta = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = " MINHA PASTA";
        content.innerHTML = `
            <div class="opt-btn" onclick="window.abrirGavetaEspecifica('QUESTÕES')"><span>PASTA: QUESTÕES</span></div>
            <div class="opt-btn" onclick="window.abrirGavetaEspecifica('REDAÇÃO')"><span>PASTA: REDAÇÃO</span></div>
            <div class="opt-btn" onclick="window.abrirSubPastasCaderno()" style="border-left: 5px solid var(--mentoria)"><span> CADERNO DE MATÉRIAS</span></div>
        `;
        modal.style.display = 'flex';
    };

    window.abrirSubPastasCaderno = () => {
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = " MEU CADERNO";
        content.innerHTML = `<div onclick="window.gerenciadorPasta()" style="cursor:pointer; color:var(--gold); font-weight:bold; margin-bottom:15px;"><i class="fas fa-arrow-left"></i> VOLTAR ÀS PASTAS</div>`;
        MATERIAS_MESTRE.forEach(mat => {
            const div = document.createElement('div');
            div.className = "opt-btn";
            div.onclick = () => window.abrirGavetaEspecifica(mat);
            div.innerHTML = `<span><i class="fas fa-book"></i> ${mat}</span> <i class="fas fa-chevron-right" style="opacity:0.3"></i>`;
            content.appendChild(div);
        });
    };

    window.abrirGavetaEspecifica = async (tipo) => {
        const content = document.getElementById('modal-content');
        const snap = await get(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL`));
        const eMateria = MATERIAS_MESTRE.includes(tipo);
        
        content.innerHTML = `<div onclick="${eMateria ? 'window.abrirSubPastasCaderno()' : 'window.gerenciadorPasta()'}" style="cursor:pointer; color:var(--gold); font-weight:bold; margin-bottom:15px;"><i class="fas fa-arrow-left"></i> VOLTAR</div>`;
        
        if (snap.exists()) {
            Object.keys(snap.val()).forEach(k => {
                const item = snap.val()[k];
                if(item.exame === tipo) {
                    const div = document.createElement('div');
                    div.style.cssText = "display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #eee; background:#f8fafc; border-radius:8px; margin-bottom:5px; align-items:center;";
                    div.innerHTML = `
                        <span onclick="window.carregarTrabalho('${k}')" style="cursor:pointer; font-weight:bold; font-size:12px; flex:1;"> ${item.peca}</span>
                        <div class="file-actions">
                            <button class="btn-action-small btn-rename" title="Renomear" onclick="window.renomearArquivo('${k}', '${tipo}')"><i class="fas fa-edit"></i></button>
                            <button class="btn-action-small btn-move" title="Mover Pasta" onclick="window.moverArquivo('${k}', '${tipo}')"><i class="fas fa-folder-minus"></i></button>
                            <button class="btn-action-small btn-delete" title="Excluir" onclick="window.excluirTrabalho('${k}', '${tipo}')"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    content.appendChild(div);
                }
            });
        }
    };

    window.renomearArquivo = async (id, tipo) => {
        const snap = await get(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL/${id}`));
        const nomeAntigo = snap.val().peca;
        const novoNome = prompt("Renomear arquivo para:", nomeAntigo);
        if (novoNome && novoNome.trim() !== "" && novoNome !== nomeAntigo) {
            await update(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL/${id}`), { peca: novoNome.trim() });
            window.abrirGavetaEspecifica(tipo);
        }
    };

    window.moverArquivo = async (id, tipoOrigem) => {
        const todasAsPastas = ["QUESTÕES", "REDAÇÃO", ...MATERIAS_MESTRE];
        const novaPasta = prompt("Mover para qual pasta?\nOpções: " + todasAsPastas.join(", "), tipoOrigem);
        
        if (novaPasta && todasAsPastas.includes(novaPasta.toUpperCase()) && novaPasta.toUpperCase() !== tipoOrigem) {
            await update(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL/${id}`), { exame: novaPasta.toUpperCase() });
            window.abrirGavetaEspecifica(tipoOrigem);
        } else if (novaPasta && !todasAsPastas.includes(novaPasta.toUpperCase())) {
            alert("Pasta inválida!");
        }
    };

    window.finalizarPeca = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = " SALVAR EM...";
        const todasAsPastas = ["QUESTÕES", "REDAÇÃO", ...MATERIAS_MESTRE];
        content.innerHTML = `<div style="max-height: 350px; overflow-y: auto;">${todasAsPastas.map(pasta => `<div class="opt-btn" onclick="window.executarSalvamentoInteligente('${pasta}')"><span>${pasta}</span></div>`).join('')}</div>`;
        modal.style.display = 'flex';
    };

    window.executarSalvamentoInteligente = async (pasta) => {
        const ed = document.getElementById(ID_EDITOR);
        if(!ed || !ed.innerText.trim()) return alert("Folha vazia!");
        const idParaUsar = Date.now();
        await set(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL/${idParaUsar}`), { exame: pasta, peca: window.pecaAtualNome, conteudo: ed.innerHTML, data: new Date().toLocaleString() });
        alert("Salvo em " + pasta);
        document.getElementById('universal-modal').style.display = 'none';
    };

    window.carregarTrabalho = async (id) => {
        const snap = await get(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL/${id}`));
        if(snap.exists()){ 
            document.getElementById(ID_EDITOR).innerHTML = snap.val().conteudo; 
            window.pecaAtualNome = snap.val().peca; 
            atualizarLabelPeca(); 
            document.getElementById('universal-modal').style.display = 'none'; 
        }
    };

    window.excluirTrabalho = async (id, tipo) => { if(confirm("Excluir arquivo permanentemente?")) { await remove(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL/${id}`)); window.abrirGavetaEspecifica(tipo); } };
    
    // Rascunho isolado por caminho no Firebase
    async function salvarAutomatico() { 
        const ed = document.getElementById(ID_EDITOR); 
        if(ed) await set(ref(db, `${RAIZ_PMDF}/RASCUNHO_PMDF`), { conteudo: ed.innerHTML }); 
    }
    
    async function carregarRascunho() { 
        const snap = await get(ref(db, `${RAIZ_PMDF}/RASCUNHO_PMDF`)); 
        if(snap.exists()) document.getElementById(ID_EDITOR).innerHTML = snap.val().conteudo; 
    }

    window.fecharPDF = () => document.getElementById('pdf-viewer').classList.remove('active');
    
    window.limparFolha = () => { 
        if(confirm("Limpar papel?")) document.getElementById(ID_EDITOR).innerHTML = ""; 
    };
    
    window.toggleRecolherEditor = () => { document.getElementById('pdf-viewer').classList.toggle('full-view'); };
    
    window.ativarTreinoLivre = () => { 
        if(confirm("Novo treino em branco?")) { 
            window.limparFolha(); 
            window.pecaAtualNome = "NOVO TREINO PMDF"; 
            atualizarLabelPeca(); 
        } 
    };
    
    window.abrirMentoria = () => window.location.href = 'mentoria.html';
    window.toggleFoguete = () => document.getElementById('mobile-hub').classList.toggle('active');
    window.desfazer = () => { document.execCommand('undo', false, null); };
</script>
</body>
</html>
