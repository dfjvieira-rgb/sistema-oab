<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JOAQUIM ELITE 2026 - PMDF MASTER</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; 
            --bg-paper: #cbd5e1; --sidebar-w: 70px;
            /* MODELO OAB VALIDADO */
            --altura-linha: 35px; 
        }

        body.dark-mode { --bg-paper: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--primary); height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            background: var(--primary); height: 60px; padding: 0 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--gold); z-index: 5000;
        }

        .logo { font-size: 1.2rem; font-weight: 900; color: white; }
        .logo span { color: var(--gold); }

        main { display: flex; flex: 1; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { 
            width: var(--sidebar-w); background: #1e293b; 
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; padding: 15px 0; border-right: 1px solid rgba(255,255,255,0.1); 
        }

        .btn-side { 
            width: 50px; height: 50px; border: none; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; color: white; 
            cursor: pointer; background: rgba(255,255,255,0.05); transition: 0.2s;
        }
        .btn-side i { font-size: 1.2rem; color: var(--gold); }

        /* EDITOR CONTAINER */
        .editor-container { 
            flex: 1; display: flex; flex-direction: column; 
            background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px;
        }

        .sticky-tools { 
            position: sticky; top: -20px; z-index: 1000; background: white; 
            width: 100%; max-width: 850px; border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #identificador-redacao { 
            padding: 12px; background: #f8fafc; text-align: center; 
            font-weight: 900; color: #0f172a; border-bottom: 2px solid var(--gold);
            cursor: pointer; text-transform: uppercase;
        }
        
        .toolbar-liberdade { display: flex; background: #fff; align-items: center; border-radius: 0 0 12px 12px; height: 50px;}

        /* PALETA 5 CORES + BORRACHA */
        .highlight-box { display: flex; align-items: center; padding: 0 15px; gap: 8px; border-right: 1px solid #eee; height: 100%;}
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid #ddd; transition: 0.2s;}
        .color-dot.active { border-color: #000; transform: scale(1.2); }
        .btn-eraser { background: none; border: none; cursor: pointer; color: #64748b; font-size: 1.1rem; margin-left: 5px; }

        /* --- FOLHA OAB VALIDADA --- */
        .paper { 
            width: 100%; max-width: 850px; background: white; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); margin-top: 20px;
        }
        
        .folha-grid { 
            display: grid; 
            grid-template-columns: 50px 1fr; 
            border-left: 1px solid #000; border-right: 1px solid #000;
        }
        
        .num-lateral { 
            background: #f1f5f9; 
            border-right: 2px solid #000;
            user-select: none;
        }

        .linha-num { 
            height: var(--altura-linha); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 13px; font-weight: 900; color: #000;
            border-bottom: 1px solid #000;
        }
        
        .area-escrita { 
            outline: none; padding: 0 15px; 
            font-family: 'Courier New', Courier, monospace !important; 
            font-size: 20px !important; 
            font-weight: 700 !important; 
            color: #000 !important;
            line-height: var(--altura-linha) !important; 
            text-align: justify; white-space: pre-wrap;
            min-height: calc(var(--altura-linha) * 150);
            background-image: linear-gradient(transparent calc(var(--altura-linha) - 1px), #00000033 1px);
            background-size: 100% var(--altura-linha);
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; }
        .modal-body { background: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 15px; color: #020617; }
        .item-arquivo { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .opt-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #e2e8f0; background: #f8fafc; font-weight: 800; cursor: pointer; text-align: left; }
        
        #pdf-viewer { width: 0; background: #334155; transition: 0.3s; display: flex; flex-direction: column; overflow: hidden; }
        #pdf-viewer.active { width: 45%; border-left: 4px solid var(--gold); }
        .pdf-controls { background: #1e293b; padding: 10px; display: flex; justify-content: space-between; color: white; }
        iframe { width: 100%; flex: 1; border: none; background: white; }
    </style>
</head>
<body class="dark-mode">

<header>
    <div class="logo">JOAQUIM <span>ELITE 2026</span></div>
    <div style="color:var(--gold); font-size:12px; font-weight:bold;">SISTEMA: <span id="modo-display">STANDBY</span></div>
</header>

<main>
    <aside class="sidebar">
        <button class="btn-side" onclick="window.novaMissao()"><i class="fas fa-plus-circle"></i></button>
        <button class="btn-side" onclick="window.gerenciadorPasta()"><i class="fas fa-archive"></i></button>
        <button class="btn-side" onclick="window.abrirNucleoDuro()"><i class="fas fa-gavel"></i></button>
        <hr style="width:50%; opacity:0.1; margin: 10px 0">
        <button class="btn-side" onclick="window.salvarComEscolha()"><i class="fas fa-save" style="color:#10b981"></i></button>
        <button class="btn-side" onclick="window.print()"><i class="fas fa-file-pdf" style="color:#ef4444"></i></button>
    </aside>

    <section class="editor-container">
        <div class="sticky-tools">
            <div id="identificador-redacao" onclick="window.renomear()">CLIQUE EM NOVA MISSÃO...</div>
            <div class="toolbar-liberdade">
                <div class="highlight-box">
                    <div class="color-dot active" id="c1" style="background:#fef08a;" onclick="window.setHighlight('#fef08a', 'c1')"></div>
                    <div class="color-dot" id="c2" style="background:#bbf7d0;" onclick="window.setHighlight('#bbf7d0', 'c2')"></div>
                    <div class="color-dot" id="c3" style="background:#fed7aa;" onclick="window.setHighlight('#fed7aa', 'c3')"></div>
                    <div class="color-dot" id="c4" style="background:#bfdbfe;" onclick="window.setHighlight('#bfdbfe', 'c4')"></div>
                    <div class="color-dot" id="c5" style="background:#fbcfe8;" onclick="window.setHighlight('#fbcfe8', 'c5')"></div>
                    <button class="btn-eraser" onclick="window.limparFormatacao()"><i class="fas fa-eraser"></i></button>
                </div>
                <button style="flex:1; border:none; background:none; cursor:pointer; font-weight:bold;" onclick="document.execCommand('undo')">Desfazer</button>
                <button style="flex:1; border:none; background:none; cursor:pointer; font-weight:bold; color:red;" onclick="window.limparFolha()">Limpar Tudo</button>
            </div>
        </div>
        
        <div class="paper">
            <div class="folha-grid" id="folha-total"></div>
        </div>
    </section>

    <section id="pdf-viewer">
        <div class="pdf-controls"><span id="pdf-title">VADE MECUM</span><button onclick="window.fecharPDF()">X</button></div>
        <iframe id="pdf-frame"></iframe>
    </section>
</main>

<div class="modal" id="universal-modal">
    <div class="modal-body">
        <h3 id="modal-title" style="margin-bottom:15px; border-bottom: 2px solid var(--gold)"></h3>
        <div id="modal-content"></div>
        <button onclick="document.getElementById('universal-modal').style.display='none'" style="width:100%; margin-top:15px; padding:12px; border:none; background:#000; color:#fff; border-radius:8px; cursor:pointer">VOLTAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://masteroab-db5e1-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.idAtual = null; 
    window.gavetaAtual = null;
    window.redacaoNome = "";
    window.currentColor = '#fef08a';

    window.onload = () => {
        const f = document.getElementById('folha-total');
        let nums = '<div class="num-lateral">';
        for(let i=1; i<=150; i++) nums += `<div class="linha-num">${i}</div>`;
        nums += '</div><div class="area-escrita" id="editor-principal" contenteditable="true" spellcheck="false"></div>';
        f.innerHTML = nums;

        document.getElementById('editor-principal').addEventListener('mouseup', () => { 
            if (window.getSelection().toString().length > 0) document.execCommand('backColor', false, window.currentColor); 
        });
    };

    window.setHighlight = (c, id) => {
        window.currentColor = c;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.limparFormatacao = () => {
        document.execCommand('removeFormat', false, null);
        document.execCommand('backColor', false, 'transparent');
    };

    window.novaMissao = () => {
        const n = prompt("Nome da Redação/Questão:");
        if(n) {
            window.idAtual = "RED_" + Date.now();
            window.redacaoNome = n.toUpperCase();
            window.gavetaAtual = null;
            document.getElementById('editor-principal').innerHTML = "";
            window.atualizarUI();
        }
    };

    window.salvarComEscolha = async () => {
        if(!window.idAtual) return alert("Inicie uma Missão.");
        if(window.gavetaAtual) return window.executarSave(window.gavetaAtual);

        const c = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "ESCOLHA A GAVETA";
        c.innerHTML = `<div class="opt-btn" onclick="window.executarSave('REDAÇÃO')">GAVETA: REDAÇÃO</div><div class="opt-btn" onclick="window.executarSave('QUESTÕES')">GAVETA: QUESTÕES</div>`;
        document.getElementById('universal-modal').style.display = 'flex';
    };

    window.executarSave = async (gaveta) => {
        window.gavetaAtual = gaveta;
        await set(ref(db, `pmdf_v1/GAVETAS/${window.idAtual}`), {
            id: window.idAtual, gaveta: gaveta, nome: window.redacaoNome,
            data: new Date().toLocaleString('pt-BR'), html: document.getElementById('editor-principal').innerHTML
        });
        document.getElementById('universal-modal').style.display = 'none';
        window.atualizarUI();
        alert("Arquivado com sucesso!");
    };

    window.gerenciadorPasta = () => {
        const c = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "📂 MINHAS GAVETAS";
        c.innerHTML = `<div class="opt-btn" onclick="window.abrirGaveta('REDAÇÃO')">ABRIR: REDAÇÃO</div><div class="opt-btn" onclick="window.abrirGaveta('QUESTÕES')">ABRIR: QUESTÕES</div>`;
        document.getElementById('universal-modal').style.display = 'flex';
    };

    window.abrirGaveta = async (tipo) => {
        const c = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = `GAVETA: ${tipo}`;
        c.innerHTML = "Lendo arquivos...";
        const snap = await get(ref(db, `pmdf_v1/GAVETAS`));
        if(snap.exists()){
            const itens = Object.values(snap.val()).filter(i => i.gaveta === tipo);
            c.innerHTML = itens.length ? "" : "Nenhum arquivo.";
            itens.reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-arquivo';
                div.innerHTML = `<div style="cursor:pointer" onclick="window.carregar('${item.id}')"><strong>${item.nome}</strong><br><small>${item.data}</small></div>
                <i class="fas fa-trash" style="color:red; cursor:pointer" onclick="window.excluir('${item.id}', '${tipo}')"></i>`;
                c.appendChild(div);
            });
        }
    };

    window.carregar = async (id) => {
        const snap = await get(ref(db, `pmdf_v1/GAVETAS/${id}`));
        if(snap.exists()){
            const d = snap.val();
            window.idAtual = id; window.gavetaAtual = d.gaveta; window.redacaoNome = d.nome;
            document.getElementById('editor-principal').innerHTML = d.html;
            window.atualizarUI();
            document.getElementById('universal-modal').style.display = 'none';
        }
    };

    window.excluir = async (id, tipo) => {
        if(confirm("Excluir?")) { await remove(ref(db, `pmdf_v1/GAVETAS/${id}`)); window.abrirGaveta(tipo); }
    };

    window.abrirNucleoDuro = () => {
        const c = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "⚖️ VADE PMDF";
        const leis = [['https://www.planalto.gov.br/ccivil_03/leis/l7289.htm', 'ESTATUTO PMDF'], ['https://www.planalto.gov.br/ccivil_03/decreto-lei/del1001.htm', 'CPM'], ['https://www.planalto.gov.br/ccivil_03/decreto-lei/del1002.htm', 'CPPM']];
        c.innerHTML = leis.map(l => `<div class="opt-btn" onclick="window.vade('${l[0]}','${l[1]}')">${l[1]}</div>`).join('');
        document.getElementById('universal-modal').style.display = 'flex';
    };

    window.vade = (u, t) => {
        document.getElementById('pdf-frame').src = u;
        document.getElementById('pdf-title').innerText = t;
        document.getElementById('pdf-viewer').classList.add('active');
        document.getElementById('universal-modal').style.display = 'none';
    };

    window.atualizarUI = () => {
        document.getElementById('modo-display').innerText = window.gavetaAtual || "STANDBY";
        document.getElementById('identificador-redacao').innerText = window.redacaoNome || "NOVA MISSÃO";
    };

    window.limparFolha = () => { if(confirm("Limpar tudo?")) document.getElementById('editor-principal').innerHTML = ""; };
    window.fecharPDF = () => document.getElementById('pdf-viewer').classList.remove('active');
    window.renomear = () => { const n = prompt("Novo nome:", window.redacaoNome); if(n) { window.redacaoNome = n.toUpperCase(); window.atualizarUI(); } };
</script>
</body>
</html>
