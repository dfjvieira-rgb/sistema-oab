<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JOAQUIM ELITE 2026 - PMDF MASTER</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --gold-dark: #d97706;
            --bg-paper: #cbd5e1; --paper-color: #ffffff; 
            --sidebar-w: 70px; --perigo: #ef4444;
        }
        body.dark-mode { --bg-paper: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: white; }
        header { background: var(--primary); height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        .logo { font-size: 1.2rem; font-weight: 900; }
        .logo span { color: var(--gold); }
        main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: var(--sidebar-w); background: #1e293b; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 15px 0; border-right: 1px solid rgba(255,255,255,0.1); }
        .btn-side { width: 50px; min-height: 50px; border: none; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; background: rgba(255,255,255,0.05); }
        .btn-side i { font-size: 1.2rem; color: var(--gold); }
        .editor-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px; }
        .sticky-tools { position: sticky; top: -20px; z-index: 1000; background: white; width: 100%; max-width: 850px; border-radius: 0 0 12px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 10px; }
        #identificador-peca { padding: 12px; background: #f8fafc; text-align: center; font-weight: 900; color: #0f172a; border-bottom: 3px solid var(--gold); cursor: pointer; }
        .toolbar-liberdade { display: flex; background: #fff; align-items: center; border-radius: 0 0 12px 12px; }
        .btn-lib { flex: 1; padding: 12px; border: none; background: transparent; cursor: pointer; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: #64748b; border-right: 1px solid #f1f5f9; }
        .highlight-box { display: flex; align-items: center; background: #f1f5f9; padding: 0 15px; gap: 10px; height: 45px; border-right: 1px solid #eee;}
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: #000; transform: scale(1.1); }
        .paper { width: 100%; max-width: 850px; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.4); min-height: 2000px; }
        .folha-grid { display: grid; grid-template-columns: 45px 1fr; }
        .num-lateral { background: #f8fafc; border-right: 2px solid #cbd5e1; }
        .linha-num { height: 35px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border-bottom: 1px solid #f1f5f9; color: #94a3b8; }
        .area-escrita { outline: none; padding: 0 20px; font-family: 'Courier New', monospace; font-size: 19px; font-weight: 700; line-height: 35px; background-image: linear-gradient(to bottom, transparent 34px, #e2e8f0 34px); background-size: 100% 35px; color: #000; min-height: 2000px; text-align: justify; white-space: pre-wrap; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .modal-body { background: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 20px; color: #0f172a; }
        .item-arquivo { background: #f8fafc; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; }
    </style>
</head>
<body class="dark-mode">

<header>
    <div class="logo">JOAQUIM <span>ELITE PMDF</span></div>
    <div style="color:var(--gold); font-size:11px; font-weight:bold;">MODO: <span id="ex-display">OFFLINE</span></div>
</header>

<main>
    <aside class="sidebar">
        <button class="btn-side" title="Nova Missão" onclick="window.novaMissao()"><i class="fas fa-plus-circle"></i></button>
        <button class="btn-side" title="Gavetas" onclick="window.gerenciadorPasta()"><i class="fas fa-archive"></i></button>
        <button class="btn-side" title="Salvar" onclick="window.salvarFluxo()"><i class="fas fa-save" style="color:#10b981"></i></button>
    </aside>

    <section class="editor-container">
        <div class="sticky-tools">
            <div id="identificador-peca" onclick="window.renomearNoTopo()">CLIQUE EM NOVA MISSÃO</div>
            <div class="toolbar-liberdade">
                <div class="highlight-box">
                    <div class="color-dot active" style="background:#fef08a;" onclick="window.setHighlightColor('#fef08a', this)"></div>
                    <div class="color-dot" style="background:#bbf7d0;" onclick="window.setHighlightColor('#bbf7d0', this)"></div>
                    <div class="color-dot" style="background:#fed7aa;" onclick="window.setHighlightColor('#fed7aa', this)"></div>
                    <button onclick="window.limparFormatacao()" style="background:none; border:none; cursor:pointer;"><i class="fas fa-eraser"></i></button>
                </div>
                <button class="btn-lib" onclick="document.execCommand('undo')">Desfazer</button>
                <button class="btn-lib" onclick="window.limparFolha()">Limpar Tudo</button>
            </div>
        </div>
        <div class="paper">
            <div class="folha-grid" id="folha-total"></div>
        </div>
    </section>
</main>

<div class="modal" id="universal-modal">
    <div class="modal-body">
        <h2 id="modal-title" style="margin-bottom:15px; border-bottom:2px solid var(--gold)"></h2>
        <div id="modal-content"></div>
        <button onclick="document.getElementById('universal-modal').style.display='none'" style="width:100%; padding:12px; background:#000; color:#fff; border-radius:10px; margin-top:10px; cursor:pointer;">VOLTAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://masteroab-db5e1-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.idAtual = null; 
    window.gavetaAtual = null;
    window.pecaAtualNome = "";
    window.currentColor = '#fef08a';

    window.onload = () => {
        let f = document.getElementById('folha-total');
        let n = '<div class="num-lateral">';
        for(let i=1; i<=60; i++) n += `<div class="linha-num">${i}</div>`;
        f.innerHTML = n + '</div><div class="area-escrita" id="editor-principal" contenteditable="true" spellcheck="false"></div>';
        
        const ed = document.getElementById('editor-principal');
        ed.addEventListener('mouseup', () => { if(window.getSelection().toString().length > 0) document.execCommand('backColor', false, window.currentColor); });
    };

    // NOVA MISSÃO COM VERIFICAÇÃO DE EXISTÊNCIA
    window.novaMissao = async () => {
        const n = prompt("Nome da Missão:", "");
        if(!n) return;
        
        const slug = n.toUpperCase().replace(/\s+/g, '_');
        const snap = await get(ref(db, `pmdf_v1/GAVETAS/${slug}`));
        
        if(snap.exists()) {
            if(confirm("Este arquivo já existe! Deseja carregar o conteúdo dele para continuar?")) {
                window.carregarArquivo(slug);
                return;
            }
        }
        
        window.idAtual = slug;
        window.pecaAtualNome = n.toUpperCase();
        window.gavetaAtual = null;
        document.getElementById('editor-principal').innerHTML = "";
        atualizarDisplay();
    };

    window.salvarFluxo = async () => {
        if(!window.idAtual) { alert("Inicie uma Missão primeiro."); return; }
        if(window.gavetaAtual) { await window.dbSave(window.gavetaAtual); return; }

        const c = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "SALVAR EM:";
        c.innerHTML = `
            <button onclick="window.dbSave('REDAÇÃO')" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; border:1px solid #eee; cursor:pointer">GAVETA: REDAÇÃO</button>
            <button onclick="window.dbSave('QUESTÕES')" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; border:1px solid #eee; cursor:pointer">GAVETA: QUESTÕES</button>
        `;
        document.getElementById('universal-modal').style.display = 'flex';
    };

    window.dbSave = async (gaveta) => {
        window.gavetaAtual = gaveta;
        const ed = document.getElementById('editor-principal').innerHTML;
        await set(ref(db, `pmdf_v1/GAVETAS/${window.idAtual}`), {
            id: window.idAtual,
            gaveta: gaveta,
            peca: window.pecaAtualNome,
            data: new Date().toLocaleString('pt-BR'),
            conteudo: ed
        });
        document.getElementById('universal-modal').style.display = 'none';
        atualizarDisplay();
        alert("Sincronizado com Sucesso!");
    };

    window.gerenciadorPasta = async () => {
        const c = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "📂 MINHAS GAVETAS";
        document.getElementById('universal-modal').style.display = 'flex';
        c.innerHTML = "Carregando...";
        
        const snap = await get(ref(db, `pmdf_v1/GAVETAS`));
        if(snap.exists()) {
            c.innerHTML = "";
            Object.values(snap.val()).forEach(d => {
                const div = document.createElement('div');
                div.className = 'item-arquivo';
                div.innerHTML = `
                    <div style="cursor:pointer" onclick="window.carregarArquivo('${d.id}')">
                        <span class="tag" style="background:${d.gaveta === 'REDAÇÃO' ? '#fbbf24' : '#3b82f6'}">${d.gaveta}</span><br>
                        <strong>${d.peca}</strong><br><small>${d.data}</small>
                    </div>
                    <button onclick="window.excluirForce('${d.id}')" style="border:none; background:none; color:red; cursor:pointer"><i class="fas fa-trash"></i></button>
                `;
                c.appendChild(div);
            });
        } else { c.innerHTML = "Gavetas vazias."; }
    };

    window.carregarArquivo = async (id) => {
        const snap = await get(ref(db, `pmdf_v1/GAVETAS/${id}`));
        const d = snap.val();
        window.idAtual = d.id;
        window.pecaAtualNome = d.peca;
        window.gavetaAtual = d.gaveta;
        document.getElementById('editor-principal').innerHTML = d.conteudo;
        atualizarDisplay();
        document.getElementById('universal-modal').style.display = 'none';
    };

    window.excluirForce = async (id) => {
        if(confirm("Apagar definitivamente?")) {
            await remove(ref(db, `pmdf_v1/GAVETAS/${id}`));
            window.gerenciadorPasta();
        }
    };

    window.setHighlightColor = (c, el) => {
        window.currentColor = c;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    };

    window.limparFormatacao = () => { document.execCommand('removeFormat'); document.execCommand('backColor', false, 'transparent'); };
    window.limparFolha = () => { if(confirm("Limpar folha?")) document.getElementById('editor-principal').innerHTML = ""; };
    
    function atualizarDisplay() {
        document.getElementById('ex-display').innerText = window.gavetaAtual || "EDITANDO";
        document.getElementById('identificador-peca').innerText = window.pecaAtualNome;
    }
</script>
</body>
</html>
