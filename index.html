<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MASTER PMDF | ELITE NÚCLEO DURO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --gold-dark: #d97706;
            --bg-paper: #cbd5e1; --mentoria: #a855f7; 
            --sidebar-w-collapsed: 60px;
            --sidebar-w-expanded: 240px;
            --success: #10b981; --biblioteca: #3b82f6; --perigo: #ef4444;
            color-scheme: light !important;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { font-family: 'Inter', sans-serif; background: var(--primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { 
            background: var(--primary); height: 55px; padding: 0 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--gold); z-index: 5000; 
        }

        .logo { font-size: 1rem; font-weight: 900; color: white; letter-spacing: 1px; }
        .logo span { color: var(--gold); }

        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* SIDEBAR INTELIGENTE (GAVETA) */
        .sidebar { 
            width: var(--sidebar-w-collapsed); 
            background: #1e293b; 
            display: flex; 
            flex-direction: column; 
            padding: 10px 0; 
            border-right: 1px solid rgba(255,255,255,0.1); 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            z-index: 1000;
            white-space: nowrap;
        }
        .sidebar:hover { width: var(--sidebar-w-expanded); }

        .btn-side { 
            width: 100%; height: 50px; border: none; background: transparent;
            display: flex; align-items: center; color: white; cursor: pointer; 
            transition: 0.2s; padding: 0 18px; gap: 15px; text-decoration: none;
        }
        .btn-side i { min-width: 25px; font-size: 18px; text-align: center; }
        .btn-side span { opacity: 0; transition: 0.3s; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        .sidebar:hover span { opacity: 1; }
        .btn-side:hover { background: rgba(255,255,255,0.1); color: var(--gold); }

        /* AREA DE CONTEUDO */
        .content-wrapper { flex: 1; display: flex; overflow: hidden; background: var(--bg-paper); position: relative; }
        
        .editor-container { 
            flex: 1 0 100%; display: flex; flex-direction: column; overflow-y: auto; 
            align-items: center; padding: 20px 10px; transition: all 0.4s ease; 
        }
        .content-wrapper.dual-active .editor-container { flex: 1 0 50%; }

        /* PDF VIEWER */
        #pdf-viewer { 
            flex: 0 0 0%; background: #FFFFFF !important; transition: all 0.4s ease; 
            display: flex; flex-direction: column; overflow: hidden; visibility: hidden;
            border-left: 0px solid var(--gold);
        }
        #pdf-viewer.active { flex: 1 0 50%; visibility: visible; border-left: 4px solid var(--gold); }
        
        #pdf-frame { width: 100%; flex: 1; border: none; background: #FFFFFF !important; }

        /* FOLHA DE RESPOSTA */
        .sticky-tools { position: sticky; top: -20px; z-index: 800; background: white; width: 100%; max-width: 800px; border-radius: 0 0 10px 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        #identificador-peca { padding: 12px; background: #f8fafc; text-align: center; font-weight: 900; color: #0f172a; border-bottom: 2px solid var(--gold); cursor: pointer; font-size: 13px; }
        
        .paper { width: 100%; max-width: 800px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); min-height: 1200px; padding: 50px; color: #1e293b; }
        #folha-total { outline: none; min-height: 1100px; font-family: 'Courier New', monospace; font-size: 17px; line-height: 1.6; }

        /* BOTAO MOBILE (TROCA DE TELA) */
        #mobile-switch {
            display: none; position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px;
            background: var(--gold); color: #000; border-radius: 50%; border: none;
            z-index: 99999; box-shadow: 0 4px 20px rgba(0,0,0,0.4); font-size: 24px;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; bottom: 0; width: 100%; height: 60px; flex-direction: row; justify-content: space-around; padding: 0; border-right: none; border-top: 2px solid var(--gold); }
            .sidebar:hover { width: 100%; }
            .btn-side { flex-direction: column; justify-content: center; padding: 0; gap: 4px; font-size: 9px; }
            .btn-side span { opacity: 1; font-size: 8px; }
            .sidebar i { font-size: 16px; }
            .editor-container { padding-bottom: 80px; }
            .content-wrapper.dual-active .editor-container { flex: 1 0 100%; display: none; }
            .content-wrapper.dual-active.show-editor .editor-container { display: flex; }
            .content-wrapper.dual-active.show-editor #pdf-viewer { display: none; }
            #pdf-viewer.active { flex: 1 0 100%; }
            #mobile-switch.visible { display: block; }
            .paper { padding: 30px 15px; }
        }

        /* MODAIS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; }
        .modal-body { background: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 12px; color: #333; }
        .opt-btn { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #ddd; background: #f8fafc; font-weight: 700; display: flex; justify-content: space-between; cursor: pointer; align-items: center; }
        .tag-lei { font-size: 10px; background: var(--primary); color: var(--gold); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div class="logo">PMDF <span>ELITE</span> | NÚCLEO DURO</div>
    <div id="relogio" style="color:var(--gold); font-family:monospace; font-weight:bold;"></div>
</header>

<main>
    <aside class="sidebar" id="sidebar">
        <button class="btn-side" onclick="window.location.reload()">
            <i class="fas fa-plus-circle" style="color:var(--gold)"></i> <span>NOVA MISSÃO</span>
        </button>
        <button class="btn-side" onclick="window.abrirSalvar()">
            <i class="fas fa-save" style="color:var(--success)"></i> <span>SALVAR</span>
        </button>
        <button class="btn-side" onclick="window.abrirGavetaArquivos()">
            <i class="fas fa-folder-open"></i> <span>ARQUIVOS</span>
        </button>
        <button class="btn-side" onclick="window.abrirNucleoDuro()">
            <i class="fas fa-gavel" style="color:var(--gold)"></i> <span>NÚCLEO DURO</span>
        </button>
        <button class="btn-side" onclick="window.abrirNaoConfunda()">
            <i class="fas fa-lightbulb" style="color:var(--mentoria)"></i> <span>INTELIGÊNCIA</span>
        </button>
        <div style="flex:1" class="spacer-mobile"></div>
        <button class="btn-side" onclick="window.limpar()" style="color:var(--perigo)">
            <i class="fas fa-trash-alt"></i> <span>LIMPAR</span>
        </button>
    </aside>

    <div class="content-wrapper" id="master-wrapper">
        <button id="mobile-switch" onclick="window.toggleMobile()"><i class="fas fa-exchange-alt"></i></button>

        <section class="editor-container">
            <div class="sticky-tools">
                <div id="identificador-peca" onclick="window.renomear()">MISSÃO SEM TÍTULO</div>
            </div>
            <div class="paper">
                <div id="folha-total" contenteditable="true" spellcheck="false">
                    <p style="text-align:center"><b>POLÍCIA MILITAR DO DISTRITO FEDERAL</b></p>
                    <p style="text-align:center; font-size:12px">SISTEMA DE TREINAMENTO AVANÇADO</p>
                    <hr><br>
                </div>
            </div>
        </section>

        <section id="pdf-viewer">
            <div style="background:#0f172a; padding:10px; display:flex; justify-content:space-between; align-items:center;">
                <span id="pdf-title" style="color:var(--gold); font-weight:bold; font-size:12px;">CONSULTA</span>
                <button onclick="window.fecharPDF()" style="background:red; color:white; border:none; padding:4px 10px; border-radius:4px; font-weight:bold; cursor:pointer">X</button>
            </div>
            <iframe id="pdf-frame" src=""></iframe>
        </section>
    </div>
</main>

<div class="modal" id="modal-leis">
    <div class="modal-body">
        <h2 style="margin-bottom:15px; border-bottom:2px solid var(--gold)">NÚCLEO DURO PMDF</h2>
        <div id="lista-leis"></div>
        <button onclick="window.fecharModais()" style="width:100%; margin-top:15px; padding:10px; background:#333; color:white; border:none; border-radius:6px;">FECHAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmigODFK8R9c0-fWtagdxLWu9xkODfKYQ",
        authDomain: "masteroab-db5e1.firebaseapp.com",
        databaseURL: "https://masteroab-db5e1-default-rtdb.firebaseio.com",
        projectId: "masteroab-db5e1",
        storageBucket: "masteroab-db5e1.appspot.com",
        messagingSenderId: "620234160245",
        appId: "1:620234160245:web:8651817c66144e59f42668"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.pecaNome = "MISSÃO SEM TÍTULO";

    const LEIS_PMDF = [
        { n: "CONSTITUIÇÃO", t: "CF/88 Art. 144", u: "https://www.planalto.gov.br/ccivil_03/constituicao/constituicao.htm#art144" },
        { n: "LEI 7.289/84", t: "Estatuto da PMDF", u: "https://www.planalto.gov.br/ccivil_03/leis/l7289.htm" },
        { n: "LEI 12.086/09", t: "Promoção de Oficiais/Praças", u: "https://www.planalto.gov.br/ccivil_03/_ato2007-2010/2009/lei/l12086.htm" },
        { n: "LEI 6.450/77", t: "Organização Básica PMDF", u: "https://www.planalto.gov.br/ccivil_03/leis/l6450.htm" },
        { n: "DEC. 4.346/02", t: "RDE - Regulamento Disciplinar", u: "https://www.planalto.gov.br/ccivil_03/decreto/2002/d4346.htm" },
        { n: "CPPM", t: "Proc. Penal Militar", u: "https://www.planalto.gov.br/ccivil_03/decreto-lei/del1002.htm" },
        { n: "CPM", t: "Código Penal Militar", u: "https://www.planalto.gov.br/ccivil_03/decreto-lei/del1001.htm" }
    ];

    window.abrirNucleoDuro = () => {
        const container = document.getElementById('lista-leis');
        container.innerHTML = "";
        LEIS_PMDF.forEach(lei => {
            const btn = document.createElement('div');
            btn.className = 'opt-btn';
            btn.innerHTML = `<span><span class="tag-lei">${lei.n}</span> ${lei.t}</span> <i class="fas fa-chevron-right"></i>`;
            btn.onclick = () => {
                document.getElementById('pdf-frame').src = lei.u;
                document.getElementById('pdf-title').innerText = lei.n;
                document.getElementById('pdf-viewer').classList.add('active');
                document.getElementById('master-wrapper').classList.add('dual-active');
                document.getElementById('mobile-switch').classList.add('visible');
                window.fecharModais();
            };
            container.appendChild(btn);
        });
        document.getElementById('modal-leis').style.display = 'flex';
    };

    window.toggleMobile = () => {
        document.getElementById('master-wrapper').classList.toggle('show-editor');
    };

    window.fecharPDF = () => {
        document.getElementById('pdf-viewer').classList.remove('active');
        document.getElementById('master-wrapper').classList.remove('dual-active');
        document.getElementById('mobile-switch').classList.remove('visible');
    };

    window.fecharModais = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');

    window.renomear = () => {
        const n = prompt("NOME DA MISSÃO:", window.pecaNome);
        if(n) { window.pecaNome = n.toUpperCase(); document.getElementById('identificador-peca').innerText = window.pecaNome; }
    };

    window.limpar = () => confirm("Deseja apagar tudo?") && (document.getElementById('folha-total').innerHTML = "");

    window.abrirSalvar = async () => {
        const id = Date.now().toString();
        const cont = document.getElementById('folha-total').innerHTML;
        await set(ref(db, `PMDF_ELITE/GAVETA/${id}`), { nome: window.pecaNome, conteudo: cont, data: new Date().toLocaleString() });
        alert("Sincronizado na Nuvem PMDF!");
    };

    window.abrirNaoConfunda = () => {
        const dicas = [
            "Crime Militar Próprio vs. Impróprio",
            "Transgressão Disciplinar vs. Crime Militar",
            "Pena de Reclusão vs. Detenção no CPM"
        ];
        const d = prompt("INTELIGÊNCIA PMDF:\n\n1. " + dicas[0] + "\n2. " + dicas[1] + "\n3. " + dicas[2] + "\n\nDigite o número para inserir:");
        if(d) {
            document.getElementById('folha-total').innerHTML += `<div style="background:#fff3cd; padding:10px; border-left:5px solid #ffc107; margin:10px 0;"><b>DICA PMDF:</b> Estudo sobre ${dicas[d-1]}</div>`;
        }
    };

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
</script>
</body>
</html>
