<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JOAQUIM ELITE 2026 - PMDF EDITION</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --gold-dark: #d97706;
            --bg-paper: #cbd5e1; --paper-color: #ffffff; 
            --mentoria: #a855f7; --sidebar-w: 70px; --perigo: #ef4444;
            --glass: rgba(30, 41, 59, 0.7);
            --questoes: #3b82f6; --teses: #f97316; --biblioteca: #475569;
        }

        body.dark-mode { --bg-paper: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--primary); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            color: white;
        }

        header { 
            background: var(--primary); 
            height: 60px; 
            padding: 0 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--gold); 
            z-index: 5000;
        }

        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--gold); }

        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .sidebar { 
            width: var(--sidebar-w); 
            background: #1e293b; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            gap: 10px; 
            padding: 15px 0; 
            border-right: 1px solid rgba(255,255,255,0.1); 
            overflow-y: auto; 
        }

        .btn-side { 
            width: 50px; min-height: 50px; border: none; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; color: white; 
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05);
            position: relative;
        }
        .btn-side i { font-size: 1.1rem; color: var(--gold); }

        .editor-container { 
            flex: 1; display: flex; flex-direction: column; 
            background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px;
        }

        .sticky-tools { 
            position: sticky; top: -20px; z-index: 1000; background: white; 
            width: 100%; max-width: 850px; border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 10px;
        }

        #identificador-peca { 
            padding: 12px; background: #f8fafc; text-align: center; 
            font-weight: 900; color: #0f172a; border-bottom: 3px solid var(--gold);
        }
        
        .toolbar-liberdade { display: flex; background: #fff; flex-wrap: wrap; align-items: center; }
        .btn-lib { 
            flex: 1; padding: 12px; border: none; background: transparent; 
            cursor: pointer; font-weight: 800; font-size: 0.7rem; 
            text-transform: uppercase; color: #64748b; border-right: 1px solid #f1f5f9;
        }

        .highlight-box { display: flex; align-items: center; background: #f1f5f9; padding: 0 10px; gap: 8px; border-right: 1px solid #f1f5f9; height: 45px; }
        .color-dot { width: 20px; height: 20px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: #000; transform: scale(1.1); }

        .paper { width: 100%; max-width: 850px; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }

        #pdf-viewer { width: 0; background: #334155; transition: 0.4s; display: flex; flex-direction: column; overflow: hidden; }
        #pdf-viewer.active { width: 50%; border-left: 4px solid var(--gold); }
        iframe { width: 100%; flex: 1; border: none; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 110000; align-items: center; justify-content: center; }
        .modal-body { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 20px; color: #0f172a; }
        .opt-btn { width: 100%; padding: 18px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #eee; background: #f8fafc; font-weight: 800; display: flex; justify-content: space-between; cursor: pointer; }

        #mobile-hub { display: none; position: fixed; bottom: 30px; right: 25px; z-index: 99999; flex-direction: column-reverse; gap: 12px; }
    </style>
</head>
<body class="dark-mode">

<header>
    <div class="logo">JOAQUIM <span>ELITE PMDF</span></div>
    <div style="color:var(--gold); font-size:10px; font-weight:bold;">SISTEMA BLINDADO</div>
</header>

<main>
    <aside class="sidebar">
        <button class="btn-side" style="background:#000; border:1px solid var(--gold);" onclick="window.abrirNucleoDuroPMDF()"><i class="fas fa-shield-alt"></i></button>
        <button class="btn-side" style="background:var(--questoes);" onclick="window.ativarModoQuestoes()"><i class="fas fa-question-circle"></i></button>
        <button class="btn-side" style="background:var(--teses);" onclick="window.ativarModoTeses()"><i class="fas fa-gavel"></i></button>
        <button class="btn-side" style="background:var(--biblioteca);" onclick="window.abrirBibliotecaPDF()"><i class="fas fa-folder"></i></button>
        <button class="btn-side" style="background:#334155;" onclick="window.gerenciadorPasta()"><i class="fas fa-folder-open"></i></button>
        <button class="btn-side" style="background:#10b981;" onclick="window.finalizarPeca()"><i class="fas fa-save"></i></button>
        <hr style="width:70%; opacity:0.1;">
        <button class="btn-side" style="background:var(--mentoria);" onclick="window.abrirMentoria()"><i class="fas fa-robot"></i></button>
    </aside>

    <section class="editor-container">
        <div class="sticky-tools">
            <div id="identificador-peca" onclick="window.renomearTreino()">SCANNER ELITE PMDF...</div>
            <div class="toolbar-liberdade">
                <button class="btn-lib" onclick="window.desfazer()"><i class="fas fa-undo"></i></button>
                <div class="highlight-box">
                    <button class="btn-lib" id="btn-highlight" onclick="window.toggleMarcaTexto()"><i class="fas fa-highlighter"></i></button>
                    <div class="color-dot active" id="dot-yellow" style="background:#fef08a;" onclick="window.setHighlightColor('#fef08a', 'dot-yellow')"></div>
                    <div class="color-dot" id="dot-green" style="background:#bbf7d0;" onclick="window.setHighlightColor('#bbf7d0', 'dot-green')"></div>
                </div>
                <button class="btn-lib" onclick="window.limparFolha()">LIMPAR</button>
                <button class="btn-lib" style="background:#22c55e; color:white" onclick="window.print()">GERAR PDF</button>
            </div>
        </div>
        <div class="paper">
            <div id="folha-total"></div>
        </div>
    </section>

    <section id="pdf-viewer">
        <div style="background:#1e293b; padding:10px; display:flex; justify-content:space-between;">
            <span id="pdf-title" style="font-size:10px; font-weight:bold;">DOCUMENTO</span>
            <button onclick="window.fecharPDF()" style="background:var(--gold); border:none; padding:2px 8px; cursor:pointer;">X</button>
        </div>
        <iframe id="pdf-frame"></iframe>
    </section>
</main>

<div class="modal" id="universal-modal">
    <div class="modal-body">
        <div id="modal-back-btn" style="display:none; cursor:pointer; color:var(--gold)" onclick="window.gerenciadorPasta()">← VOLTAR</div>
        <h2 id="modal-title" style="margin-bottom:15px; border-bottom:2px solid var(--gold)"></h2>
        <div id="modal-content"></div>
        <button onclick="document.getElementById('universal-modal').style.display='none'" style="width:100%; padding:10px; background:#000; color:#fff; margin-top:10px; cursor:pointer;">FECHAR</button>
    </div>
</div>
    
<script type="module">
    // 1. AJUSTE DE ENDEREÇO: Importando do config correto (MasterOAB)
    import { db } from './firebase-config.js'; 
    import { ref, get, set, remove, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { FolhaEngine } from './folha-engine.js';

    window.db = db;
    window.activeEx = localStorage.getItem('activeEx') || "44";
    window.modoTreinoLivre = localStorage.getItem('modoTreinoLivre') === "true";
    window.modoQuestoes = localStorage.getItem('modoQuestoes') === "true";
    window.modoTeses = localStorage.getItem('modoTeses') === "true";
    window.pecaAtualNome = localStorage.getItem('pecaAtualNome') || "NOVO TREINO PMDF";

    window.historicoUndo = [];
    let debounceTimer = null;
    window.marcaTextoAtivo = false;
    window.currentColor = '#fef08a';

    // 2. CONSTANTES DE ROTA (Isolamento PMDF no MasterOAB)
    const RAIZ_PMDF = "producao_pmdf"; 

    window.LISTA_PDF_BIBLIOTECA = [
        { nome: "EDITAL Nº 04/2023-DGP/PMDF, DE 23 DE JANEIRO DE 2023", url: "edital-abertura-04-2023.pdf" },
        { nome: "RESUMINHO APOSTAS!", url: "RESUMINHO APOSTAS!.pdf" },
        { nome: "LINHA DO TEMPO - PEÇAS", url: "LINHA DO TEMPO - Identificação de Peças_231123_182636.pdf" },
        { nome: "TESES OAB 2ª FASE", url: "TESES-----OAB--SEGUNDA--FASE--TRABALHO.pdf" },
        { nome: "REVISÃO DE PEÇAS - RALIN", url: "raulin.pdf" },
        { nome: "100 ARTIGOS PARA GRIFAR", url: "100 ARTIGOS.PDF" }
    ];

    window.onload = async () => {
        // atualizarDisplayModo(); // Removido se não houver a função definida no seu script
        FolhaEngine.montar('folha-total');
        
        setTimeout(() => {
            const ed = document.getElementById('editor-principal');
            if(ed) {
                ed.addEventListener('input', () => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        const html = ed.innerHTML;
                        if(window.historicoUndo[window.historicoUndo.length -1] !== html) {
                            window.historicoUndo.push(html);
                            if(window.historicoUndo.length > 30) window.historicoUndo.shift();
                        }
                    }, 800);
                });
                ed.addEventListener('mouseup', () => {
                    if(window.marcaTextoAtivo) {
                        const selection = window.getSelection();
                        if (selection.toString().length > 0) document.execCommand('backColor', false, window.currentColor);
                    }
                });
            }
        }, 1000);

        await carregarRascunho();
        setInterval(salvarAutomatico, 30000);
    };

    window.abrirNucleoDuroPMDF = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-back-btn').style.display = "none";
        document.getElementById('modal-title').innerText = "⚖️ NÚCLEO DURO PMDF";
        const leis = [
            { n: '📄 EDITAL PMDF 2023', u: 'edital-abertura-04-2023.pdf' },
            { n: '🛡️ ESTATUTO PMDF (L. 7289)', u: 'https://www.planalto.gov.br/ccivil_03/leis/l7289.htm' },
            { n: '⚔️ CÓD. PENAL MILITAR', u: 'https://www.planalto.gov.br/ccivil_03/decreto-lei/del1001.htm' },
            { n: '⚖️ PROC. PENAL MILITAR', u: 'https://www.planalto.gov.br/ccivil_03/decreto-lei/del1002.htm' },
            { n: '🏛️ LOB PMDF (L. 6450)', u: 'https://www.planalto.gov.br/ccivil_03/leis/l6450.htm' },
            { n: '🚫 ABUSO AUTORIDADE', u: 'https://www.planalto.gov.br/ccivil_03/_ato2019-2022/2019/lei/l13869.htm' },
            { n: '⚠️ LEI DE TORTURA', u: 'https://www.planalto.gov.br/ccivil_03/leis/l9455.htm' }
        ];
        content.innerHTML = leis.map(l => `
            <div class="opt-btn" onclick="window.abrirPDFDireto('${l.u}','${l.n}')">
                <span>${l.n}</span> <i class="fas fa-external-link-alt" style="color:var(--gold)"></i>
            </div>
        `).join('');
        modal.style.display = 'flex';
    };

    window.gerenciadorPasta = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-back-btn').style.display = "none";
        document.getElementById('modal-title').innerText = "📂 MINHA PASTA PMDF";
        content.innerHTML = `
            <div class="opt-btn" onclick="window.abrirGavetaEspecifica('QUESTÕES')"><span>GAVETA: QUESTÕES</span> <i class="fas fa-question-circle" style="color:var(--questoes)"></i></div>
            <div class="opt-btn" onclick="window.abrirGavetaEspecifica('TREINO')"><span>GAVETA: TREINO PEÇAS</span> <i class="fas fa-edit" style="color:#facc15"></i></div>
            <div class="opt-btn" onclick="window.abrirGavetaEspecifica('TESES')"><span>GAVETA: TREINO TESES</span> <i class="fas fa-gavel" style="color:var(--teses)"></i></div>
        `;
        modal.style.display = 'flex';
    };

    window.abrirGavetaEspecifica = async (tipoGaveta) => {
        const content = document.getElementById('modal-content');
        document.getElementById('modal-back-btn').style.display = "block";
        document.getElementById('modal-title').innerText = `📂 GAVETA: ${tipoGaveta}`;
        content.innerHTML = "<div style='text-align:center; padding:20px;'><i class='fas fa-spinner fa-spin'></i> Buscando...</div>";
        try {
            // AJUSTE DE ENDEREÇO: Buscando na raiz PMDF
            const snap = await get(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL`));
            content.innerHTML = "";
            if (snap.exists()) {
                const dados = snap.val();
                const filtrados = Object.keys(dados).map(k => ({ id: k, ...dados[k] })).filter(item => String(item.exame) === String(tipoGaveta));
                if(filtrados.length === 0) { content.innerHTML = "Gaveta vazia."; return; }
                filtrados.reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.style.cssText = "padding:12px; border-bottom:1px solid #eee; display:flex; flex-direction:column; background:#fff; margin-bottom:8px; border-radius:8px;";
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <div onclick="window.carregarPecaPasta('${item.id}')" style="cursor:pointer; flex:1;">
                                <strong style="color:#0f172a;">${item.peca}</strong>
                            </div>
                        </div>`;
                    content.appendChild(div);
                });
            } else { content.innerHTML = "Gaveta vazia."; }
        } catch (e) { content.innerHTML = "Erro ao acessar banco PMDF."; }
    };

    window.finalizarPeca = async () => { 
        const ed = document.getElementById('editor-principal'); 
        if(!ed) return; 
        let tipoDestino = window.modoQuestoes ? "QUESTÕES" : (window.modoTeses ? "TESES" : "TREINO");
        const nomeAlvo = window.pecaAtualNome;
        if (!confirm(`Salvar "${nomeAlvo}" em ${tipoDestino} (PMDF)?`)) return;
        const agora = new Date(); const dataF = agora.toLocaleDateString() + " " + agora.toLocaleTimeString(); 
        
        // AJUSTE DE ENDEREÇO: Gravando no histórico PMDF
        await set(ref(db, `${RAIZ_PMDF}/HISTORICO_OFICIAL/${Date.now()}`), { 
            exame: tipoDestino, 
            peca: `${nomeAlvo} (${dataF})`, 
            conteudo: ed.innerHTML 
        }); 
        alert("Salvo com sucesso no MasterOAB (PMDF)!");
    };

    window.setHighlightColor = (color, id) => {
        window.currentColor = color;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(!window.marcaTextoAtivo) window.toggleMarcaTexto(true);
    };

    window.toggleMarcaTexto = (forcarAtivo = null) => {
        window.marcaTextoAtivo = (forcarAtivo !== null) ? forcarAtivo : !window.marcaTextoAtivo;
        const btn = document.getElementById('btn-highlight');
        if(!btn) return;
        if(window.marcaTextoAtivo) { btn.style.background = window.currentColor; btn.style.color = "#000"; } 
        else { btn.style.background = "transparent"; btn.style.color = "#64748b"; }
    };

    window.desfazer = () => { const ed = document.getElementById('editor-principal'); if(window.historicoUndo.length > 0) ed.innerHTML = window.historicoUndo.pop(); };
    
    // AJUSTE DE ENDEREÇO: Rascunho temporário PMDF
    async function salvarAutomatico() { 
        const ed = document.getElementById('editor-principal'); 
        if(ed) await set(ref(db, `${RAIZ_PMDF}/RASCUNHO`), { conteudo: ed.innerHTML }); 
    }

    // AJUSTE DE ENDEREÇO: Carga de rascunho PMDF
    async function carregarRascunho() { 
        const snap = await get(ref(db, `${RAIZ_PMDF}/RASCUNHO`)); 
        const ed = document.getElementById('editor-principal');
        if(snap.exists() && ed) ed.innerHTML = snap.val().conteudo; 
    }

    window.limparFolha = () => { if(confirm("Limpar?")) document.getElementById('editor-principal').innerHTML = ""; };
    window.abrirPDFDireto = (url, nome) => {
        const v = document.getElementById('pdf-viewer'); const f = document.getElementById('pdf-frame');
        if(document.getElementById('pdf-title')) document.getElementById('pdf-title').innerText = nome; 
        f.src = url; v.classList.add('active'); 
    };
    window.fecharPDF = () => { document.getElementById('pdf-viewer').classList.remove('active'); };
</script>
