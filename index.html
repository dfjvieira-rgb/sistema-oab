<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JOAQUIM ELITE 2026 - PMDF</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --bg-paper: #cbd5e1; --sidebar-w: 250px; --pauta: 35px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--primary); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER E MENU SANDUÍCHE */
        header { 
            background: var(--primary); height: 60px; padding: 0 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--gold); z-index: 10000;
        }
        .btn-menu { background: none; border: none; color: var(--gold); font-size: 1.5rem; cursor: pointer; display: block; }

        /* SIDEBAR RETRÁTIL (SANDUÍCHE) */
        .sidebar { 
            position: fixed; left: -260px; top: 0; height: 100%; width: var(--sidebar-w); 
            background: #1e293b; z-index: 9999; transition: 0.3s; padding: 80px 20px;
            display: flex; flex-direction: column; gap: 15px; box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        .sidebar.active { left: 0; }
        .btn-side { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            display: flex; align-items: center; gap: 10px; color: white; 
            cursor: pointer; background: rgba(255,255,255,0.05); font-weight: bold;
        }
        .btn-side i { color: var(--gold); width: 20px; }

        /* ÁREA DA FOLHA */
        main { flex: 1; display: flex; position: relative; overflow: hidden; }
        .editor-container { 
            flex: 1; background: var(--bg-paper); overflow-y: auto; 
            display: flex; flex-direction: column; align-items: center; padding: 10px;
        }

        #folha-render-container { width: 100%; max-width: 850px; line-height: 0; }
        .area-editor * { margin: 0 !important; padding: 0 !important; line-height: var(--pauta) !important; display: inline; }
        .area-editor br { display: block !important; content: ""; }

        /* TOOLBAR FLUTUANTE */
        .floating-tools {
            width: 100%; max-width: 850px; background: white; padding: 10px;
            display: flex; justify-content: space-around; align-items: center;
            border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 500;
        }
        .dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 1px solid #ccc; }
        .dot.active { border: 2px solid #000; transform: scale(1.1); }

        /* NÚCLEO DURO (DRAWER) */
        #pdf-drawer { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; 
            background: white; z-index: 11000; transition: 0.4s; 
            display: flex; flex-direction: column; border-radius: 20px 20px 0 0;
        }
        #pdf-drawer.active { bottom: 0; }
        .pdf-header { background: #0f172a; color: white; padding: 15px; display: flex; justify-content: space-between; border-radius: 20px 20px 0 0; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998; }
        .overlay.active { display: block; }

        @media (max-width: 768px) {
            .area-editor { font-size: 16px !important; padding: 0 10px !important; }
        }
    </style>
</head>
<body>

<header>
    <button class="btn-menu" onclick="window.toggleMenu()"><i class="fas fa-bars"></i></button>
    <div style="color:white; font-weight:900; font-size: 0.9rem;">JOAQUIM <span style="color:var(--gold)">ELITE</span></div>
    <div id="modo-display" style="color:var(--gold); font-size:10px; font-weight:bold;">STANDBY</div>
</header>

<div class="overlay" id="overlay" onclick="window.toggleMenu()"></div>

<aside class="sidebar" id="sidebar">
    <button class="btn-side" onclick="window.novaMissao()"><i class="fas fa-plus"></i> NOVA MISSÃO</button>
    <button class="btn-side" onclick="window.gerenciadorPasta()"><i class="fas fa-folder"></i> GAVETAS</button>
    <button class="btn-side" onclick="window.abrirVade()"><i class="fas fa-gavel"></i> NÚCLEO DURO</button>
    <button class="btn-side" onclick="window.salvarFluxo()" style="background: #10b981;"><i class="fas fa-save" style="color:white"></i> SALVAR AGORA</button>
</aside>

<main>
    <section class="editor-container">
        <div class="floating-tools">
            <div id="identificador-missao" style="font-weight:bold; font-size:12px; color:#000" onclick="window.renomear()">NOVA MISSÃO PMDF</div>
            <div style="display:flex; gap:10px">
                <div class="dot active" style="background:#fef08a;" onclick="window.setM('#fef08a', this)"></div>
                <div class="dot" style="background:#bbf7d0;" onclick="window.setM('#bbf7d0', this)"></div>
                <button onclick="window.limparM()" style="background:none; border:none;"><i class="fas fa-eraser"></i></button>
            </div>
        </div>
        
        <div id="folha-render-container"></div>
    </section>
</main>

<div id="pdf-drawer">
    <div class="pdf-header">
        <span id="pdf-label">VADE MECUM</span>
        <button onclick="window.fecharVade()" style="color:white; background:none; border:none; font-size:1.2rem;">X</button>
    </div>
    <iframe id="pdf-frame" style="width:100%; flex:1; border:none;"></iframe>
</div>

<div class="overlay" id="modal-overlay" style="z-index: 12000;">
    <div style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:90%; max-width:400px; padding:20px; border-radius:15px; color:#000;">
        <h3 id="m-title" style="margin-bottom:15px; border-bottom:2px solid var(--gold)"></h3>
        <div id="m-content" style="max-height:300px; overflow-y:auto;"></div>
        <button onclick="window.closeModal()" style="width:100%; margin-top:15px; padding:10px; background:#000; color:#fff; border:none; border-radius:8px;">VOLTAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://masteroab-db5e1-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    export const FolhaEngine = {
        montar: (containerId) => {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            const style = document.createElement('style');
            style.innerHTML = `
                .folha-container { display: grid; grid-template-columns: 40px 1fr; background: #fff; border: 1px solid #000; position: relative; }
                .numeracao { background: #f8fafc; border-right: 1px solid #000; user-select: none; }
                .num-mecanico { height: 35px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; border-bottom: 1px solid #e2e8f0; color: #64748b; }
                .area-editor { outline: none; font-size: 18px !important; font-weight: 700 !important; color: #000 !important; line-height: 35px !important; padding: 0 15px !important; white-space: pre-wrap; word-wrap: break-word; min-height: 10500px; background-image: linear-gradient(to bottom, transparent 34px, #e2e8f0 34px); background-size: 100% 35px; background-repeat: repeat-y; background-position: 0 -1px; text-align: justify; }
            `;
            document.head.appendChild(style);

            const folha = document.createElement('div');
            folha.className = 'folha-container';
            const numCol = document.createElement('div');
            numCol.className = 'numeracao';
            for(let i=1; i<=300; i++) {
                const n = document.createElement('div'); n.className = 'num-mecanico'; n.innerText = i; numCol.appendChild(n);
            }
            const editor = document.createElement('div');
            editor.className = 'area-editor'; editor.id = 'editor-principal'; editor.contentEditable = "true"; editor.spellcheck = false;
            folha.appendChild(numCol); folha.appendChild(editor); container.appendChild(folha);

            editor.addEventListener('keydown', (e) => { if (e.key === 'Enter') { document.execCommand('insertLineBreak'); e.preventDefault(); } });
        }
    };

    window.idAtivo = null; window.gavetaAtiva = null; window.corM = '#fef08a';

    // LIMPEZA ANTIFANTASMA: Remove spans inúteis e previne pulo de linha
    window.sanitizar = (h) => {
        const t = document.createElement('div'); t.innerHTML = h;
        t.querySelectorAll('div, p').forEach(el => {
            const br = document.createElement('br');
            el.replaceWith(...el.childNodes, br);
        });
        t.normalize();
        return t.innerHTML.replace(/<div>|<\/div>|<p>|<\/p>/g, ""); 
    };

    window.toggleMenu = () => {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    };

    window.setM = (c, el) => {
        window.corM = c;
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    };

    window.limparM = () => document.execCommand('backColor', false, 'transparent');

    window.novaMissao = () => {
        const n = prompt("NOME:");
        if(n){
            window.idAtivo = "PMDF_" + Date.now();
            document.getElementById('identificador-missao').innerText = n.toUpperCase();
            document.getElementById('editor-principal').innerHTML = "";
            window.toggleMenu();
        }
    };

    window.salvarFluxo = () => {
        if(!window.idAtivo) return alert("Inicie no +");
        if(window.gavetaAtiva) return window.dbSave(window.gavetaAtiva);
        window.showModal("ESCOLHA A GAVETA", `
            <button onclick="window.dbSave('REDAÇÃO')" style="width:100%; padding:15px; margin-bottom:10px;">REDAÇÃO</button>
            <button onclick="window.dbSave('QUESTÕES')" style="width:100%; padding:15px;">QUESTÕES</button>
        `);
    };

    window.dbSave = async (gaveta) => {
        window.gavetaAtiva = gaveta;
        const html = window.sanitizar(document.getElementById('editor-principal').innerHTML);
        await set(ref(db, `pmdf_v1/GAVETAS/${window.idAtivo}`), {
            id: window.idAtivo, gaveta: gaveta,
            nome: document.getElementById('identificador-missao').innerText,
            html: html, data: new Date().toLocaleString('pt-BR')
        });
        document.getElementById('modo-display').innerText = gaveta;
        window.closeModal();
        alert("Salvo!");
    };

    window.gerenciadorPasta = () => {
        window.showModal("📂 GAVETAS", `
            <button onclick="window.listar('REDAÇÃO')" style="width:100%; padding:15px; margin-bottom:10px;">REDAÇÕES</button>
            <button onclick="window.listar('QUESTÕES')" style="width:100%; padding:15px;">QUESTÕES</button>
        `);
    };

    window.listar = async (tipo) => {
        const snap = await get(ref(db, `pmdf_v1/GAVETAS`));
        let h = "";
        if(snap.exists()){
            const itens = Object.values(snap.val()).filter(i => i.gaveta === tipo);
            itens.reverse().forEach(it => {
                h += `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between">
                        <span onclick="window.load('${it.id}')" style="cursor:pointer">${it.nome}</span>
                        <i class="fas fa-trash" onclick="window.del('${it.id}','${tipo}')" style="color:red;"></i>
                      </div>`;
            });
        }
        window.showModal(`GAVETA: ${tipo}`, h || "Vazio");
    };

    window.load = async (id) => {
        const snap = await get(ref(db, `pmdf_v1/GAVETAS/${id}`));
        const d = snap.val();
        window.idAtivo = id; window.gavetaAtiva = d.gaveta;
        document.getElementById('identificador-missao').innerText = d.nome;
        document.getElementById('editor-principal').innerHTML = d.html;
        window.closeModal();
        if(document.getElementById('sidebar').classList.contains('active')) window.toggleMenu();
    };

    window.del = async (id, t) => { if(confirm("Apagar?")) { await remove(ref(db, `pmdf_v1/GAVETAS/${id}`)); window.listar(t); } };

    window.abrirVade = () => {
        const h = `<div onclick="window.v('https://www.planalto.gov.br/ccivil_03/leis/l7289.htm','ESTATUTO')" style="padding:15px; border:1px solid #ddd; margin-bottom:5px;">ESTATUTO PMDF</div>
                   <div onclick="window.v('https://www.planalto.gov.br/ccivil_03/decreto-lei/del1001.htm','CPM')" style="padding:15px; border:1px solid #ddd;">CÓDIGO PENAL MILITAR</div>`;
        window.showModal("NÚCLEO DURO", h);
    };

    window.v = (u, t) => {
        document.getElementById('pdf-frame').src = u;
        document.getElementById('pdf-label').innerText = t;
        document.getElementById('pdf-drawer').classList.add('active');
        window.closeModal();
    };

    window.fecharVade = () => document.getElementById('pdf-drawer').classList.remove('active');
    window.showModal = (t, c) => {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-content').innerHTML = c;
        document.getElementById('modal-overlay').classList.add('active');
    };
    window.closeModal = () => document.getElementById('modal-overlay').classList.remove('active');
    window.renomear = () => { const n = prompt("Novo Nome:"); if(n) document.getElementById('identificador-missao').innerText = n.toUpperCase(); };

    window.onload = () => {
        FolhaEngine.montar('folha-render-container');
        document.execCommand('defaultParagraphSeparator', false, 'br');
        document.getElementById('editor-principal').addEventListener('mouseup', () => {
            if(window.getSelection().toString().length > 0) document.execCommand('backColor', false, window.corM);
        });
    };
</script>
</body>
</html>
