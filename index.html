<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARSENAL PMDF 2026 | NÚCLEO DURO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --gold-dark: #d97706;
            --pmdf-blue: #1e3a8a; --pmdf-green: #064e3b; 
            --bg-paper: #cbd5e1; --sidebar-w: 70px;
            --perigo: #ef4444; --sucesso: #10b981; --teses: #f97316; --questoes: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--primary); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: white;
        }

        header { 
            background: linear-gradient(90deg, #020617 0%, var(--pmdf-blue) 100%); 
            height: 60px; padding: 0 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 3px solid var(--gold); z-index: 5000;
        }

        .logo { font-size: 1.1rem; font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--gold); }

        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* SIDEBAR MILITARIZADA */
        .sidebar { 
            width: var(--sidebar-w); background: #020617; display: flex; 
            flex-direction: column; align-items: center; gap: 12px; padding: 15px 0; 
            border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; 
        }

        .btn-side { 
            width: 50px; min-height: 50px; border: none; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; color: white; 
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05);
            position: relative;
        }
        .btn-side:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
        .btn-side i { font-size: 1.2rem; }
        
        .btn-side::after {
            content: attr(data-label); position: absolute; left: 60px; background: #000; 
            color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 10px;
            white-space: nowrap; opacity: 0; pointer-events: none; border: 1px solid var(--gold);
            z-index: 9999;
        }
        .btn-side:hover::after { opacity: 1; left: 70px; }

        /* EDITOR E FOLHA ENGINE */
        .editor-container { 
            flex: 1; display: flex; flex-direction: column; background: var(--bg-paper); 
            overflow-y: auto; align-items: center; padding: 20px 10px; 
        }

        .sticky-tools { 
            position: sticky; top: -20px; z-index: 1000; background: white; 
            width: 100%; max-width: 850px; border-radius: 8px 8px 0 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #identificador-peca { 
            padding: 12px; background: #f8fafc; text-align: center; 
            font-weight: 900; color: #0f172a; border-bottom: 3px solid var(--pmdf-blue);
            cursor: pointer; text-transform: uppercase; font-size: 13px;
        }
        
        .toolbar-mecanica { display: flex; background: #fff; border-bottom: 1px solid #ddd; }
        .btn-tool { flex: 1; padding: 10px; border: none; background: transparent; cursor: pointer; font-weight: 800; font-size: 0.7rem; color: #64748b; }

        .highlight-box { display: flex; align-items: center; background: #f1f5f9; padding: 0 10px; gap: 8px; border-right: 1px solid #ddd; }
        .color-dot { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: #000; transform: scale(1.1); }

        /* A FOLHA ENGINE 150 LINHAS */
        .paper-core { width: 100%; max-width: 850px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 50px; }
        .folha-grid { display: grid; grid-template-columns: 45px 1fr; position: relative; }
        .num-lateral { background: #f1f5f9; border-right: 2px solid #1e3a8a; user-select: none; }
        .linha-num { 
            height: 35px; display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: 900; border-bottom: 1px solid #cbd5e1; color: #1e3a8a; 
        }
        .area-escrita { 
            outline: none; font-size: 19px !important; font-weight: 700 !important; 
            color: #000 !important; line-height: 35px !important; padding: 0 20px !important;
            min-height: 5250px; background-image: linear-gradient(to bottom, transparent 34px, #e2e8f0 34px);
            background-size: 100% 35px; text-align: justify; word-wrap: break-word;
        }

        /* MODAIS E PDF */
        #pdf-viewer { width: 0; background: #1e293b; transition: 0.4s; display: flex; flex-direction: column; overflow: hidden; }
        #pdf-viewer.active { width: 50%; border-left: 4px solid var(--gold); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .modal-body { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 15px; color: #000; }
        .opt-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; background: #f8fafc; font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; align-items: center;}

        @media (max-width: 768px) { .sidebar { display: none; } #pdf-viewer.active { width: 100%; position: absolute; z-index: 9000; } }
    </style>
</head>
<body>

<header>
    <div class="logo">ARSENAL <span>PMDF 2026</span></div>
    <div style="font-size: 10px; font-weight: bold; color: var(--gold);">STATUS: <span id="modo-display">PRONTO PARA O COMBATE</span></div>
</header>

<main>
    <aside class="sidebar">
        <button class="btn-side" style="background:var(--pmdf-blue);" data-label="BATALHÕES (SIMULADOS)" onclick="window.abrirBatalhoes()"><i class="fas fa-shield-alt"></i></button>
        <button class="btn-side" style="background:var(--pmdf-green);" data-label="NOVA REDAÇÃO" onclick="window.ativarModo('REDAÇÃO')"><i class="fas fa-pen-nib"></i></button>
        <button class="btn-side" style="background:var(--questoes);" data-label="QG DE QUESTÕES" onclick="window.ativarModo('QUESTÕES')"><i class="fas fa-crosshairs"></i></button>
        <button class="btn-side" style="background:var(--teses);" data-label="DOUTRINA MILITAR" onclick="window.ativarModo('DOUTRINA')"><i class="fas fa-book-militar"></i><i class="fas fa-gavel"></i></button>
        <hr style="width:70%; opacity:0.2;">
        <button class="btn-side" style="background:#475569;" data-label="GAVETAS (ARQUIVOS)" onclick="window.gerenciadorPasta()"><i class="fas fa-box-archive"></i></button>
        <button class="btn-side" style="background:var(--sucesso);" data-label="SALVAR MISSÃO" onclick="window.finalizarPeca()"><i class="fas fa-check-double"></i></button>
        <button class="btn-side" style="background:var(--perigo);" data-label="GERAR PDF FINAL" onclick="window.gerarPDF()"><i class="fas fa-file-pdf"></i></button>
    </aside>

    <section class="editor-container">
        <div class="sticky-tools">
            <div id="identificador-peca" onclick="window.renomear()">ORDEM DO DIA: AGUARDANDO...</div>
            <div class="toolbar-mecanica">
                <div class="highlight-box">
                    <div class="color-dot active" id="dot-yellow" style="background:#fef08a;" onclick="window.setHighlightColor('#fef08a', 'dot-yellow')"></div>
                    <div class="color-dot" id="dot-green" style="background:#bbf7d0;" onclick="window.setHighlightColor('#bbf7d0', 'dot-green')"></div>
                    <div class="color-dot" id="dot-orange" style="background:#fed7aa;" onclick="window.setHighlightColor('#fed7aa', 'dot-orange')"></div>
                    <div class="color-dot" style="background:#fff; border:1px solid #ccc; display:flex; align-items:center; justify-content:center;" onclick="window.setHighlightColor('transparent', '')"><i class="fas fa-slash" style="font-size:8px; color:red"></i></div>
                </div>
                <button class="btn-tool" onclick="document.execCommand('undo')"><i class="fas fa-undo"></i> DESFAZER</button>
                <button class="btn-tool" onclick="window.limparFolha()">LIMPAR TUDO</button>
                <button class="btn-tool" style="background:var(--pmdf-blue); color:white" onclick="window.abrirVade()"><i class="fas fa-book"></i> ARSENAL DE LEIS</button>
            </div>
        </div>

        <div class="paper-core">
            <div class="folha-grid" id="folha-render">
                </div>
        </div>
    </section>

    <section id="pdf-viewer">
        <div style="background:#020617; padding:10px; display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid var(--gold);">
            <small id="pdf-title" style="font-weight: bold; color: var(--gold);">BIBLIOTECA PMDF</small>
            <button onclick="window.togglePDF()" style="background:var(--perigo); border:none; color:white; padding:5px 10px; cursor:pointer; font-weight: bold;">FECHAR</button>
        </div>
        <iframe id="pdf-frame" src="about:blank" style="flex:1; border:none;"></iframe>
    </section>
</main>

<div class="modal" id="universal-modal">
    <div class="modal-body">
        <h2 id="modal-title" style="margin-bottom:15px; border-bottom:3px solid var(--pmdf-blue); font-size: 18px;"></h2>
        <div id="modal-content"></div>
        <button onclick="document.getElementById('universal-modal').style.display='none'" style="width:100%; padding:15px; background:black; color:white; border:none; margin-top:15px; cursor:pointer; font-weight:bold;">RETORNAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmigODFK8R9c0-fWtagdxLWu9xkODfKYQ",
        authDomain: "masteroab-db5e1.firebaseapp.com",
        databaseURL: "https://masteroab-db5e1-default-rtdb.firebaseio.com",
        projectId: "masteroab-db5e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ESTADOS GLOBAIS
    window.pecaAtualNome = localStorage.getItem('pmdf_pecaNome') || "MISSÃO INICIAL";
    window.modoAtual = localStorage.getItem('pmdf_modo') || "REDAÇÃO";
    window.currentColor = '#fef08a';

    // ENGINE DE RENDERIZAÇÃO 150 LINHAS
    function bootFolha() {
        const target = document.getElementById('folha-render');
        let numHTML = '<div class="num-lateral">';
        for(let i=1; i<=150; i++) numHTML += `<div class="linha-num">${i}</div>`;
        numHTML += '</div>';
        
        const editorHTML = `<div class="area-escrita" id="editor-principal" contenteditable="true" spellcheck="false"></div>`;
        target.innerHTML = numHTML + editorHTML;

        const ed = document.getElementById('editor-principal');
        ed.addEventListener('mouseup', () => {
            if(window.currentColor !== 'transparent') {
                const sel = window.getSelection();
                if(sel.toString().length > 0) document.execCommand('backColor', false, window.currentColor);
            }
        });
    }

    window.onload = async () => {
        bootFolha();
        atualizarUI();
        
        // Carregar Rascunho de Segurança
        const snap = await get(ref(db, `pmdf_v1/RASCUNHO`));
        if(snap.exists()) document.getElementById('editor-principal').innerHTML = snap.val().html;
        
        // Auto-save tático (30s)
        setInterval(async () => {
            const html = document.getElementById('editor-principal').innerHTML;
            set(ref(db, `pmdf_v1/RASCUNHO`), { html, data: new Date().getTime() });
        }, 30000);
    };

    // FUNÇÕES DE COMANDO (GAVETAS E PASTAS)
    window.finalizarPeca = async () => {
        const html = document.getElementById('editor-principal').innerHTML;
        const id = Date.now();
        const dataF = new Date().toLocaleString('pt-BR');
        
        if(!confirm(`CONFIRMAR SALVAMENTO NA GAVETA: ${window.modoAtual}?`)) return;

        await set(ref(db, `pmdf_v1/GAVETAS/${id}`), {
            id,
            titulo: window.pecaAtualNome,
            modo: window.modoAtual,
            data: dataF,
            html: html
        });
        alert("MISSÃO CUMPRIDA! ARQUIVO SALVO.");
    };

    window.gerenciadorPasta = async () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "📂 ARQUIVO DE MISSÕES (GAVETAS)";
        modal.style.display = 'flex';
        content.innerHTML = "Acessando banco de dados...";

        const snap = await get(ref(db, `pmdf_v1/GAVETAS`));
        content.innerHTML = "";
        if(snap.exists()){
            Object.values(snap.val()).reverse().forEach(item => {
                const btn = document.createElement('div');
                btn.className = "opt-btn";
                btn.innerHTML = `<div><b>${item.titulo}</b><br><small>${item.modo} | ${item.data}</small></div> <i class="fas fa-folder-open"></i>`;
                btn.onclick = () => {
                    document.getElementById('editor-principal').innerHTML = item.html;
                    window.pecaAtualNome = item.titulo;
                    window.modoAtual = item.modo;
                    atualizarUI();
                    modal.style.display = 'none';
                };
                content.appendChild(btn);
            });
        } else { content.innerHTML = "Arquivo vazio. Nenhuma missão salva."; }
    };

    // BIBLIOTECA E BATALHÕES
    window.abrirBatalhoes = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "🛡️ BATALHÕES DE TREINO (SIMULADOS)";
        modal.style.display = 'flex';
        content.innerHTML = "";
        ["BATALHÃO 01 - REDAÇÃO", "BATALHÃO 02 - LEGISLAÇÃO", "BATALHÃO 03 - PENAL MILITAR", "SIMULADO GERAL ELITE"].forEach(bat => {
            const b = document.createElement('div');
            b.className = 'opt-btn';
            b.innerText = bat;
            b.onclick = () => { window.ativarModo(bat); modal.style.display='none'; };
            content.appendChild(b);
        });
    };

    window.abrirVade = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "⚔️ ARSENAL DE LEIS (PDFs)";
        modal.style.display = 'flex';
        content.innerHTML = `
            <div class="opt-btn" onclick="window.loadPDF('https://www.planalto.gov.br/ccivil_03/leis/l7289.htm', 'ESTATUTO PMDF')">ESTATUTO PMDF (L7289)</div>
            <div class="opt-btn" onclick="window.loadPDF('https://www.planalto.gov.br/ccivil_03/decreto-lei/del1001.htm', 'PENAL MILITAR')">CÓD. PENAL MILITAR</div>
            <div class="opt-btn" onclick="window.loadPDF('https://www.planalto.gov.br/ccivil_03/decreto-lei/del1002.htm', 'PROC. PENAL MILITAR')">PROC. PENAL MILITAR</div>
        `;
    };

    window.loadPDF = (url, nome) => {
        document.getElementById('pdf-frame').src = url;
        document.getElementById('pdf-title').innerText = nome;
        document.getElementById('pdf-viewer').classList.add('active');
        document.getElementById('universal-modal').style.display = 'none';
    };

    // UTILITÁRIOS DE INTERFACE
    window.ativarModo = (modo) => {
        const n = prompt(`NOME DA MISSÃO (${modo}):`, "NOVA MISSÃO");
        if(n) {
            window.modoAtual = modo;
            window.pecaAtualNome = n.toUpperCase();
            localStorage.setItem('pmdf_modo', modo);
            localStorage.setItem('pmdf_pecaNome', window.pecaAtualNome);
            atualizarUI();
            document.getElementById('editor-principal').innerHTML = "";
        }
    };

    window.setHighlightColor = (color, id) => {
        window.currentColor = color;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        if(id) document.getElementById(id).classList.add('active');
    };

    function atualizarUI() {
        document.getElementById('identificador-peca').innerText = `ORDEM DO DIA: ${window.pecaAtualNome} (${window.modoAtual})`;
        document.getElementById('modo-display').innerText = window.modoAtual;
    }

    window.renomear = () => {
        const n = prompt("RENOMEAR MISSÃO:", window.pecaAtualNome);
        if(n) { window.pecaAtualNome = n.toUpperCase(); atualizarUI(); }
    };

    window.togglePDF = () => document.getElementById('pdf-viewer').classList.toggle('active');
    
    window.limparFolha = () => { if(confirm("ESTA AÇÃO APAGARÁ TODO O TEXTO DA MISSÃO. CONFIRMA?")) document.getElementById('editor-principal').innerHTML = ""; };

    window.gerarPDF = () => {
        const ed = document.getElementById('editor-principal').innerHTML;
        const win = window.open('', '_blank');
        win.document.write(`<html><head><title>PMDF - ${window.pecaAtualNome}</title><style>body{font-family:serif; padding:50px; line-height:30px; text-align:justify;}</style></head><body>`);
        win.document.write(`<h2 style="text-align:center; text-decoration:underline;">REDAÇÃO/MISSÃO: ${window.pecaAtualNome}</h2>`);
        win.document.write(ed);
        win.document.write(`</body></html>`);
        win.document.close();
        win.print();
    };

</script>
</body>
</html>
