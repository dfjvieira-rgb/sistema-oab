<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARSENAL PMDF 2026</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; 
            --pmdf-blue: #1e3a8a; --pmdf-green: #064e3b; 
            --bg-paper: #cbd5e1; --sidebar-w: 70px;
            --perigo: #ef4444; --sucesso: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--primary); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            background: linear-gradient(90deg, #020617 0%, var(--pmdf-blue) 100%); 
            height: 60px; padding: 0 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 3px solid var(--gold); z-index: 5000;
        }

        .logo { font-size: 1.1rem; font-weight: 900; color: white; }
        .logo span { color: var(--gold); }

        main { display: flex; flex: 1; overflow: hidden; }
        
        /* SIDEBAR PMDF */
        .sidebar { 
            width: var(--sidebar-w); background: #020617; display: flex; 
            flex-direction: column; align-items: center; gap: 12px; padding: 15px 0; 
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .btn-side { 
            width: 50px; min-height: 50px; border: none; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; color: white; 
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05);
            position: relative;
        }
        .btn-side:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
        
        .btn-side::after {
            content: attr(data-label); position: absolute; left: 60px; background: #000; 
            color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 10px;
            white-space: nowrap; opacity: 0; pointer-events: none; border: 1px solid var(--gold);
        }
        .btn-side:hover::after { opacity: 1; }

        .editor-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px; }

        .sticky-tools { 
            position: sticky; top: -20px; z-index: 1000; background: white; 
            width: 100%; max-width: 850px; border-radius: 8px 8px 0 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #identificador-peca { 
            padding: 12px; background: #f8fafc; text-align: center; 
            font-weight: 900; color: #0f172a; border-bottom: 2px solid var(--pmdf-blue);
            cursor: pointer; text-transform: uppercase; font-size: 12px;
        }
        
        .toolbar-mecanica { display: flex; background: #fff; border-bottom: 1px solid #ddd; }
        .btn-tool { flex: 1; padding: 10px; border: none; background: transparent; cursor: pointer; font-weight: 800; font-size: 0.7rem; color: #64748b; }

        /* MARCA-TEXTO FUNCIONAL */
        .highlight-box { display: flex; align-items: center; background: #f1f5f9; padding: 0 10px; gap: 8px; border-right: 1px solid #ddd; }
        .color-dot { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 1px solid #ccc; }
        .color-dot.active { border: 2px solid #000; transform: scale(1.1); }

        /* FOLHA ENGINE 150 */
        .paper-core { width: 100%; max-width: 850px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .folha-grid { display: grid; grid-template-columns: 45px 1fr; position: relative; }
        .num-lateral { background: #f1f5f9; border-right: 2px solid var(--pmdf-blue); user-select: none; }
        .linha-num { 
            height: 35px; display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: 900; border-bottom: 1px solid #cbd5e1; color: #1e3a8a; 
        }
        .area-escrita { 
            outline: none; font-size: 19px !important; font-weight: 700 !important; 
            color: #000 !important; line-height: 35px !important; padding: 0 20px !important;
            min-height: 5250px; background-image: linear-gradient(to bottom, transparent 34px, #e2e8f0 34px);
            background-size: 100% 35px; text-align: justify; word-wrap: break-word;
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .modal-body { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 12px; color: #000; }
        .opt-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; background: #f8fafc; font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<header>
    <div class="logo">ARSENAL <span>PMDF</span></div>
    <div id="status-gaveta" style="font-size: 11px; font-weight: bold; color: var(--gold); border: 1px solid var(--gold); padding: 4px 10px; border-radius: 20px;">GAVETA: REDAÇÃO</div>
</header>

<main>
    <aside class="sidebar">
        <button class="btn-side" style="background:var(--pmdf-green);" data-label="TREINAR REDAÇÃO" onclick="window.ativarModo('REDAÇÃO')"><i class="fas fa-file-alt"></i></button>
        <button class="btn-side" style="background:var(--pmdf-blue);" data-label="DISCURSIVAS (QUESTÕES)" onclick="window.ativarModo('DISCURSIVAS')"><i class="fas fa-list-ol"></i></button>
        <button class="btn-side" style="background:#f97316;" data-label="DOUTRINA E LEIS" onclick="window.ativarModo('DOUTRINA')"><i class="fas fa-book-open"></i></button>
        <button class="btn-side" style="background:#6366f1;" data-label="SIMULADOS (BATALHÃO)" onclick="window.abrirSimulados()"><i class="fas fa-shield-alt"></i></button>
        <hr style="width:70%; opacity:0.1;">
        <button class="btn-side" style="background:#475569;" data-label="MINHAS GAVETAS" onclick="window.gerenciadorPasta()"><i class="fas fa-folder-open"></i></button>
        <button class="btn-side" style="background:var(--sucesso);" data-label="SALVAR AGORA" onclick="window.finalizarMissao()"><i class="fas fa-save"></i></button>
        <button class="btn-side" style="background:var(--perigo);" data-label="GERAR PDF" onclick="window.print()"><i class="fas fa-floppy-disk"></i></button>
    </aside>

    <section class="editor-container">
        <div class="sticky-tools">
            <div id="identificador-peca" onclick="window.renomear()">MISSÃO: NOVO TREINO</div>
            <div class="toolbar-mecanica">
                <div class="highlight-box">
                    <div class="color-dot active" id="dot-yellow" style="background:#fef08a;" onclick="window.setHighlightColor('#fef08a', 'dot-yellow')"></div>
                    <div class="color-dot" id="dot-green" style="background:#bbf7d0;" onclick="window.setHighlightColor('#bbf7d0', 'dot-green')"></div>
                    <div class="color-dot" style="background:#fff;" onclick="window.setHighlightColor('transparent', '')"><i class="fas fa-eraser" style="font-size:10px; padding:5px"></i></div>
                </div>
                <button class="btn-tool" onclick="document.execCommand('undo')">DESFAZER</button>
                <button class="btn-tool" onclick="window.limparFolha()">LIMPAR</button>
                <button class="btn-tool" style="background:var(--pmdf-blue); color:white" onclick="window.abrirVade()">VADE PMDF</button>
            </div>
        </div>

        <div class="paper-core">
            <div class="folha-grid" id="folha-render"></div>
        </div>
    </section>
</main>

<div class="modal" id="universal-modal">
    <div class="modal-body">
        <h2 id="modal-title" style="margin-bottom:15px; border-bottom:3px solid var(--pmdf-blue);"></h2>
        <div id="modal-content"></div>
        <button onclick="document.getElementById('universal-modal').style.display='none'" style="width:100%; padding:15px; background:#000; color:#fff; border:none; margin-top:15px; border-radius:8px; cursor:pointer;">FECHAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmigODFK8R9c0-fWtagdxLWu9xkODfKYQ",
        authDomain: "masteroab-db5e1.firebaseapp.com",
        databaseURL: "https://masteroab-db5e1-default-rtdb.firebaseio.com",
        projectId: "masteroab-db5e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.modoAtual = "REDAÇÃO";
    window.missaoNome = "NOVO TREINO";
    window.currentColor = '#fef08a';

    function initFolha() {
        const target = document.getElementById('folha-render');
        let html = '<div class="num-lateral">';
        for(let i=1; i<=150; i++) html += `<div class="linha-num">${i}</div>`;
        html += '</div><div class="area-escrita" id="editor" contenteditable="true" spellcheck="false"></div>';
        target.innerHTML = html;

        document.getElementById('editor').addEventListener('mouseup', () => {
            if(window.currentColor !== 'transparent') {
                const sel = window.getSelection();
                if(sel.toString().length > 0) document.execCommand('backColor', false, window.currentColor);
            }
        });
    }

    window.onload = () => {
        initFolha();
        atualizarHeader();
    };

    window.ativarModo = (modo) => {
        const n = prompt(`NOME DO TREINO EM [${modo}]:`, "Missão do dia");
        if(n) {
            window.modoAtual = modo;
            window.missaoNome = n.toUpperCase();
            document.getElementById('editor').innerHTML = "";
            atualizarHeader();
        }
    };

    window.finalizarMissao = async () => {
        const html = document.getElementById('editor').innerHTML;
        const id = Date.now();
        if(!confirm(`Salvar na gaveta ${window.modoAtual}?`)) return;

        await set(ref(db, `pmdf_v1/HISTORICO/${id}`), {
            titulo: window.missaoNome,
            gaveta: window.modoAtual,
            data: new Date().toLocaleString('pt-BR'),
            html: html
        });
        alert("MISSÃO SALVA!");
    };

    window.gerenciadorPasta = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "📂 MINHAS GAVETAS";
        modal.style.display = 'flex';
        content.innerHTML = `
            <div class="opt-btn" onclick="window.verGaveta('REDAÇÃO')">GAVETA DE REDAÇÕES <i class="fas fa-chevron-right"></i></div>
            <div class="opt-btn" onclick="window.verGaveta('DISCURSIVAS')">GAVETA DE QUESTÕES <i class="fas fa-chevron-right"></i></div>
            <div class="opt-btn" onclick="window.verGaveta('DOUTRINA')">GAVETA DE DOUTRINA <i class="fas fa-chevron-right"></i></div>
            <div class="opt-btn" onclick="window.verGaveta('SIMULADOS')">GAVETA DE SIMULADOS <i class="fas fa-chevron-right"></i></div>
        `;
    };

    window.verGaveta = async (gaveta) => {
        const content = document.getElementById('modal-content');
        content.innerHTML = "Acessando arquivos...";
        const snap = await get(ref(db, `pmdf_v1/HISTORICO`));
        content.innerHTML = "";
        
        if(snap.exists()) {
            const itens = Object.values(snap.val()).filter(i => i.gaveta === gaveta);
            if(itens.length === 0) content.innerHTML = "Nenhum arquivo nesta gaveta.";
            itens.reverse().forEach(item => {
                const d = document.createElement('div');
                d.className = 'opt-btn';
                d.innerHTML = `<div><b>${item.titulo}</b><br><small>${item.data}</small></div>`;
                d.onclick = () => {
                    document.getElementById('editor').innerHTML = item.html;
                    window.missaoNome = item.titulo;
                    window.modoAtual = item.gaveta;
                    atualizarHeader();
                    document.getElementById('universal-modal').style.display = 'none';
                };
                content.appendChild(d);
            });
        }
    };

    window.abrirSimulados = () => {
        window.modoAtual = "SIMULADOS";
        window.missaoNome = "SIMULADO BATALHÃO";
        atualizarHeader();
        alert("Modo SIMULADO ativado. Prepare-se para o combate.");
    };

    window.setHighlightColor = (color, id) => {
        window.currentColor = color;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        if(id) document.getElementById(id).classList.add('active');
    };

    function atualizarHeader() {
        document.getElementById('identificador-peca').innerText = `MISSÃO: ${window.missaoNome}`;
        document.getElementById('status-gaveta').innerText = `GAVETA: ${window.modoAtual}`;
    }

    window.limparFolha = () => { if(confirm("Apagar tudo?")) document.getElementById('editor').innerHTML = ""; };
    window.renomear = () => { const n = prompt("Novo nome:", window.missaoNome); if(n) { window.missaoNome = n.toUpperCase(); atualizarHeader(); }};
</script>
</body>
</html>
