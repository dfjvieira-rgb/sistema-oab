<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARSENAL PMDF | NÚCLEO DURO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --mpu-green: #064e3b; --mpu-blue: #020617; --mpu-gold: #b45309;
            --bg-paper: #cbd5e1; --sidebar-w: 260px; --sucesso: #166534; --perigo: #991b1b;
            --questoes: #4338ca; --teses: #c2410c; --mentoria: #0369a1; --gold: #b45309;
            color-scheme: light !important;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { font-family: 'Inter', sans-serif; background: #020617; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: white; }
        
        header { 
            background: linear-gradient(90deg, #001a33 0%, var(--mpu-green) 100%); 
            height: 60px; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid var(--mpu-gold); z-index: 5000; 
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        #toggle-menu { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        
        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .sidebar { 
            width: var(--sidebar-w); background: #020617; display: flex; flex-direction: column; gap: 8px; 
            padding: 15px; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; z-index: 100;
            transition: margin-left 0.4s ease;
        }
        .sidebar.collapsed { margin-left: calc(var(--sidebar-w) * -1); }
        
        .btn-side { 
            width: 100%; min-height: 42px; border: none; border-radius: 6px; 
            display: flex; align-items: center; padding: 0 15px; 
            color: white; font-weight: 600; cursor: pointer; gap: 10px; 
            font-size: 0.7rem; text-transform: uppercase; transition: 0.2s; 
            background: rgba(255,255,255,0.05); 
        }

        .content-wrapper { flex: 1; display: flex; width: 100%; transition: all 0.4s ease; overflow: hidden; position: relative; }
        .editor-container { flex: 1 0 100%; display: flex; flex-direction: column; background: var(--bg-paper); overflow-y: auto; align-items: center; padding: 20px 10px; transition: all 0.4s ease; }
        .editor-container.collapsed { flex: 0 0 0%; overflow: hidden; padding: 0; }

        .sticky-tools { position: sticky; top: -20px; z-index: 1000; background: #fff; width: 100%; max-width: 850px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin-bottom: 15px; }
        #identificador-peca { padding: 12px; background: #f8fafc; font-weight: 800; color: #020617; border-bottom: 2px solid var(--mpu-gold); cursor: pointer; font-size: 0.85rem; display: flex; justify-content: space-between; }

        .paper { 
            width: 100%; max-width: 850px; background: white; min-height: 1500px; 
            padding: 60px; color: #1e293b; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 28px; line-height: 28px;
        }
        #editor-principal { outline: none; min-height: 900px; font-family: 'Courier New', monospace; font-size: 16px; text-align: justify; color: #000; }

        #pdf-viewer { flex: 0 0 0%; background: #fff; transition: all 0.4s ease; display: flex; flex-direction: column; overflow: hidden; border-left: 0 solid var(--mpu-gold); }
        #pdf-viewer.active { flex: 1 0 50%; border-left-width: 4px; }
        #pdf-viewer.full-view { flex: 1 0 100%; }
        #pdf-frame { flex: 1; border: none; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 12px; color: #0f172a; max-height: 90vh; overflow-y: auto; position: relative; }
        .opt-btn { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; font-weight: 700; display: flex; justify-content: space-between; cursor: pointer; color: #1e293b; align-items: center; }

        #ex-display { background: var(--mpu-gold); color: white; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <button id="toggle-menu" onclick="window.alternarSidebar()"><i class="fas fa-bars"></i></button>
        <div class="logo"><i class="fas fa-shield-halved"></i> PMDF | <span id="ex-display">INICIALIZANDO</span></div>
    </div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <div id="relogio" style="font-family: monospace; font-weight: bold; color: var(--mpu-gold);"></div>
    </div>
</header>

<main>
    <aside class="sidebar" id="sidebar-menu">
        <button class="btn-side" style="background:var(--sucesso);" onclick="window.finalizarPeca()"><i class="fas fa-check-double"></i> FINALIZAR E SALVAR</button>
        <button class="btn-side" onclick="window.gerenciadorPasta()"><i class="fas fa-folder-open"></i> MINHAS GAVETAS</button>
        
        <div style="margin: 10px 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>
        
        <button class="btn-side" onclick="window.ativarModoQuestoes()"><i class="fas fa-question-circle"></i> NOVA QUESTÃO</button>
        <button class="btn-side" onclick="window.ativarModoTeses()"><i class="fas fa-gavel"></i> NOVA TESE PMDF</button>
        <button class="btn-side" onclick="window.ativarTreinoLivre()"><i class="fas fa-edit"></i> TREINO LIVRE</button>
        
        <div style="margin: 10px 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>

        <button class="btn-side" onclick="window.abrirBibliotecaPDF()"><i class="fas fa-book"></i> NÚCLEO DURO (LEIS)</button>
        <button class="btn-side" onclick="window.inteligenciaNaoConfunda()"><i class="fas fa-lightbulb"></i> NÃO CONFUNDA</button>
        <button class="btn-side" style="background:var(--perigo);" onclick="window.limparFolha()"><i class="fas fa-eraser"></i> LIMPAR TELA</button>
    </aside>

    <div class="content-wrapper">
        <section class="editor-container" id="editor-container">
            <div class="sticky-tools">
                <div id="identificador-peca" onclick="window.renomearTreino()">
                    -- 
                </div>
            </div>
            <div class="paper">
                <div id="editor-principal" contenteditable="true" spellcheck="false"></div>
            </div>
        </section>

        <section id="pdf-viewer">
            <div style="background:#020617; padding:10px 15px; display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid var(--mpu-gold);">
                <span id="pdf-title" style="color:white; font-size:12px; font-weight:bold;">CONSULTA</span>
                <button onclick="window.fecharPDF()" style="background:var(--mpu-gold); border:none; padding:5px 12px; border-radius:4px; color:white; font-size:10px; cursor:pointer;">FECHAR X</button>
            </div>
            <iframe id="pdf-frame" src=""></iframe>
        </section>
    </div>
</main>

<div class="modal" id="universal-modal">
    <div class="modal-body">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 id="modal-title" style="font-size:1.1rem; color:var(--mpu-blue)"></h3>
            <button id="modal-back-btn" onclick="window.gerenciadorPasta()" style="display:none; background:none; border:none; color:var(--mpu-gold); cursor:pointer;"><i class="fas fa-arrow-left"></i> VOLTAR</button>
        </div>
        <div id="modal-content"></div>
        <button onclick="document.getElementById('universal-modal').style.display='none'" style="width:100%; padding:12px; background:#000; color:white; border-radius:8px; margin-top:15px; cursor:pointer; border:none;">FECHAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Configuração Firebase (Sua base PMDF/Master)
    const firebaseConfig = {
        apiKey: "AIzaSyAmigODFK8R9c0-fWtagdxLWu9xkODfKYQ",
        authDomain: "masteroab-db5e1.firebaseapp.com",
        databaseURL: "https://masteroab-db5e1-default-rtdb.firebaseio.com",
        projectId: "masteroab-db5e1",
        storageBucket: "masteroab-db5e1.appspot.com",
        messagingSenderId: "620234160245",
        appId: "1:620234160245:web:8651817c66144e59f42668"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.db = db;

    // --- ESTADOS DO SISTEMA (Lógica OAB Blindada) ---
    window.activeEx = localStorage.getItem('activeEx') || "PMDF_2026";
    window.modoTreinoLivre = localStorage.getItem('modoTreinoLivre') === "true";
    window.modoQuestoes = localStorage.getItem('modoQuestoes') === "true";
    window.modoTeses = localStorage.getItem('modoTeses') === "true";
    window.pecaAtualNome = localStorage.getItem('pecaAtualNome') || "NOVO ESTUDO";

    window.onload = async () => {
        atualizarDisplayModo();
        await carregarRascunho();
        setInterval(salvarAutomatico, 30000);
        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    };

    // --- GERENCIADOR DE GAVETAS ---
    window.gerenciadorPasta = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-back-btn').style.display = "none";
        document.getElementById('modal-title').innerText = "📂 MINHA PASTA PMDF";
        content.innerHTML = `
            <div class="opt-btn" onclick="window.abrirGavetaEspecifica('QUESTÕES')"><span>GAVETA: QUESTÕES</span> <i class="fas fa-question-circle" style="color:var(--questoes)"></i></div>
            <div class="opt-btn" onclick="window.abrirGavetaEspecifica('TREINO')"><span>GAVETA: TREINOS</span> <i class="fas fa-edit" style="color:#facc15"></i></div>
            <div class="opt-btn" onclick="window.abrirGavetaEspecifica('TESES')"><span>GAVETA: TESES JURÍDICAS</span> <i class="fas fa-gavel" style="color:var(--teses)"></i></div>
            <div class="opt-btn" onclick="window.abrirGavetaEspecifica('PMDF_2026')"><span>ARQUIVOS GERAIS</span> <i class="fas fa-archive" style="color:var(--gold)"></i></div>
        `;
        modal.style.display = 'flex';
    };

    window.abrirGavetaEspecifica = async (tipoGaveta) => {
        const content = document.getElementById('modal-content');
        document.getElementById('modal-back-btn').style.display = "block";
        document.getElementById('modal-title').innerText = `📂 GAVETA: ${tipoGaveta}`;
        content.innerHTML = "<div style='text-align:center; padding:20px;'><i class='fas fa-spinner fa-spin'></i> Acessando Nuvem...</div>";
        
        try {
            const snap = await get(ref(db, `producao_pmdf/HISTORICO`));
            content.innerHTML = "";
            if (snap.exists()) {
                const dados = snap.val();
                const filtrados = Object.keys(dados)
                    .map(k => ({ id: k, ...dados[k] }))
                    .filter(item => String(item.exame) === String(tipoGaveta));
                
                if(filtrados.length === 0) { content.innerHTML = "Gaveta vazia."; return; }

                filtrados.reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.style.cssText = "padding:12px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; background:#fff; margin-bottom:8px; border-radius:8px;";
                    div.innerHTML = `
                        <div onclick="window.carregarPecaPasta('${item.id}')" style="cursor:pointer; flex:1;">
                            <strong style="font-size:14px; color:#020617">${item.peca}</strong>
                        </div>
                        <div style="display:flex; gap:12px;">
                            <i class="fas fa-trash" style="color:var(--perigo); cursor:pointer" onclick="window.deletarPecaPasta('${item.id}', '${tipoGaveta}')"></i>
                        </div>
                    `;
                    content.appendChild(div);
                });
            } else { content.innerHTML = "Vazia."; }
        } catch (e) { content.innerHTML = "Erro de conexão."; }
    };

    // --- SALVAMENTO BLINDADO ---
    window.finalizarPeca = async () => { 
        const ed = document.getElementById('editor-principal'); 
        if(!ed || ed.innerText.trim() === "") return alert("Folha vazia!"); 
        
        let tipoDestino = window.activeEx;
        if (window.modoQuestoes) tipoDestino = "QUESTÕES";
        else if (window.modoTeses) tipoDestino = "TESES";
        else if (window.modoTreinoLivre) tipoDestino = "TREINO";

        const nomeAlvo = window.pecaAtualNome;
        
        try {
            const snap = await get(ref(db, `producao_pmdf/HISTORICO`));
            let idFinal = Date.now().toString();
            let jaExiste = false;

            if (snap.exists()) {
                const dados = snap.val();
                const encontrado = Object.keys(dados).find(k => {
                    const nomeLimpo = dados[k].peca.includes(' (') ? dados[k].peca.split(' (')[0] : dados[k].peca;
                    return nomeLimpo === nomeAlvo && dados[k].exame === tipoDestino;
                });
                if (encontrado) {
                    jaExiste = true;
                    if (!confirm(`Atualizar arquivo "${nomeAlvo}" existente?`)) return;
                    idFinal = encontrado;
                }
            }

            const agora = new Date(); 
            const dataF = agora.toLocaleDateString('pt-BR') + " " + agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}); 
            
            await set(ref(db, `producao_pmdf/HISTORICO/${idFinal}`), { 
                exame: tipoDestino, 
                peca: `${nomeAlvo} (${dataF})`, 
                conteudo: ed.innerHTML 
            }); 
            
            alert(`Sincronizado na gaveta ${tipoDestino}!`);
        } catch (e) { alert("Erro ao salvar."); }
    };

    // --- NAVEGAÇÃO E MODOS ---
    window.atualizarDisplayModo = () => {
        const display = document.getElementById('ex-display');
        const ident = document.getElementById('identificador-peca');
        display.innerText = window.modoQuestoes ? "QUESTÕES" : (window.modoTeses ? "TESES" : (window.modoTreinoLivre ? "TREINO" : "GERAL"));
        ident.innerHTML = `<span><i class="fas fa-file-contract"></i> ${window.pecaAtualNome}</span> <i class="fas fa-pen" style="font-size:10px; opacity:0.5"></i>`;
    };

    window.ativarModoQuestoes = () => { const n = prompt("Nome da Questão:"); if(n) { localStorage.setItem('modoQuestoes', "true"); localStorage.setItem('modoTeses', "false"); localStorage.setItem('modoTreinoLivre', "false"); localStorage.setItem('pecaAtualNome', n.toUpperCase()); window.location.reload(); } };
    window.ativarModoTeses = () => { const n = prompt("Assunto da Tese:"); if(n) { localStorage.setItem('modoTeses', "true"); localStorage.setItem('modoQuestoes', "false"); localStorage.setItem('modoTreinoLivre', "false"); localStorage.setItem('pecaAtualNome', n.toUpperCase()); window.location.reload(); } };
    window.ativarTreinoLivre = () => { const n = prompt("Nome do Treino:"); if(n) { localStorage.setItem('modoTreinoLivre', "true"); localStorage.setItem('modoQuestoes', "false"); localStorage.setItem('modoTeses', "false"); localStorage.setItem('pecaAtualNome', n.toUpperCase()); window.location.reload(); } };

    window.carregarPecaPasta = async (k) => { 
        const snap = await get(ref(db, `producao_pmdf/HISTORICO/${k}`)); 
        if(snap.exists()){ 
            const data = snap.val(); 
            window.pecaAtualNome = data.peca.includes(' (') ? data.peca.split(' (')[0] : data.peca; 
            localStorage.setItem('pecaAtualNome', window.pecaAtualNome);
            localStorage.setItem('modoQuestoes', data.exame === "QUESTÕES");
            localStorage.setItem('modoTreinoLivre', data.exame === "TREINO");
            localStorage.setItem('modoTeses', data.exame === "TESES");
            document.getElementById('editor-principal').innerHTML = data.conteudo;
            document.getElementById('universal-modal').style.display='none'; 
            atualizarDisplayModo(); 
        } 
    };

    window.deletarPecaPasta = async (id, tipo) => {
        if(confirm("Apagar permanentemente?")) {
            await remove(ref(db, `producao_pmdf/HISTORICO/${id}`));
            window.abrirGavetaEspecifica(tipo);
        }
    };

    // --- UTILITÁRIOS ---
    async function salvarAutomatico() { 
        const ed = document.getElementById('editor-principal'); 
        if(ed) await set(ref(db, `producao_pmdf/RASCUNHO_LIVE`), { conteudo: ed.innerHTML, nome: window.pecaAtualNome }); 
    }
    async function carregarRascunho() { 
        const snap = await get(ref(db, `producao_pmdf/RASCUNHO_LIVE`)); 
        if(snap.exists()) document.getElementById('editor-principal').innerHTML = snap.val().conteudo; 
    }

    window.alternarSidebar = () => document.getElementById('sidebar-menu').classList.toggle('collapsed');
    window.renomearTreino = () => { const n = prompt("Renomear estudo:", window.pecaAtualNome); if(n) { window.pecaAtualNome = n.toUpperCase(); atualizarDisplayModo(); } };
    window.limparFolha = () => confirm("Limpar tela?") && (document.getElementById('editor-principal').innerHTML = "");
    window.fecharPDF = () => { document.getElementById('pdf-viewer').classList.remove('active', 'full-view'); };

    // --- NÚCLEO DURO PDFS ---
    window.abrirBibliotecaPDF = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "VADE MECUM PMDF";
        const leis = [
            { n: "ESTATUTO PMDF", u: "https://www.planalto.gov.br/ccivil_03/leis/l7289.htm" },
            { n: "CPM", u: "https://www.planalto.gov.br/ccivil_03/decreto-lei/del1001.htm" },
            { n: "CPPM", u: "https://www.planalto.gov.br/ccivil_03/decreto-lei/del1002.htm" }
        ];
        content.innerHTML = "";
        leis.forEach(l => {
            const b = document.createElement('div'); b.className = 'opt-btn';
            b.innerHTML = `<span>${l.n}</span> <i class="fas fa-file-pdf" style="color:red"></i>`;
            b.onclick = () => {
                document.getElementById('pdf-frame').src = l.u;
                document.getElementById('pdf-title').innerText = l.n;
                document.getElementById('pdf-viewer').classList.add('active');
                modal.style.display = 'none';
            };
            content.appendChild(b);
        });
        modal.style.display = 'flex';
    };

    window.inteligenciaNaoConfunda = () => {
        const modal = document.getElementById('universal-modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "DICAS: NÃO CONFUNDA";
        const dicas = [
            { t: "Exclusão vs. Expulsão", d: "Exclusão: Administrativo/Praças sem estabilidade. Expulsão: Sanção moral/estáveis." }
        ];
        content.innerHTML = "";
        dicas.forEach(d => {
            const b = document.createElement('div'); b.className = 'opt-btn';
            b.innerHTML = `<span>${d.t}</span>`;
            b.onclick = () => {
                document.getElementById('editor-principal').innerHTML += `<div style="background:#fef9c3; padding:10px; border-left:4px solid var(--mpu-gold); color:#000; margin:10px 0;"><b>DICA:</b> ${d.d}</div>`;
                modal.style.display = 'none';
            };
            content.appendChild(b);
        });
        modal.style.display = 'flex';
    };

</script>
</body>
</html>
