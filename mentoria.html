<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MENTORIA ELITE V13 - PMDF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #020617; --gold: #fbbf24; --card: #1e293b;
            --nc: #f472b6; --qp: #a855f7; --tese: #3b82f6; --arsenal: #22c55e;
            --sumula: #f97316; --artigo: #10b981; --artcpc: #0ea5e9; --pre: #ef4444;
            --oj: #06b6d4; --tema: #facc15; --leis: #94a3b8; --aviso: #ffffff;
            --artcc: #6366f1; --crim: #ef4444; /* Cor para Criminologia */
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--primary); color: white; margin: 0; padding-bottom: 130px; }

        header {
            background: var(--card); padding: 15px 20px; border-bottom: 2px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .btn-voltar { background: white; color: black; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; font-size: 12px; cursor: pointer; }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }

        /* PAINEL DE CONTROLE DE MATÉRIAS/PASTAS */
        .folder-selector {
            display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 10px;
        }
        .folder-chip {
            background: #334155; padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; white-space: nowrap; cursor: pointer; border: 1px solid transparent;
        }
        .folder-chip.active { border-color: var(--gold); background: var(--gold); color: black; }

        .panel-input { background: #0f172a; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px dashed #334155; }
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0; background: #1e293b; border: 1px solid #475569; color: white; border-radius: 8px; font-family: inherit; }

        .post-it {
            padding: 18px; border-radius: 15px; margin-bottom: 15px; color: #020617;
            position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .post-it strong { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; text-transform: uppercase; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 8px; margin-bottom: 10px; }
        .post-it p { margin: 8px 0; font-size: 0.95rem; line-height: 1.4; font-weight: 700; white-space: pre-wrap; }
        .rascunho-box { background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid rgba(0,0,0,0.3); font-size: 0.85rem; font-style: italic; font-weight: 500; }

        .actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
        .btn-circle { width: 38px; height: 38px; border-radius: 10px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }

        .nav-tabs {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--card);
            display: flex; overflow-x: auto; padding: 10px 5px;
            border-top: 2px solid #334155; z-index: 2000;
        }
        .tab { 
            color: #94a3b8; text-align: center; font-size: 9px; text-decoration: none; 
            font-weight: 700; min-width: 85px; cursor: pointer; flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center;
        }
        .tab.active { color: var(--gold); }
        .tab i { display: block; font-size: 1.1rem; margin-bottom: 4px; }

        #fab-injetor { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; border: none; font-size: 1.5rem; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 1001; color: black; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <button class="btn-voltar" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> VOLTAR</button>
    <h2 style="font-size: 1rem; margin:0;">CADERNO <span style="color:var(--gold)">DINÂMICO PMDF</span></h2>
</header>

<div class="container">
    <div class="panel-input">
        <h4 id="editor-title" style="margin-top:0; color:var(--gold);">Gerenciar Arquivo / Matéria</h4>
        <input id="inp-t" placeholder="Nome do Arquivo (Ex: Criminologia - Aula 01)">
        <select id="inp-folder">
            <option value="DIREITO PENAL">DIREITO PENAL</option>
            <option value="CRIMINOLOGIA">CRIMINOLOGIA</option>
            <option value="LEGISLAÇÃO PMDF">LEGISLAÇÃO PMDF</option>
            <option value="DIREITO CONSTITUCIONAL">DIREITO CONSTITUCIONAL</option>
            <option value="OUTROS">OUTROS...</option>
        </select>
        <textarea id="inp-c" rows="3" placeholder="Conteúdo do estudo..."></textarea>
        <textarea id="inp-r" rows="2" style="background:#0f172a; border-color:var(--gold)" placeholder="Observações e Dicas de Ouro..."></textarea>
        <button id="btn-salvar" class="btn-voltar" style="width:100%; background:var(--gold); margin-top:10px; font-weight: 900;">SALVAR ALTERAÇÕES</button>
    </div>

    <div id="sec-inteligencia">
        <div class="folder-selector" id="folder-list">
            </div>
        <h3 id="intel-head" style="font-size: 0.9rem; text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--gold);">
            <i class="fas fa-folder-open"></i> MEUS ARQUIVOS
        </h3>
        <div id="feed-v13"></div>
    </div>
</div>

<nav class="nav-tabs">
    <a class="tab active" onclick="filterFolder('TODOS')"><i class="fas fa-layer-group"></i>TUDO</a>
    <a class="tab" onclick="filterFolder('CRIMINOLOGIA')"><i class="fas fa-mask"></i>CRIMINOLOGIA</a>
    <a class="tab" onclick="filterFolder('DIREITO PENAL')"><i class="fas fa-gavel"></i>PENAL</a>
    <a class="tab" onclick="filterFolder('LEGISLAÇÃO PMDF')"><i class="fas fa-shield-alt"></i>PMDF</a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, set, serverTimestamp, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const config = {
        apiKey: "AIzaSyAmigODFK8R9c0-fWtagdxLWu9xkODfKYQ",
        authDomain: "masteroab-db5e1.firebaseapp.com",
        projectId: "masteroab-db5e1",
        databaseURL: "https://masteroab-db5e1-default-rtdb.firebaseio.com"
    };
    const app = initializeApp(config);
    const db = getDatabase(app);
    const RAIZ_MENTORIA = 'v13_pmdf_arquivos';

    let currentFolder = 'TODOS';
    let editId = null;
    let cache = {};

    // SALVAR OU EDITAR (RENOMEAR)
    document.getElementById('btn-salvar').onclick = () => {
        const t = document.getElementById('inp-t').value;
        const c = document.getElementById('inp-c').value;
        const r = document.getElementById('inp-r').value;
        const folder = document.getElementById('inp-folder').value;

        if(!t || !c) return alert("Defina o nome do arquivo e o conteúdo.");

        const dados = { t, c, r: r || "", folder, ts: serverTimestamp() };

        if(editId) {
            update(ref(db, `${RAIZ_MENTORIA}/${editId}`), dados)
                .then(() => { alert("Arquivo atualizado/renomeado!"); resetForm(); });
        } else {
            push(ref(db, RAIZ_MENTORIA), dados);
            resetForm();
        }
    };

    function resetForm() {
        editId = null;
        document.getElementById('inp-t').value = "";
        document.getElementById('inp-c').value = "";
        document.getElementById('inp-r').value = "";
        document.getElementById('editor-title').innerText = "Gerenciar Arquivo / Matéria";
    }

    onValue(ref(db, RAIZ_MENTORIA), (snap) => {
        cache = snap.val() || {};
        render();
    });

    window.filterFolder = (f) => {
        currentFolder = f;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        render();
    };

    function render() {
        const f = document.getElementById('feed-v13');
        f.innerHTML = "";
        
        Object.keys(cache).reverse().forEach(id => {
            const it = cache[id];
            
            if(currentFolder === 'TODOS' || it.folder === currentFolder) {
                f.innerHTML += `
                    <div class="post-it" style="background: white; border-left: 10px solid var(--gold)">
                        <strong><i class="fas fa-file-alt"></i> ${it.t}</strong>
                        <div style="font-size: 10px; color: #64748b; margin-bottom: 10px;">PASTA: ${it.folder}</div>
                        <p style="color: #1e293b">${it.c}</p>
                        ${it.r ? `<div class="rascunho-box"><strong>Dica/Rascunho:</strong><br>${it.r}</div>` : ""}
                        <div class="actions">
                            <button class="btn-circle" style="background:#334155;" onclick="editarArquivo('${id}')"><i class="fas fa-edit"></i></button>
                            <button class="btn-circle" style="background:#ef4444;" onclick="apagar('${id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            }
        });
    }

    window.editarArquivo = (id) => {
        const it = cache[id];
        editId = id;
        document.getElementById('inp-t').value = it.t;
        document.getElementById('inp-folder').value = it.folder;
        document.getElementById('inp-c').value = it.c;
        document.getElementById('inp-r').value = it.r || "";
        document.getElementById('editor-title').innerText = "Editando: " + it.t;
        window.scrollTo({top:0, behavior:'smooth'});
    };

    window.apagar = (id) => { if(confirm("Excluir este arquivo permanentemente?")) remove(ref(db, `${RAIZ_MENTORIA}/${id}`)); };

</script>
</body>
</html>
